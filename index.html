    // --- ROSTER: CLASS DETAILS & ENROLLMENT ---
    function ClassDetails({ currentClass, saveClass, setView, showToast }) {
      const [name, setName] = useState('');
      const [rollNo, setRollNo] = useState('');
      const [bulkData, setBulkData] = useState('');
      const [isBulkMode, setIsBulkMode] = useState(false);

      const formatRollNo = (val) => {
        const strVal = String(val).trim();
        return /^\d+$/.test(strVal) ? strVal.padStart(2, '0') : strVal;
      };

      const removeStudent = async (studentId) => {
        const updatedClass = { 
          ...currentClass, 
          students: currentClass.students.filter(s => s.id !== studentId) 
        };
        await saveClass(updatedClass);
        showToast("Student removed!");
      };

      const addSingle = async () => {
        if (!name || !rollNo) return showToast("Fill both fields");
        const updatedClass = { 
          ...currentClass, 
          students: [...currentClass.students, { id: Date.now().toString(), name, rollNo: formatRollNo(rollNo) }] 
        };
        await saveClass(updatedClass);
        setName(''); setRollNo('');
        showToast("Student added!");
      };

      const addBulk = async () => {
        if (!bulkData.trim()) return showToast("No data to import");
        const lines = bulkData.split('\n');
        const newStudents = lines.map(line => {
          const parts = line.split(/[,\t]+/).map(s => s.trim());
          if (parts.length >= 2) {
             return { id: Math.random().toString(), rollNo: formatRollNo(parts[0]), name: parts[1] };
          }
          return null;
        }).filter(Boolean);

        if (newStudents.length === 0) return showToast("Could not read any valid data");

        const updatedClass = { ...currentClass, students: [...currentClass.students, ...newStudents] };
        await saveClass(updatedClass);
        setBulkData('');
        setIsBulkMode(false);
        showToast(`Imported ${newStudents.length} students!`);
      };

      return (
        <div className="space-y-6">
          <div className="flex items-center gap-3 mb-2">
            <button onClick={() => setView('classes')} className="text-gray-500 hover:text-blue-600 transition bg-white p-2 rounded-full shadow-sm border border-gray-100">
              <Icon name="ChevronLeft" size={20} />
            </button>
            <h2 className="text-3xl font-black text-gray-800">{currentClass.name}</h2>
          </div>

          <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div className="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
              <h3 className="text-lg font-black text-gray-800 flex items-center gap-2">
                 {isBulkMode ? <Icon name="Upload" className="text-blue-600"/> : <Icon name="UserPlus" className="text-blue-600"/>} 
                 {isBulkMode ? "Bulk Enroll Students" : "Enroll Single Student"}
              </h3>
              <button onClick={() => setIsBulkMode(!isBulkMode)} className="text-sm bg-gray-100 text-gray-700 font-bold px-3 py-1.5 rounded-lg hover:bg-gray-200">
                Switch to {isBulkMode ? 'Single Mode' : 'Bulk Mode'}
              </button>
            </div>

            {!isBulkMode ? (
              <div className="flex flex-col sm:flex-row gap-3">
                <input type="text" value={rollNo} onChange={e => setRollNo(e.target.value)} placeholder="Roll No" className="w-full sm:w-1/3 p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 font-bold text-center" />
                <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Student Full Name" className="w-full flex-1 p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 font-medium" />
                <button onClick={addSingle} className="bg-blue-600 text-white px-8 py-4 rounded-xl font-black shadow-md hover:bg-blue-700">Add</button>
              </div>
            ) : (
              <div className="space-y-3">
                <p className="text-sm text-gray-600 font-medium bg-blue-50 p-3 rounded-lg border border-blue-100">
                  <span className="font-bold text-blue-800">Instructions:</span> Paste data from Excel. Use the format <code>RollNo, Name</code> per line.
                </p>
                <textarea 
                  value={bulkData} onChange={e => setBulkData(e.target.value)} 
                  rows="5" className="w-full p-4 border border-gray-300 rounded-xl outline-none font-mono text-sm bg-gray-50" 
                  placeholder="01, John Doe&#10;02, Jane Smith"
                ></textarea>
                <button onClick={addBulk} className="w-full bg-blue-600 text-white py-4 rounded-xl font-black shadow-md hover:bg-blue-700 flex justify-center items-center gap-2">
                  <Icon name="CloudUpload" /> Import Data
                </button>
              </div>
            )}
          </div>

          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div className="bg-gray-50 p-5 border-b border-gray-200 flex justify-between items-center">
               <h3 className="font-black text-gray-800 text-lg">Class Roster</h3>
               <span className="bg-blue-100 text-blue-800 font-bold text-xs px-3 py-1 rounded-full uppercase tracking-wider">{currentClass.students.length} Total</span>
            </div>
            <div className="max-h-96 overflow-y-auto custom-scrollbar">
              {currentClass.students.length === 0 ? (
                <p className="p-8 text-center text-gray-500 font-medium">No students enrolled yet.</p>
              ) : (
                <table className="w-full text-left border-collapse">
                  <tbody>
                    {currentClass.students.map((student, idx) => (
                      <tr key={student.id} className="border-b border-gray-100 last:border-0 hover:bg-gray-50 transition">
                        <td className="p-4 pl-6 text-gray-400 font-bold w-12 text-sm">{idx + 1}</td>
                        <td className="p-4 font-black font-mono text-gray-700 w-32 bg-gray-50/50 border-r border-gray-100">{student.rollNo}</td>
                        <td className="p-4 font-bold text-gray-800">{student.name}</td>
                        <td className="p-4 text-right">
                          <button 
                            onClick={() => removeStudent(student.id)} 
                            className="text-red-400 hover:text-red-600 transition p-2 bg-red-50 hover:bg-red-100 rounded-lg"
                            title="Remove Student"
                          >
                            <Icon name="Trash" size={16} />
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        </div>
      );
    }

    // --- ITEM ANALYSIS COMPONENT ---
    function ItemAnalysis({ exam, setView }) {
      const results = exam.results || [];
      const totalScans = results.length;

      return (
        <div className="space-y-6 mb-8">
          <div className="flex items-center gap-3 mb-2">
            <button onClick={() => setView('dashboard')} className="text-gray-500 hover:text-blue-600 transition bg-white p-2 rounded-full shadow-sm border border-gray-100">
              <Icon name="ChevronLeft" size={20} />
            </button>
            <h2 className="text-3xl font-black text-gray-800">Item Analysis</h2>
          </div>

          <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-gray-100 pb-6">
              <div>
                <h3 className="text-xl font-black text-gray-800">{exam.name}</h3>
                <p className="text-sm font-bold text-gray-500 mt-1 uppercase tracking-widest">{totalScans} Total Scans Recorded</p>
              </div>
              <div className="flex items-center gap-6 bg-gray-50 p-4 rounded-xl border border-gray-200 w-full md:w-auto">
                <div className="text-center w-full">
                  <div className="text-4xl font-black text-blue-600">
                    {totalScans > 0 ? ((results.reduce((acc, r) => acc + r.score, 0) / (totalScans * exam.questions)) * 100).toFixed(1) : '0'}%
                  </div>
                  <p className="text-xs font-bold text-gray-500 uppercase tracking-widest mt-1">Class Average</p>
                </div>
              </div>
            </div>

            {totalScans === 0 ? (
              <div className="text-center py-12">
                <Icon name="Camera" size={48} className="text-gray-200 mx-auto mb-4" />
                <p className="text-gray-500 font-bold text-lg">No scans recorded yet.</p>
                <p className="text-gray-400 text-sm mt-1">Scan answer sheets to generate beautiful analytics.</p>
              </div>
            ) : (
              <div className="overflow-x-auto custom-scrollbar pb-4">
                <table className="w-full text-left border-collapse min-w-[700px]">
                  <thead>
                    <tr className="bg-gray-50 border-y border-gray-200">
                      <th className="p-4 text-xs font-black text-gray-500 uppercase tracking-widest w-16 text-center border-r border-gray-200">Item</th>
                      <th className="p-4 text-xs font-black text-gray-500 uppercase tracking-widest w-20 text-center border-r border-gray-200">Key</th>
                      <th className="p-4 text-xs font-black text-gray-500 uppercase tracking-widest w-1/3 border-r border-gray-200">Difficulty Level (Correct %)</th>
                      <th className="p-4 text-xs font-black text-gray-500 uppercase tracking-widest">Student Response Distribution</th>
                    </tr>
                  </thead>
                  <tbody>
                    {exam.answerKey.map((qData, qIdx) => {
                      let correctCount = 0;
                      const dist = Array(qData.options).fill(0);
                      let invalidCount = 0;

                      results.forEach(r => {
                        const ans = r.scannedAnswers[qIdx];
                        if (ans === qData.answer) correctCount++;
                        if (ans >= 0 && ans < qData.options) {
                          dist[ans]++;
                        } else {
                          invalidCount++;
                        }
                      });

                      const correctPct = Math.round((correctCount / totalScans) * 100);
                      const isEasy = correctPct >= 75;
                      const isHard = correctPct <= 40;

                      const keyLabel = qData.type === 'true_false' 
                        ? (qData.answer === 0 ? 'T' : 'F') 
                        : String.fromCharCode(65 + qData.answer);

                      return (
                        <tr key={qIdx} className="border-b border-gray-100 last:border-0 hover:bg-gray-50 transition">
                          <td className="p-4 font-black text-gray-700 text-center border-r border-gray-100 bg-gray-50/30 text-lg">Q{qIdx + 1}</td>
                          <td className="p-4 font-black text-blue-600 text-center border-r border-gray-100 text-xl">{keyLabel}</td>
                          <td className="p-4 border-r border-gray-100">
                            <div className="flex items-center gap-3">
                              <span className={`w-12 text-right font-black text-sm ${isEasy ? 'text-green-600' : isHard ? 'text-red-600' : 'text-yellow-600'}`}>
                                {correctPct}%
                              </span>
                              <div className="flex-1 h-3 bg-gray-200 rounded-full overflow-hidden shadow-inner">
                                <div 
                                  className={`h-full transition-all duration-1000 ${isEasy ? 'bg-green-500' : isHard ? 'bg-red-500' : 'bg-yellow-400'}`}
                                  style={{ width: `${correctPct}%` }}
                                ></div>
                              </div>
                            </div>
                          </td>
                          <td className="p-4">
                            <div className="flex gap-2">
                              {dist.map((count, optIdx) => {
                                const label = qData.type === 'true_false' ? (optIdx === 0 ? 'T' : 'F') : String.fromCharCode(65 + optIdx);
                                const isKey = optIdx === qData.answer;
                                const pct = Math.round((count / totalScans) * 100);
                                return (
                                  <div key={optIdx} className={`flex flex-col justify-center items-center w-12 h-12 rounded-lg border-2 ${isKey ? 'bg-blue-50 border-blue-400 shadow-sm' : 'bg-white border-gray-200'}`}>
                                    <span className={`text-xs font-bold ${isKey ? 'text-blue-600' : 'text-gray-400'}`}>{label}</span>
                                    <span className={`text-sm font-black ${isKey ? 'text-blue-800' : 'text-gray-800'}`}>{pct}%</span>
                                  </div>
                                );
                              })}
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- OMR SHEET PRINT TEMPLATE COMPONENT ---
    function OMRSheetTemplate({ exam, setView, showToast }) {
      const printAreaRef = useRef(null);
      const [isExporting, setIsExporting] = useState(false);
      const [customHeader, setCustomHeader] = useState("OFFICIAL OMR ANSWER SHEET");
      const [customInstructions, setCustomInstructions] = useState("INSTRUCTIONS: Completely fill in the circle corresponding to your answer. Do not use checkmarks or Xs.");

      // Calculate perfect pixel dimensions to force html2canvas and printing to identical scales
      const PRINT_W = 816; // 8.5 inches at 96 DPI
      const PRINT_H = 1056; // 11 inches at 96 DPI

      // Calculate column layout dynamically
      const numCols = exam.questions <= 40 ? 2 : exam.questions <= 90 ? 3 : exam.questions <= 140 ? 4 : 5;
      const rowsPerCol = Math.ceil(exam.questions / numCols);
      const maxOptions = Math.max(...exam.answerKey.map(q => q.options), 1);

      // Determine explicit pixel sizes based on density to avoid html2canvas scaling bugs
      // And ensure that bubbles always fit the space perfectly
      const maxRowH = 600 / rowsPerCol;
      const ansBubbleSize = Math.max(10, Math.floor(Math.min(maxRowH * 0.85, 24)));
      const ansFontSize = Math.max(7, Math.floor(ansBubbleSize * 0.55));

      const rnBubbleSize = 18;
      const rnFontSize = 10;

      const handlePrint = () => {
        window.print();
      };

      const handleExportJPEG = async () => {
        if (!printAreaRef.current) return;
        setIsExporting(true);
        try {
          const canvas = await html2canvas(printAreaRef.current, { 
             scale: 2, 
             useCORS: true, 
             backgroundColor: '#ffffff',
             width: PRINT_W,
             height: PRINT_H 
          });
          const dataUrl = canvas.toDataURL('image/jpeg', 1.0);
          const link = document.createElement('a');
          link.download = `${exam.name.replace(/\s+/g, '_')}_OMR.jpg`;
          link.href = dataUrl;
          link.click();
          if (showToast) showToast("JPEG exported successfully!");
        } catch (error) {
          console.error("Export Error:", error);
          if (showToast) showToast("Error generating JPEG");
        }
        setIsExporting(false);
      };

      const handleExportPDF = async () => {
        if (!printAreaRef.current) return;
        setIsExporting(true);
        try {
          const canvas = await html2canvas(printAreaRef.current, { 
             scale: 2, 
             useCORS: true, 
             backgroundColor: '#ffffff',
             width: PRINT_W,
             height: PRINT_H 
          });
          const imgData = canvas.toDataURL('image/jpeg', 1.0);
          
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF('p', 'in', 'letter');
          pdf.addImage(imgData, 'JPEG', 0, 0, 8.5, 11);
          pdf.save(`${exam.name.replace(/\s+/g, '_')}_OMR.pdf`);
          if (showToast) showToast("PDF exported successfully!");
        } catch (error) {
          console.error("Export Error:", error);
          if (showToast) showToast("Error generating PDF");
        }
        setIsExporting(false);
      };

      return (
        <div className="bg-white p-4 sm:p-8 rounded-2xl shadow-sm border border-gray-100 mb-8 print:p-0 print:shadow-none print:border-none print:m-0 print:bg-transparent">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 print-hidden">
            <button onClick={() => setView('dashboard')} className="text-gray-500 hover:text-blue-600 transition bg-gray-50 p-2 rounded-xl border border-gray-200 flex items-center gap-2 px-4 font-bold">
              <Icon name="ChevronLeft" size={20} /> Back
            </button>
            
            <div className="flex flex-wrap gap-2 w-full md:w-auto">
              <button 
                onClick={handleExportJPEG} 
                disabled={isExporting}
                className="bg-gray-100 text-gray-700 px-4 py-3 rounded-xl hover:bg-gray-200 transition flex items-center justify-center gap-2 font-bold flex-1 md:flex-none disabled:opacity-50"
              >
                <Icon name="Image" size={18} /> JPEG
              </button>
              <button 
                onClick={handleExportPDF} 
                disabled={isExporting}
                className="bg-red-50 text-red-600 px-4 py-3 rounded-xl hover:bg-red-100 transition flex items-center justify-center gap-2 font-bold flex-1 md:flex-none disabled:opacity-50"
              >
                <Icon name="FilePdf" size={18} /> PDF
              </button>
              <button 
                onClick={handlePrint} 
                disabled={isExporting}
                className="bg-blue-600 text-white px-6 py-3 rounded-xl shadow-md hover:bg-blue-700 transition flex items-center justify-center gap-2 font-bold flex-1 md:flex-none disabled:opacity-50"
              >
                <Icon name="Printer" size={18} /> Print
              </button>
            </div>
          </div>

          <div className="mb-6 print-hidden bg-blue-50 p-4 rounded-xl border border-blue-100 flex flex-col gap-4">
             <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4">
                <label className="font-bold text-blue-900 whitespace-nowrap w-32">Custom Header:</label>
                <input type="text" value={customHeader} onChange={e => setCustomHeader(e.target.value)} className="flex-1 w-full p-2 rounded-lg border border-blue-200 outline-none font-bold text-gray-800" placeholder="Enter header text..." />
             </div>
             <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4">
                <label className="font-bold text-blue-900 whitespace-nowrap w-32">Instructions:</label>
                <input type="text" value={customInstructions} onChange={e => setCustomInstructions(e.target.value)} className="flex-1 w-full p-2 rounded-lg border border-blue-200 outline-none font-medium text-gray-800" placeholder="Leave blank for no instructions" />
             </div>
          </div>

          {/* Wrapper to allow mobile scrolling while maintaining perfect 816x1056 aspect ratio for html2canvas */}
          <div className="w-full flex justify-center overflow-x-auto pb-4 custom-scrollbar bg-gray-100 print:bg-transparent rounded-xl print:rounded-none">
            <div 
              ref={printAreaRef} 
              className="print-area bg-white relative shrink-0" 
              style={{ width: `${PRINT_W}px`, height: `${PRINT_H}px`, boxSizing: 'border-box' }}
            >
              {/* SOLID BLACK REGISTRATION MARKERS (Essential for Optical Scanning) */}
              <div className="absolute top-0 left-0 w-[40px] h-[40px] bg-black"></div>
              <div className="absolute top-0 right-0 w-[40px] h-[40px] bg-black"></div>
              <div className="absolute bottom-0 left-0 w-[40px] h-[40px] bg-black"></div>
              <div className="absolute bottom-0 right-0 w-[40px] h-[40px] bg-black"></div>

              {/* Title Section (Top 0 to 8%) */}
              <div className="absolute w-full text-center border-b-2 border-black pb-2" style={{ top: '3%', height: '5%' }}>
                <h1 className="font-black uppercase tracking-widest text-black" style={{ fontSize: '32px' }}>
                  <span style={{ display: 'block', marginTop: '-23px' }}>{customHeader || " "}</span>
                </h1>
              </div>

              {/* Information Section (Top 10%, Left 5%, Width 45%, Height 24%) */}
              <div className="absolute border-2 border-black p-4 flex flex-col justify-between bg-white" style={{ left: '5%', top: '10%', width: '45%', height: '24%' }}>
                  <div>
                    <p className="font-black uppercase tracking-widest text-black line-clamp-1 mb-4" style={{ fontSize: '24px' }}>
                      <span style={{ display: 'block', marginTop: '-23px' }}>&nbsp;</span>
                    </p>
                  </div>
                  <div style={{ marginTop: '20px' }}>
                    <div className="flex items-end gap-2 w-full mb-3">
                      <p className="font-bold text-black" style={{ fontSize: '16px' }}>NAME:</p>
                      <div className="border-b-[2px] border-black flex-1 h-6"></div>
                    </div>
                    <div className="flex items-end gap-2 w-full mb-3">
                      <p className="font-bold text-black" style={{ fontSize: '16px' }}>CLASS:</p>
                      <span className="flex-1 font-normal border-b-[2px] border-black whitespace-nowrap overflow-hidden text-black" style={{ fontSize: '16px' }}>&nbsp;</span>
                    </div>
                  </div>
                  <div className="flex justify-between items-end mt-auto gap-4">
                    <div className="flex items-end gap-2 flex-1">
                      <p className="font-bold text-black" style={{ fontSize: '16px' }}>DATE:</p>
                      <div className="flex-1 border-b-[2px] border-black h-6"></div>
                    </div>
                    <p className="font-bold text-black whitespace-nowrap" style={{ fontSize: '16px' }}>SCORE: ____ / {exam.questions}</p>
                  </div>
              </div>

              {/* Roll No Box (Top 10%, Left 55%, Width 40%, Height 24%) */}
              <div className="absolute border-2 border-black p-2 bg-white" style={{ left: '55%', top: '10%', width: '40%', height: '24%' }}>
                 <p className="font-bold uppercase tracking-widest text-black mb-1 text-center" style={{ fontSize: '14px', height: '20px' }}>Roll No.</p>
                 <div className="absolute border-[2px] border-black left-2 right-2 bottom-2" style={{ top: '30px' }}>
                   {Array.from({length: exam.rollNoLength || 4}).map((_, c) => (
                      <div key={c} className="absolute h-full border-r border-black last:border-r-0" style={{ left: `${(100/(exam.rollNoLength || 4))*c}%`, width: `${100/(exam.rollNoLength || 4)}%` }}>
                         {/* Empty box at the top for writing the digit */}
                         <div className="absolute top-0 w-full border-b border-black" style={{ height: '30px' }}></div>
                         
                         {/* The 0 to 9 column precisely math-positioned */}
                         <div className="absolute w-full bottom-0" style={{ top: '30px' }}>
                           {Array.from({length: 10}).map((_, r) => (
                             <div key={r} className="absolute w-full flex items-center justify-center" style={{ top: `${(100/10)*r}%`, height: `${100/10}%` }}>
                                 <div className="rounded-full border-[1.5px] border-black bg-white flex items-center justify-center font-bold text-black box-border"
                                      style={{ 
                                        width: `${rnBubbleSize}px`, 
                                        height: `${rnBubbleSize}px`, 
                                        fontSize: `${rnFontSize}px`
                                      }}>
                                   <span style={{ display: 'block', marginTop: '-8px' }}>{r}</span>
                                 </div>
                             </div>
                           ))}
                         </div>
                      </div>
                   ))}
                 </div>
              </div>

              {/* Instructions Section (Top 36%, Left 5%, Width 90%, Height 3%) */}
              <div className="absolute flex items-end border-b-2 border-gray-300 pb-1" style={{ left: '5%', top: '35%', width: '90%', height: '4%' }}>
                 <p className="font-bold text-black uppercase tracking-wide" style={{ fontSize: '12px' }}>
                    {customInstructions}
                 </p>
              </div>

              {/* Answers Area (Top 40%, Left 5%, Width 90%, Height 55%) */}
              <div className="absolute border-[3px] border-black bg-white" style={{ left: '5%', top: '40%', width: '90%', height: '55%' }}>
                 {Array.from({length: numCols}).map((_, cIdx) => (
                    <div key={cIdx} className="absolute h-full border-r-2 border-gray-300 last:border-0" style={{ left: `${(100/numCols)*cIdx}%`, width: `${100 / numCols}%` }}>
                       {Array.from({length: rowsPerCol}).map((_, rIdx) => {
                          const qIdx = (cIdx * rowsPerCol) + rIdx;
                          if (qIdx >= exam.questions) return null;
                          const qData = exam.answerKey[qIdx];
                          return (
                             <div key={qIdx} className="absolute w-full flex items-center" style={{ top: `${(100 / rowsPerCol) * rIdx}%`, height: `${100 / rowsPerCol}%` }}>
                                <div className="absolute left-0 h-full flex items-center justify-end pr-2" style={{ width: '35%' }}>
                                   <span className="font-bold text-black" style={{ fontSize: `${ansFontSize + 2}px` }}>{qIdx + 1}.</span>
                                </div>
                                <div className="absolute right-0 h-full" style={{ width: '65%' }}>
                                   {Array.from({length: qData.options}).map((_, oIdx) => {
                                      const label = qData.type === 'true_false' ? (oIdx === 0 ? 'T' : 'F') : String.fromCharCode(65 + oIdx);
                                      return (
                                         <div key={oIdx} className="absolute h-full flex items-center justify-center" style={{ left: `${(100/qData.options)*oIdx}%`, width: `${100/qData.options}%` }}>
                                            <div className="rounded-full border-[1.5px] border-black bg-white flex items-center justify-center font-bold text-black shrink-0"
                                                 style={{
                                                    width: `${ansBubbleSize}px`,
                                                    height: `${ansBubbleSize}px`,
                                                    fontSize: `${ansFontSize}px`
                                                 }}>
                                              <span style={{ display: 'block', marginTop: '-8px' }}>{label}</span>
                                            </div>
                                         </div>
                                      );
                                   })}
                                </div>
                             </div>
                          );
                       })}
                    </div>
                 ))}
              </div>

            </div>
          </div>
        </div>
      );
    }

    // --- RENDER APP ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>
</html>
