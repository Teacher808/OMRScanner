<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMR ScanMaster System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- jsPDF & html2canvas for Exporting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        .omr-template {
            /* Width and height are now injected dynamically via inline styles */
            background-color: white;
            color: black;
            border: 4px solid black;
            box-sizing: border-box;
            padding: 0.4in;
            position: relative;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        .omr-bubble {
            /* Dynamic sizing based on CSS variables calculated by React */
            width: var(--bubble-size, 14px);
            height: var(--bubble-size, 14px);
            font-size: var(--font-size, 8px);
            border: 1px solid black;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #ccc;
            margin: 1px;
            background-color: transparent;
            flex-shrink: 0;
        }

        .omr-bubble.filled {
            background-color: black !important;
            color: black !important;
        }

        @media print {
            body * { visibility: hidden; }
            #printable-template, #printable-template * { visibility: visible; }
            #printable-template {
                position: absolute;
                left: 0;
                top: 0;
                margin: 0;
                page-break-after: always;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 🔧 CONFIGURATION
        // Paste your Google Apps Script URL here:
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz9Y2vFk6MjoPSobkyn4WH50hethMnYA7dsmyUURmAY2apcspro4IpGOonQRyGiMvus/exec";
        
        const isCloudConfigured = GAS_URL && GAS_URL.startsWith("https://script.google.com");

        const { useState, useEffect, useRef } = React;

        // --- ICONS ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Home: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
                Users: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
                Book: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>,
                FileText: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>,
                Scan: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/></svg>,
                Trash: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
                Download: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
                Printer: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>,
                Lock: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
                Cloud: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>,
                LogOut: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
                Save: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
                Camera: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
                Upload: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
                RefreshCw: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
                Power: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>,
                VideoOff: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10.66 6H14a2 2 0 0 1 2 2v2.34l1 1L22 8v8l-2.08-2.08-2.58-2.58L12.76 10l-2.1-2.1z"/><path d="M2 2l20 20"/><path d="M16 16v2a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h2.34"/></svg>
            };
            return icons[name] || null;
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);

        // --- AUTHENTICATION SCREEN ---
        const AuthScreen = ({ onLogin }) => {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [msg, setMsg] = useState('');

            const handleAuth = async (action) => {
                if (!username || !password) return setError("Username and password required.");
                setError(''); setMsg('');
                setLoading(true);

                if (isCloudConfigured) {
                    try {
                        const res = await fetch(GAS_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action, username, password })
                        });
                        const data = await res.json();
                        if (data.status === 'success') {
                            onLogin({ username, password }, data.data);
                            if (action === 'REGISTER') setMsg("Registered on Google Drive! Please login.");
                        } else {
                            setError(data.message || "Authentication failed.");
                        }
                    } catch (err) {
                        setError("Network error. Make sure your Apps Script Web App is deployed and URL is correct.");
                    }
                } else {
                    const localUsers = JSON.parse(localStorage.getItem('omr_local_users') || '{}');
                    
                    if (action === 'REGISTER') {
                        if (localUsers[username]) {
                            setError("Username already exists locally.");
                        } else {
                            localUsers[username] = password;
                            localStorage.setItem('omr_local_users', JSON.stringify(localUsers));
                            localStorage.setItem(`omr_db_${username}`, JSON.stringify({ classes: [], students: [], exams: [], submissions: [] }));
                            setMsg("Registered successfully locally! You can now login.");
                        }
                    } else if (action === 'LOGIN') {
                        if (localUsers[username] !== password) {
                            setError("Invalid username or password.");
                        } else {
                            const userDbStr = localStorage.getItem(`omr_db_${username}`);
                            const userDb = userDbStr ? JSON.parse(userDbStr) : { classes: [], students: [], exams: [], submissions: [] };
                            onLogin({ username, password }, userDb);
                        }
                    }
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
                        <div className="flex justify-center mb-4">
                            <div className="bg-blue-100 p-4 rounded-full text-blue-600">
                                <Icon name="Lock" size={32} />
                            </div>
                        </div>
                        <h2 className="text-2xl font-black text-center mb-2">ScanMaster Login</h2>
                        <p className="text-slate-500 text-sm text-center mb-8">Register an account or login to access your data.</p>
                        
                        <div className="space-y-4">
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Username</label>
                                <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter username..." />
                            </div>

                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Password</label>
                                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter password..." />
                            </div>

                            {!isCloudConfigured && (
                                <p className="text-xs text-orange-600 bg-orange-50 p-2 rounded border border-orange-200 text-center">
                                    ⚠️ Cloud URL not configured. Data will be saved locally in this browser.
                                </p>
                            )}

                            {error && <p className="text-red-500 text-sm text-center font-medium bg-red-50 p-2 rounded border border-red-200">{error}</p>}
                            {msg && <p className="text-green-600 text-sm text-center font-medium bg-green-50 p-2 rounded border border-green-200">{msg}</p>}

                            <div className="flex gap-4 pt-4">
                                <button onClick={() => handleAuth('LOGIN')} disabled={loading} className="flex-1 bg-slate-900 text-white py-2 rounded-lg font-bold hover:bg-slate-800 disabled:opacity-50 transition-colors">
                                    Login
                                </button>
                                <button onClick={() => handleAuth('REGISTER')} disabled={loading} className="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 disabled:opacity-50 transition-colors">
                                    Register
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem('omr_current_user');
                return saved ? JSON.parse(saved) : null;
            });
            const [currentView, setCurrentView] = useState('dashboard');
            const [isSyncing, setIsSyncing] = useState(false);
            
            const [db, setDb] = useState({ classes: [], students: [], exams: [], submissions: [] });

            useEffect(() => {
                if (user && !isCloudConfigured) {
                    const storedDb = localStorage.getItem(`omr_db_${user.username}`);
                    if (storedDb) {
                        setDb(JSON.parse(storedDb));
                    }
                }
            }, [user]);

            useEffect(() => {
                if (user && db.classes) {
                    localStorage.setItem(`omr_db_${user.username}`, JSON.stringify(db));
                }
            }, [db, user]);

            const handleLogin = (loggedUser, loadedDb) => {
                setUser(loggedUser);
                localStorage.setItem('omr_current_user', JSON.stringify(loggedUser));
                
                if (loadedDb) {
                    setDb(loadedDb);
                    localStorage.setItem(`omr_db_${loggedUser.username}`, JSON.stringify(loadedDb));
                }
            };

            const handleLogout = () => {
                setUser(null);
                setDb({ classes: [], students: [], exams: [], submissions: [] });
                localStorage.removeItem('omr_current_user');
            };

            const handleCloudSave = async () => {
                if (!isCloudConfigured) {
                    alert("No Cloud URL configured in the code. Data is only saved locally.");
                    return;
                }
                setIsSyncing(true);
                try {
                    const res = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'SAVE', username: user.username, password: user.password, data: db })
                    });
                    const data = await res.json();
                    if (data.status === 'success') {
                        alert("Successfully Synced to Google Drive!");
                    } else {
                        alert("Error syncing: " + data.message);
                    }
                } catch (err) {
                    alert("Network error. Could not reach the server.");
                }
                setIsSyncing(false);
            };

            if (!user) {
                return <AuthScreen onLogin={handleLogin} />;
            }

            const renderView = () => {
                switch (currentView) {
                    case 'dashboard': return <Dashboard db={db} user={user} />;
                    case 'classes': return <ClassManager db={db} setDb={setDb} />;
                    case 'students': return <StudentManager db={db} setDb={setDb} />;
                    case 'exams': return <ExamManager db={db} setDb={setDb} setCurrentView={setCurrentView} />;
                    case 'scanner': return <Scanner db={db} setDb={setDb} />;
                    default: return <Dashboard db={db} user={user} />;
                }
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-64 bg-slate-900 text-white flex flex-col">
                        <div className="p-6">
                            <h1 className="text-2xl font-black flex items-center gap-2">
                                <Icon name="Scan" size={28} className="text-blue-400"/>
                                ScanMaster
                            </h1>
                            <p className="text-slate-400 text-xs mt-1">OMR Evaluation System</p>
                        </div>
                        <nav className="flex-1 px-4 space-y-2">
                            {[
                                { id: 'dashboard', icon: 'Home', label: 'Dashboard' },
                                { id: 'classes', icon: 'Book', label: 'Classes' },
                                { id: 'students', icon: 'Users', label: 'Students' },
                                { id: 'exams', icon: 'FileText', label: 'Exams & Templates' },
                                { id: 'scanner', icon: 'Scan', label: 'Scan & Grade' },
                            ].map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setCurrentView(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-colors ${currentView === item.id ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-300 hover:bg-slate-800'}`}
                                >
                                    <Icon name={item.icon} size={18} />
                                    <span className="font-medium">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        
                        {/* User & Cloud Controls */}
                        <div className="p-4 border-t border-slate-700 bg-slate-800/50">
                            <div className="flex items-center gap-3 mb-4">
                                <div className="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-slate-300">
                                    <Icon name="Users" size={16} />
                                </div>
                                <div className="overflow-hidden">
                                    <p className="text-sm font-bold truncate">{user.username}</p>
                                    <p className="text-xs text-slate-400 truncate flex items-center gap-1">
                                        {isCloudConfigured ? <><span className="w-2 h-2 rounded-full bg-green-500"></span> Cloud Sync On</> : <><span className="w-2 h-2 rounded-full bg-orange-500"></span> Local Only</>}
                                    </p>
                                </div>
                            </div>
                            
                            <div className="flex gap-2">
                                {isCloudConfigured && (
                                    <button onClick={handleCloudSave} disabled={isSyncing} className="flex-1 flex justify-center items-center gap-1 bg-green-600 hover:bg-green-700 text-white py-1.5 rounded-lg text-xs font-bold transition">
                                        {isSyncing ? 'Syncing...' : <><Icon name="Cloud" size={14} /> Sync</>}
                                    </button>
                                )}
                                <button onClick={handleLogout} className="flex-1 flex justify-center items-center gap-1 bg-slate-700 hover:bg-red-600 text-white py-1.5 rounded-lg text-xs font-bold transition">
                                    <Icon name="LogOut" size={14} /> Logout
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 overflow-auto bg-slate-50 p-8">
                        {renderView()}
                    </div>
                </div>
            );
        };

        // --- COMPONENTS ---

        const Dashboard = ({ db, user }) => (
            <div className="animate-fade-in">
                <h2 className="text-3xl font-black text-slate-800 mb-2">Welcome, {user.username}!</h2>
                <p className="text-slate-500 mb-8">Here's the overview of your classes and evaluation data.</p>
                <div className="grid grid-cols-4 gap-6">
                    <div className="p-6 bg-white rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                        <div className="p-4 bg-blue-100 text-blue-600 rounded-xl"><Icon name="Book" size={24}/></div>
                        <div><p className="text-sm font-bold text-slate-400 uppercase">Classes</p><p className="text-3xl font-black">{db.classes?.length || 0}</p></div>
                    </div>
                    <div className="p-6 bg-white rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                        <div className="p-4 bg-green-100 text-green-600 rounded-xl"><Icon name="Users" size={24}/></div>
                        <div><p className="text-sm font-bold text-slate-400 uppercase">Students</p><p className="text-3xl font-black">{db.students?.length || 0}</p></div>
                    </div>
                    <div className="p-6 bg-white rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                        <div className="p-4 bg-purple-100 text-purple-600 rounded-xl"><Icon name="FileText" size={24}/></div>
                        <div><p className="text-sm font-bold text-slate-400 uppercase">Exams</p><p className="text-3xl font-black">{db.exams?.length || 0}</p></div>
                    </div>
                    <div className="p-6 bg-white rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                        <div className="p-4 bg-orange-100 text-orange-600 rounded-xl"><Icon name="Scan" size={24}/></div>
                        <div><p className="text-sm font-bold text-slate-400 uppercase">Scans</p><p className="text-3xl font-black">{db.submissions?.length || 0}</p></div>
                    </div>
                </div>
            </div>
        );

        const ClassManager = ({ db, setDb }) => {
            const [name, setName] = useState('');
            
            const addClass = (e) => {
                e.preventDefault();
                if (!name.trim()) return;
                setDb(prev => ({ ...prev, classes: [...(prev.classes || []), { id: generateId(), name }] }));
                setName('');
            };

            const deleteClass = (id) => {
                setDb(prev => ({ ...prev, classes: prev.classes.filter(c => c.id !== id) }));
            };

            return (
                <div>
                    <h2 className="text-2xl font-bold text-slate-800 mb-6">Manage Classes & Sections</h2>
                    <div className="grid grid-cols-3 gap-8">
                        <div className="col-span-1 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-fit">
                            <h3 className="font-bold text-lg mb-4">Add New Class</h3>
                            <form onSubmit={addClass} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">Class/Section Name</label>
                                    <input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. Grade 10 - Newton" required />
                                </div>
                                <button type="submit" className="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition-colors">Add Class</button>
                            </form>
                        </div>
                        <div className="col-span-2 bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 border-b">
                                    <tr>
                                        <th className="p-4 font-semibold text-slate-600">Class Name</th>
                                        <th className="p-4 font-semibold text-slate-600">Students Enrolled</th>
                                        <th className="p-4 font-semibold text-slate-600 text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {(db.classes || []).map(c => (
                                        <tr key={c.id} className="border-b last:border-0 hover:bg-slate-50">
                                            <td className="p-4 font-medium">{c.name}</td>
                                            <td className="p-4">{(db.students || []).filter(s => s.classId === c.id).length}</td>
                                            <td className="p-4 text-right">
                                                <button onClick={() => deleteClass(c.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors"><Icon name="Trash" size={16}/></button>
                                            </td>
                                        </tr>
                                    ))}
                                    {(!db.classes || db.classes.length === 0) && <tr><td colSpan="3" className="p-8 text-center text-slate-500">No classes added yet.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const StudentManager = ({ db, setDb }) => {
            const [mode, setMode] = useState('single'); 
            const [name, setName] = useState('');
            const [roll, setRoll] = useState('');
            const [classId, setClassId] = useState('');
            const [bulkData, setBulkData] = useState('');

            const addSingle = (e) => {
                e.preventDefault();
                if (!name || !roll || !classId) return;
                setDb(prev => ({ ...prev, students: [...(prev.students || []), { id: generateId(), name, rollNumber: roll, classId }] }));
                setName(''); setRoll('');
            };

            const addBulk = (e) => {
                e.preventDefault();
                if (!bulkData.trim() || !classId) return;
                const rows = bulkData.split('\n');
                const newStudents = rows.map(row => {
                    const [sName, sRoll] = row.split(',').map(s => s.trim());
                    if (sName && sRoll) return { id: generateId(), name: sName, rollNumber: sRoll, classId };
                    return null;
                }).filter(Boolean);
                
                setDb(prev => ({ ...prev, students: [...(prev.students || []), ...newStudents] }));
                setBulkData('');
            };

            const deleteStudent = (id) => setDb(prev => ({ ...prev, students: prev.students.filter(s => s.id !== id) }));

            return (
                <div>
                    <h2 className="text-2xl font-bold text-slate-800 mb-6">Manage Students</h2>
                    <div className="grid grid-cols-3 gap-8">
                        <div className="col-span-1 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-fit">
                            <div className="flex bg-slate-100 p-1 rounded-lg mb-6">
                                <button onClick={() => setMode('single')} className={`flex-1 py-1 text-sm font-medium rounded-md transition-colors ${mode === 'single' ? 'bg-white shadow text-slate-900' : 'text-slate-500'}`}>Single</button>
                                <button onClick={() => setMode('bulk')} className={`flex-1 py-1 text-sm font-medium rounded-md transition-colors ${mode === 'bulk' ? 'bg-white shadow text-slate-900' : 'text-slate-500'}`}>Bulk CSV</button>
                            </div>

                            {mode === 'single' ? (
                                <form onSubmit={addSingle} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Select Class</label>
                                        <select value={classId} onChange={e => setClassId(e.target.value)} className="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required>
                                            <option value="">-- Choose Class --</option>
                                            {(db.classes || []).map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                        </select>
                                    </div>
                                    <div><label className="block text-sm font-medium text-slate-700 mb-1">Student Name</label><input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required /></div>
                                    <div><label className="block text-sm font-medium text-slate-700 mb-1">Roll Number</label><input type="number" value={roll} onChange={e => setRoll(e.target.value)} className="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required /></div>
                                    <button type="submit" className="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition-colors">Add Student</button>
                                </form>
                            ) : (
                                <form onSubmit={addBulk} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Select Class</label>
                                        <select value={classId} onChange={e => setClassId(e.target.value)} className="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required>
                                            <option value="">-- Choose Class --</option>
                                            {(db.classes || []).map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Paste CSV Data (Name, RollNumber)</label>
                                        <textarea value={bulkData} onChange={e => setBulkData(e.target.value)} className="w-full p-2 border rounded-lg h-32 font-mono text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="John Doe, 1001&#10;Jane Smith, 1002" required></textarea>
                                    </div>
                                    <button type="submit" className="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition-colors">Import Students</button>
                                </form>
                            )}
                        </div>
                        <div className="col-span-2 bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 border-b">
                                    <tr>
                                        <th className="p-4 font-semibold text-slate-600">Roll No.</th>
                                        <th className="p-4 font-semibold text-slate-600">Name</th>
                                        <th className="p-4 font-semibold text-slate-600">Class</th>
                                        <th className="p-4 font-semibold text-slate-600 text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {(db.students || []).map(s => (
                                        <tr key={s.id} className="border-b last:border-0 hover:bg-slate-50">
                                            <td className="p-4 font-mono text-slate-600">{s.rollNumber}</td>
                                            <td className="p-4 font-medium">{s.name}</td>
                                            <td className="p-4 text-slate-600">{(db.classes || []).find(c => c.id === s.classId)?.name || 'Unknown'}</td>
                                            <td className="p-4 text-right">
                                                <button onClick={() => deleteStudent(s.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors"><Icon name="Trash" size={16}/></button>
                                            </td>
                                        </tr>
                                    ))}
                                    {(!db.students || db.students.length === 0) && <tr><td colSpan="4" className="p-8 text-center text-slate-500">No students added yet.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const ExamManager = ({ db, setDb }) => {
            const [editingExamId, setEditingExamId] = useState(null);

            const createNewExam = () => {
                const newExam = {
                    id: generateId(),
                    name: 'New Exam ' + ((db.exams || []).length + 1),
                    classId: db.classes?.[0]?.id || '',
                    date: new Date().toISOString().split('T')[0],
                    templateConfig: {
                        paperSize: 'Letter', // Default to Short paper size
                        rollDigits: 4,
                        instructions: 'Please shade circles completely. Use black or blue ink. Do not fold or tear the paper.',
                        sections: [
                            { id: generateId(), type: 'MCQ', count: 50, options: 4, startNumber: 1 }
                        ]
                    },
                    answerKey: {} 
                };
                setDb(prev => ({ ...prev, exams: [...(prev.exams || []), newExam] }));
                setEditingExamId(newExam.id);
            };

            const deleteExam = (id) => {
                setDb(prev => ({ ...prev, exams: prev.exams.filter(e => e.id !== id), submissions: prev.submissions.filter(s => s.examId !== id) }));
                if (editingExamId === id) setEditingExamId(null);
            };

            if (editingExamId) {
                const exam = db.exams.find(e => e.id === editingExamId);
                return <TemplateEditor exam={exam} db={db} setDb={setDb} onBack={() => setEditingExamId(null)} />;
            }

            return (
                <div>
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold text-slate-800">Manage Exams & Templates</h2>
                        <button onClick={createNewExam} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-700 flex items-center gap-2 transition-colors">
                            <Icon name="FileText" size={18}/> Create Exam
                        </button>
                    </div>

                    <div className="grid grid-cols-3 gap-6">
                        {(db.exams || []).map(exam => (
                            <div key={exam.id} className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col">
                                <h3 className="text-xl font-bold mb-1">{exam.name}</h3>
                                <p className="text-slate-500 text-sm mb-4">Class: {(db.classes || []).find(c => c.id === exam.classId)?.name || 'Unassigned'} • Date: {exam.date}</p>
                                
                                <div className="mt-auto flex gap-2">
                                    <button onClick={() => setEditingExamId(exam.id)} className="flex-1 bg-slate-100 text-slate-700 py-2 rounded-lg font-medium hover:bg-slate-200 text-sm text-center transition-colors">Edit</button>
                                    <button onClick={() => deleteExam(exam.id)} className="px-3 bg-red-50 text-red-500 rounded-lg hover:bg-red-100 transition-colors"><Icon name="Trash" size={16}/></button>
                                </div>
                            </div>
                        ))}
                        {(!db.exams || db.exams.length === 0) && <div className="col-span-3 text-center p-12 bg-white rounded-2xl border border-slate-200 text-slate-500">No exams created yet.</div>}
                    </div>
                </div>
            );
        };

        const TemplateEditor = ({ exam, db, setDb, onBack }) => {
            const [localExam, setLocalExam] = useState(exam);

            // Ensure compatibility with old data missing paperSize
            if (!localExam.templateConfig.paperSize) {
                localExam.templateConfig.paperSize = 'Letter';
            }

            const updateExam = (updates) => {
                const updated = { ...localExam, ...updates };
                setLocalExam(updated);
                setDb(prev => ({
                    ...prev,
                    exams: prev.exams.map(e => e.id === updated.id ? updated : e)
                }));
            };

            const addSection = (type) => {
                const currentSections = localExam.templateConfig.sections;
                let startNumber = 1;
                if (currentSections.length > 0) {
                    const last = currentSections[currentSections.length - 1];
                    startNumber = last.startNumber + last.count;
                }
                const newSection = { id: generateId(), type, count: 10, options: 4, startNumber };
                updateExam({ templateConfig: { ...localExam.templateConfig, sections: [...currentSections, newSection] } });
            };

            const removeSection = (id) => {
                updateExam({ templateConfig: { ...localExam.templateConfig, sections: localExam.templateConfig.sections.filter(s => s.id !== id) } });
            };

            const exportPDF = () => {
                const el = document.getElementById('printable-template');
                
                // Get Paper Dimensions based on selection
                const dims = {
                    'Letter': { w: 8.5, h: 11, format: 'letter' },
                    'Legal': { w: 8.5, h: 14, format: 'legal' },
                    'A4': { w: 8.27, h: 11.69, format: 'a4' }
                };
                const pSize = dims[localExam.templateConfig.paperSize];

                html2canvas(el, { scale: 3 }).then(canvas => {
                    const imgData = canvas.toDataURL('image/jpeg', 1.0);
                    const pdf = new window.jspdf.jsPDF('p', 'in', pSize.format);
                    pdf.addImage(imgData, 'JPEG', 0, 0, pSize.w, pSize.h);
                    pdf.save(`${localExam.name}_OMR.pdf`);
                });
            };

            return (
                <div className="flex gap-8">
                    <div className="w-80 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col overflow-y-auto max-h-[85vh] shrink-0">
                        <button onClick={onBack} className="text-sm font-medium text-slate-500 hover:text-slate-800 mb-6 flex items-center gap-1 transition-colors">&larr; Back to Exams</button>
                        
                        <h3 className="font-bold text-lg mb-4">Exam Settings</h3>
                        <div className="space-y-4 mb-8">
                            <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1">Exam Name</label><input type="text" value={localExam.name} onChange={e => updateExam({name: e.target.value})} className="w-full p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" /></div>
                            
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Paper Size</label>
                                <select value={localExam.templateConfig.paperSize} onChange={e => updateExam({templateConfig: {...localExam.templateConfig, paperSize: e.target.value}})} className="w-full p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="Letter">Short (Letter - 8.5" x 11")</option>
                                    <option value="Legal">Long (Legal - 8.5" x 14")</option>
                                    <option value="A4">A4 (8.27" x 11.69")</option>
                                </select>
                            </div>

                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Assign Class</label>
                                <select value={localExam.classId} onChange={e => updateExam({classId: e.target.value})} className="w-full p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="">-- Choose --</option>
                                    {(db.classes || []).map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                            </div>

                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Roll Number Digits ({localExam.templateConfig.rollDigits})</label>
                                <input type="range" min="2" max="6" value={localExam.templateConfig.rollDigits} onChange={e => updateExam({templateConfig: {...localExam.templateConfig, rollDigits: parseInt(e.target.value)}})} className="w-full" />
                            </div>
                            
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Exam Instructions</label>
                                <textarea 
                                    value={localExam.templateConfig.instructions !== undefined ? localExam.templateConfig.instructions : ''} 
                                    onChange={e => updateExam({templateConfig: {...localExam.templateConfig, instructions: e.target.value}})} 
                                    className="w-full p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 resize-none h-20" 
                                    placeholder="Enter instructions for students to read..."></textarea>
                            </div>
                        </div>

                        <h3 className="font-bold text-lg mb-4">Template Sections</h3>
                        <div className="space-y-4 flex-1">
                            {localExam.templateConfig.sections.map((sec, idx) => (
                                <div key={sec.id} className="p-3 border rounded-lg bg-slate-50 relative">
                                    <button onClick={() => removeSection(sec.id)} className="absolute top-2 right-2 text-red-400 hover:text-red-600 transition-colors"><Icon name="Trash" size={14}/></button>
                                    <p className="font-bold text-sm mb-2">{sec.type} Section</p>
                                    <div className="flex items-center gap-4">
                                        <div className="flex items-center gap-2">
                                            <label className="text-xs text-slate-600">Count:</label>
                                            <input type="number" min="1" max="150" value={sec.count} onChange={e => {
                                                const newSecs = [...localExam.templateConfig.sections];
                                                newSecs[idx].count = parseInt(e.target.value) || 1;
                                                updateExam({templateConfig: {...localExam.templateConfig, sections: newSecs}});
                                            }} className="w-16 p-1 border rounded text-xs outline-none focus:ring-2 focus:ring-blue-500" />
                                        </div>
                                        {sec.type === 'MCQ' && (
                                            <div className="flex items-center gap-2">
                                                <label className="text-xs text-slate-600">Options:</label>
                                                <input type="number" min="2" max="10" value={sec.options || 4} onChange={e => {
                                                    const newSecs = [...localExam.templateConfig.sections];
                                                    newSecs[idx].options = parseInt(e.target.value) || 4;
                                                    updateExam({templateConfig: {...localExam.templateConfig, sections: newSecs}});
                                                }} className="w-16 p-1 border rounded text-xs outline-none focus:ring-2 focus:ring-blue-500" />
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                            <div className="flex gap-2">
                                <button onClick={() => addSection('MCQ')} className="flex-1 bg-white border border-slate-300 text-slate-700 py-1 rounded text-xs font-medium hover:bg-slate-50 transition-colors">+ MCQ</button>
                                <button onClick={() => addSection('T/F')} className="flex-1 bg-white border border-slate-300 text-slate-700 py-1 rounded text-xs font-medium hover:bg-slate-50 transition-colors">+ T/F</button>
                            </div>
                        </div>

                        <div className="mt-8 pt-4 border-t space-y-2">
                            <button onClick={() => window.print()} className="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 flex justify-center items-center gap-2 transition-colors"><Icon name="Printer" size={16}/> Print OMR</button>
                            <button onClick={exportPDF} className="w-full bg-slate-800 text-white py-2 rounded-lg font-medium hover:bg-slate-900 text-sm flex justify-center items-center gap-1 transition-colors"><Icon name="Download" size={14}/> PDF Export</button>
                        </div>
                    </div>

                    <div className="flex-1 bg-slate-200 rounded-2xl flex justify-center items-start overflow-auto p-8 border border-slate-300 shadow-inner">
                        <div id="printable-template" className="bg-white shadow-2xl transition-all duration-300">
                            <OMRSheet config={localExam.templateConfig} title={localExam.name} classNameName={(db.classes || []).find(c => c.id === localExam.classId)?.name} />
                        </div>
                    </div>
                </div>
            );
        };

        const OMRSheet = ({ config, title, classNameName, hideAnswers = true, answerData = {} }) => {
            
            // 1. Configure the Paper Size Dimensions
            const paperDims = {
                'Letter': { w: 8.5, h: 11 },
                'Legal': { w: 8.5, h: 14 },
                'A4': { w: 8.27, h: 11.69 }
            };
            const pSize = paperDims[config.paperSize || 'Letter'];

            // 2. Aggregate counts and complexity
            const totalQuestions = config.sections.reduce((acc, sec) => acc + sec.count, 0) || 1;
            const maxOptions = Math.max(...config.sections.map(s => s.options || 4), 2);

            // 3. Dynamic Auto-Adjustment Calculation Engine
            // This tests different column configurations to maximize the bubble size for optimal legibility
            let bestBubbleSize = 0;
            let bestCols = 1;
            
            // Available space estimation (Header takes about 3.5 inches, padding 1 inch total)
            const availHeightPx = (pSize.h - 3.5) * 96; 
            const availWidthPx = (pSize.w - 1.0) * 96; 
            
            for(let c = 1; c <= 5; c++) {
                const itemsPerCol = Math.ceil(totalQuestions / c);
                const maxRowHeight = availHeightPx / itemsPerCol;
                const maxColWidth = availWidthPx / c;
                
                // Bubble size is constrained by Row Height and Column Width (accounting for Option Count + Question Number spacing)
                const widthConstraint = (maxColWidth - 40) / maxOptions; 
                const heightConstraint = maxRowHeight * 0.7; // 70% of row height to allow breathing room
                
                const bSize = Math.min(widthConstraint, heightConstraint, 18); // Max 18px bubble size
                if (bSize > bestBubbleSize) {
                    bestBubbleSize = bSize;
                    bestCols = c;
                }
            }
            
            // Ensure minimum legibility limits
            const finalBubbleSize = Math.max(bestBubbleSize, 7); // Floor at 7px for extreme cramming (150Q / 10 Options)
            const fontSize = Math.max(finalBubbleSize * 0.55, 6); // Font size scales relative to bubble size

            return (
                <div className="omr-template flex flex-col" id="omr-template-calibration" style={{
                    width: `${pSize.w}in`,
                    height: `${pSize.h}in`,
                    '--bubble-size': `${finalBubbleSize}px`,
                    '--font-size': `${fontSize}px`
                }}>
                    {/* Header Section */}
                    <div className="flex justify-between items-start mb-2 border-b-2 border-black pb-2 shrink-0">
                        <div className="flex-1">
                            <h1 className="text-xl font-black uppercase leading-tight">{title || 'Exam Title'}</h1>
                            <p className="text-xs font-bold mt-1">Class: {classNameName || '____________________'}</p>
                            <div className="mt-3 space-y-2">
                                <p className="text-xs">Name: _________________________________________</p>
                                <p className="text-xs">Date: __________________ Score: _______________</p>
                            </div>
                        </div>
                        
                        <div className="ml-4 pl-4 border-l-2 border-black">
                            <p className="text-[10px] font-bold text-center mb-1">ROLL NO.</p>
                            <div className="flex gap-1 justify-center">
                                {Array.from({ length: config.rollDigits }).map((_, colIdx) => (
                                    <div key={`roll-col-${colIdx}`} className="flex flex-col items-center gap-[2px]">
                                        <div className="w-4 h-4 border border-black mb-1"></div>
                                        {Array.from({ length: 10 }).map((_, num) => {
                                            const isFilled = answerData.roll && answerData.roll[colIdx] === num;
                                            return (
                                                <div key={`r-${colIdx}-${num}`} className={`omr-bubble ${isFilled ? 'filled' : ''}`} data-type="roll" data-col={colIdx} data-val={num}>
                                                    {num}
                                                </div>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* --- INSTRUCTIONS SECTION --- */}
                    {config.instructions && config.instructions.trim() !== '' && (
                        <div className="border border-black p-[4px] mb-3 bg-slate-50 shrink-0">
                            <p className="text-[9px] leading-tight">
                                <span className="font-bold uppercase mr-1">Instructions:</span>
                                {config.instructions}
                            </p>
                        </div>
                    )}

                    {/* Questions Section - Auto adjusting dynamic grid */}
                    <div className="flex-1 overflow-hidden" style={{ 
                        columnCount: bestCols, 
                        columnGap: '16px', 
                        columnFill: 'auto',
                        height: '100%' 
                    }}>
                        {config.sections.map(sec => (
                            <React.Fragment key={sec.id}>
                                <h4 className="font-bold border-b border-black mb-1.5 pb-[2px] mt-2 first:mt-0" style={{ pageBreakAfter: 'avoid', breakAfter: 'avoid', fontSize: `${Math.max(fontSize * 1.2, 10)}px` }}>{sec.type} Section</h4>
                                {Array.from({ length: sec.count }).map((_, qIdx) => {
                                    const qNum = sec.startNumber + qIdx;
                                    
                                    const labels = sec.type === 'MCQ' ? ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'].slice(0, sec.options || 4) : ['T', 'F'];
                                    return (
                                        <div key={`q-${qNum}`} className="flex items-center gap-1 mb-[4px]" style={{ pageBreakInside: 'avoid', breakInside: 'avoid' }}>
                                            <span className="font-bold text-right shrink-0" style={{ width: `${Math.max(fontSize * 2.5, 20)}px`, fontSize: `${fontSize * 1.1}px` }}>{qNum}.</span>
                                            <div className="flex gap-[2px] flex-wrap flex-1">
                                                {labels.map((lbl) => {
                                                    const isFilled = answerData.answers && answerData.answers[`q-${qNum}`] === lbl;
                                                    return (
                                                        <div key={`opt-${lbl}`} className={`omr-bubble ${isFilled ? 'filled' : ''}`} data-type="q" data-q={qNum} data-val={lbl}>{lbl}</div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                })}
                            </React.Fragment>
                        ))}
                    </div>
                </div>
            );
        };

        const Scanner = ({ db, setDb }) => {
            const [selectedExamId, setSelectedExamId] = useState('');
            const [scanMode, setScanMode] = useState('upload'); // 'upload' or 'camera'
            const [isCameraOn, setIsCameraOn] = useState(false);
            
            const [imageSrc, setImageSrc] = useState(null);
            const [scanResult, setScanResult] = useState(null);
            const [isScanning, setIsScanning] = useState(false);
            
            const hiddenTemplateRef = useRef(null);
            const canvasRef = useRef(null);
            const videoRef = useRef(null);

            const stopCamera = () => {
                if (videoRef.current && videoRef.current.srcObject) {
                    videoRef.current.srcObject.getTracks().forEach(track => track.stop());
                    videoRef.current.srcObject = null;
                }
                setIsCameraOn(false);
            };

            useEffect(() => {
                return () => stopCamera();
            }, []);

            useEffect(() => {
                if (scanMode === 'upload') {
                    stopCamera();
                }
            }, [scanMode]);

            const startCamera = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment' }
                    });
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                        setIsCameraOn(true);
                    }
                } catch (err) {
                    console.error("Camera error:", err);
                    alert("Unable to access camera. Please check your browser permissions.");
                    setIsCameraOn(false);
                    setScanMode('upload');
                }
            };

            const capturePhoto = () => {
                if (videoRef.current) {
                    const canvas = document.createElement('canvas');
                    canvas.width = videoRef.current.videoWidth;
                    canvas.height = videoRef.current.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(videoRef.current, 0, 0, canvas.width, canvas.height);
                    setImageSrc(canvas.toDataURL('image/jpeg'));
                    stopCamera(); 
                }
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setImageSrc(event.target.result);
                        setScanResult(null);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const processScan = () => {
                if (!imageSrc || !selectedExamId) return;
                setIsScanning(true);

                const exam = db.exams.find(e => e.id === selectedExamId);
                const templateConfig = exam.templateConfig;

                const calibContainer = hiddenTemplateRef.current.querySelector('#omr-template-calibration');
                const calibRect = calibContainer.getBoundingClientRect();
                const bubbles = calibContainer.querySelectorAll('.omr-bubble');
                
                const expectedCoords = Array.from(bubbles).map(b => {
                    const br = b.getBoundingClientRect();
                    return {
                        type: b.dataset.type,
                        col: b.dataset.col,
                        val: b.dataset.val,
                        q: b.dataset.q,
                        // Relative coordinates mean they adapt automatically regardless of paper size!
                        rx: (br.left - calibRect.left) / calibRect.width,
                        ry: (br.top - calibRect.top) / calibRect.height,
                        rw: br.width / calibRect.width,
                        rh: br.height / calibRect.height
                    };
                });

                const img = new Image();
                img.onload = () => {
                    const cvs = canvasRef.current;
                    const ctx = cvs.getContext('2d', { willReadFrequently: true });
                    cvs.width = img.width;
                    cvs.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    const imgData = ctx.getImageData(0, 0, cvs.width, cvs.height);
                    const pixels = imgData.data;

                    const getDarkness = (rx, ry, rw, rh) => {
                        const startX = Math.floor(rx * cvs.width);
                        const startY = Math.floor(ry * cvs.height);
                        const w = Math.floor(rw * cvs.width);
                        const h = Math.floor(rh * cvs.height);
                        
                        let totalDarkness = 0;
                        let count = 0;
                        for (let y = startY; y < startY + h; y++) {
                            for (let x = startX; x < startX + w; x++) {
                                const i = (y * cvs.width + x) * 4;
                                const brightness = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
                                totalDarkness += (255 - brightness);
                                count++;
                            }
                        }
                        return count > 0 ? totalDarkness / count : 0;
                    };

                    const rawResults = expectedCoords.map(c => ({
                        ...c,
                        darkness: getDarkness(c.rx, c.ry, c.rw, c.rh)
                    }));

                    const parsedRoll = {};
                    const parsedAnswers = {};

                    for (let col = 0; col < templateConfig.rollDigits; col++) {
                        const colBubbles = rawResults.filter(r => r.type === 'roll' && parseInt(r.col) === col);
                        const darkest = colBubbles.reduce((prev, curr) => (curr.darkness > prev.darkness ? curr : prev), {darkness: 0});
                        if (darkest.darkness > 50) parsedRoll[col] = parseInt(darkest.val);
                    }

                    const allQNums = [...new Set(rawResults.filter(r => r.type === 'q').map(r => r.q))];
                    allQNums.forEach(qNum => {
                        const qBubbles = rawResults.filter(r => r.type === 'q' && r.q === qNum);
                        const darkest = qBubbles.reduce((prev, curr) => (curr.darkness > prev.darkness ? curr : prev), {darkness: 0});
                        if (darkest.darkness > 50) parsedAnswers[`q-${qNum}`] = darkest.val;
                    });

                    let finalRollStr = '';
                    for (let i = 0; i < templateConfig.rollDigits; i++) {
                        finalRollStr += (parsedRoll[i] !== undefined ? parsedRoll[i] : '?');
                    }

                    const studentMatch = (db.students || []).find(s => s.rollNumber === finalRollStr);

                    setScanResult({
                        roll: finalRollStr,
                        student: studentMatch,
                        answers: parsedAnswers
                    });

                    setIsScanning(false);
                };
                img.src = imageSrc;
            };

            const saveResult = () => {
                if (!scanResult || !selectedExamId) return;
                const newSub = {
                    id: generateId(),
                    examId: selectedExamId,
                    studentId: scanResult.student?.id || 'unknown',
                    rollScanned: scanResult.roll,
                    answers: scanResult.answers,
                    timestamp: new Date().toISOString()
                };
                setDb(prev => ({ ...prev, submissions: [...(prev.submissions || []), newSub] }));
                setScanResult(null);
                setImageSrc(null);
                
                if (scanMode === 'camera') startCamera(); 

                alert("Scan saved successfully!");
            };

            const activeExam = (db.exams || []).find(e => e.id === selectedExamId);

            return (
                <div className="flex gap-8">
                    <div className="w-80 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col h-fit">
                        <h2 className="text-xl font-bold mb-4">Scan & Grade</h2>
                        
                        <div className="flex bg-slate-100 p-1 rounded-lg mb-6">
                            <button onClick={() => { setScanMode('upload'); setImageSrc(null); setScanResult(null); }} className={`flex-1 flex justify-center items-center gap-2 py-1.5 text-sm font-medium rounded-md transition-colors ${scanMode === 'upload' ? 'bg-white shadow text-slate-900' : 'text-slate-500 hover:bg-slate-200'}`}>
                                <Icon name="Upload" size={16} /> Upload
                            </button>
                            <button onClick={() => { setScanMode('camera'); setImageSrc(null); setScanResult(null); }} className={`flex-1 flex justify-center items-center gap-2 py-1.5 text-sm font-medium rounded-md transition-colors ${scanMode === 'camera' ? 'bg-white shadow text-slate-900' : 'text-slate-500 hover:bg-slate-200'}`}>
                                <Icon name="Camera" size={16} /> Camera
                            </button>
                        </div>

                        <div className="space-y-4 mb-6">
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">Select Exam to Grade</label>
                                <select value={selectedExamId} onChange={e => setSelectedExamId(e.target.value)} className="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="">-- Choose Exam --</option>
                                    {(db.exams || []).map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
                                </select>
                            </div>

                            {scanMode === 'upload' && (
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">Upload OMR Image</label>
                                    <input type="file" accept="image/*" onChange={handleFileChange} disabled={!selectedExamId} className="w-full text-sm border p-2 rounded-lg file:mr-4 file:py-1 file:px-3 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" />
                                </div>
                            )}

                            {scanMode === 'camera' && imageSrc && (
                                <button onClick={() => { setImageSrc(null); setScanResult(null); startCamera(); }} className="w-full bg-slate-100 text-slate-700 py-2 rounded-lg font-medium hover:bg-slate-200 transition-colors flex justify-center items-center gap-2">
                                    <Icon name="RefreshCw" size={16}/> Retake Photo
                                </button>
                            )}

                            <button onClick={processScan} disabled={!imageSrc || isScanning} className="w-full bg-slate-900 text-white py-2 rounded-lg font-medium hover:bg-slate-800 disabled:opacity-50 flex justify-center items-center gap-2 transition-colors">
                                {isScanning ? 'Processing...' : <><Icon name="Scan" size={16}/> Process Scan</>}
                            </button>
                        </div>

                        {scanResult && (
                            <div className="border-t pt-4">
                                <h3 className="font-bold text-lg mb-2">Scan Results</h3>
                                <div className="space-y-2 text-sm mb-4">
                                    <div className="flex justify-between border-b pb-1">
                                        <span className="text-slate-500">Scanned Roll No:</span>
                                        <span className="font-mono font-bold">{scanResult.roll}</span>
                                    </div>
                                    <div className="flex justify-between border-b pb-1">
                                        <span className="text-slate-500">Student Match:</span>
                                        <span className={`font-bold ${scanResult.student ? 'text-green-600' : 'text-red-500'}`}>
                                            {scanResult.student ? scanResult.student.name : 'Unregistered Roll No'}
                                        </span>
                                    </div>
                                    <div className="flex justify-between border-b pb-1">
                                        <span className="text-slate-500">Bubbles Read:</span>
                                        <span className="font-bold">{Object.keys(scanResult.answers).length}</span>
                                    </div>
                                </div>
                                <button onClick={saveResult} className="w-full bg-green-600 text-white py-2 rounded-lg font-medium hover:bg-green-700 transition-colors">Save Record</button>
                            </div>
                        )}
                    </div>

                    <div className="flex-1 bg-slate-200 rounded-2xl border border-slate-300 shadow-inner overflow-hidden flex flex-col items-center justify-center relative min-h-[500px]">
                        
                        {scanMode === 'camera' && !imageSrc ? (
                            <div className="relative w-full h-full bg-slate-900 flex flex-col items-center justify-center overflow-hidden">
                                
                                <video ref={videoRef} autoPlay playsInline className={`max-w-full max-h-full object-contain ${isCameraOn ? 'block' : 'hidden'}`}></video>
                                
                                {!isCameraOn && (
                                    <div className="absolute inset-0 flex flex-col items-center justify-center bg-slate-900 text-slate-400 z-10">
                                        <Icon name="VideoOff" size={48} className="opacity-50 mb-4" />
                                        <button onClick={startCamera} className="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg hover:bg-blue-700 transition flex items-center gap-2">
                                            Turn On Camera
                                        </button>
                                        <p className="text-sm mt-4 max-w-xs text-center">Enable your camera to scan OMR sheets directly from your device.</p>
                                    </div>
                                )}

                                {isCameraOn && (
                                    <>
                                        <button onClick={stopCamera} className="absolute top-4 right-4 bg-red-600/80 hover:bg-red-600 text-white p-3 rounded-full shadow-lg backdrop-blur transition z-20" title="Turn Off Camera">
                                            <Icon name="Power" size={20} />
                                        </button>

                                        {selectedExamId ? (
                                            <button onClick={capturePhoto} className="absolute bottom-8 bg-blue-600 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-blue-700 transition flex items-center gap-2 border-2 border-white z-20">
                                                <Icon name="Camera" /> Capture Document
                                            </button>
                                        ) : (
                                            <div className="absolute bottom-8 bg-slate-800/80 text-white px-6 py-2 rounded-full font-medium shadow-lg backdrop-blur text-sm z-20">
                                                Select an Exam first to enable capture
                                            </div>
                                        )}
                                    </>
                                )}
                            </div>
                        ) : imageSrc ? (
                            <div className="relative inline-block border-4 border-black shadow-xl my-4" style={{ maxHeight: '90%', maxWidth: '90%' }}>
                                <img src={imageSrc} alt="Scanned OMR" className="max-w-full max-h-[80vh] object-contain block bg-white" />
                                <canvas ref={canvasRef} className="hidden"></canvas>
                            </div>
                        ) : (
                            <p className="text-slate-400 font-medium p-4 text-center">Select an exam and upload an image to begin.</p>
                        )}
                        
                        {/* Hidden reference version used for proportional pixel mapping calibration */}
                        {activeExam && (
                            <div style={{ position: 'absolute', opacity: 0, pointerEvents: 'none', top: '-10000px', left: '-10000px' }} ref={hiddenTemplateRef}>
                                <OMRSheet config={activeExam.templateConfig} title="CALIB" />
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
