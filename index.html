<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanMaster App</title>
    
    <!-- React & ReactDOM (Loaded via CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel standalone (Compiles React JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <!-- The React app will be injected here -->
    <div id="root"></div>

    <!-- Note the type="text/babel" which tells the browser to process the React syntax -->
    <script type="text/babel">
        // Extract hooks from the global React object
        const { useState, useEffect } = React;

        // Custom Inline Icons (Replaces lucide-react so it works without Node.js)
        const Icon = ({ name, size=20, className="" }) => {
            const icons = {
                Cloud: <svg width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>,
                User: <svg width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                Refresh: <svg width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
                Check: <svg width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>,
                Alert: <svg width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>,
                Lock: <svg width={size} height={size} className={className} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            };
            return icons[name] || icons.Check;
        };

        // Safe LocalStorage Helpers
        const safeStorageGet = (key, defaultValue) => {
            try {
                const item = localStorage.getItem(key);
                return item ? JSON.parse(item) : defaultValue;
            } catch (error) {
                console.warn(`Could not read ${key} from localStorage:`, error);
                return defaultValue;
            }
        };

        const safeStorageSet = (key, value) => {
            try {
                if (value === null || value === undefined) {
                    localStorage.removeItem(key);
                } else {
                    localStorage.setItem(key, JSON.stringify(value));
                }
            } catch (error) {
                console.warn(`Could not write ${key} to localStorage:`, error);
            }
        };

        // --- CONSTANTS ---
        // PASTE YOUR GOOGLE APP SCRIPT DEPLOYMENT URL HERE
        const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz9Y2vFk6MjoPSobkyn4WH50hethMnYA7dsmyUURmAY2apcspro4IpGOonQRyGiMvus/exec"; 

        function App() {
            const defaultDb = { classes: [], students: [], exams: [], submissions: [] };
            const [user, setUser] = useState(() => safeStorageGet('sm_user', null));
            const [db, setDb] = useState(() => safeStorageGet('sm_db', defaultDb));
            const [syncStatus, setSyncStatus] = useState('idle');
            const [authMode, setAuthMode] = useState('login'); // 'login' or 'signup'
            const [message, setMessage] = useState(null);

            // Persist session
            useEffect(() => {
                safeStorageSet('sm_user', user);
            }, [user]);

            // Persist data locally
            useEffect(() => {
                safeStorageSet('sm_db', db);
            }, [db]);

            const apiCall = async (payload) => {
                if (!APP_SCRIPT_URL) {
                    setMessage({ type: 'error', text: 'Backend URL not configured. Please set APP_SCRIPT_URL in the code.' });
                    return null;
                }
                setSyncStatus('loading');
                try {
                    const response = await fetch(APP_SCRIPT_URL, {
                        redirect: "follow",
                        method: 'POST',
                        headers: {
                            // text/plain avoids CORS preflight requests
                            "Content-Type": "text/plain;charset=utf-8",
                        },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    setSyncStatus(result.status === 'success' ? 'success' : 'error');
                    if (result.status === 'error') setMessage({ type: 'error', text: result.message });
                    return result;
                } catch (e) {
                    console.error("API Call Error:", e);
                    setSyncStatus('error');
                    setMessage({ type: 'error', text: 'Connection to Google Drive failed.' });
                    return null;
                }
            };

            const handleAuth = async (e) => {
                e.preventDefault();
                setMessage(null);
                const username = e.target.username.value;
                const password = e.target.password.value;

                if (authMode === 'signup') {
                    const res = await apiCall({ action: 'REGISTER', username, password });
                    if (res?.status === 'success') {
                        setAuthMode('login');
                        setMessage({ type: 'success', text: 'Account created! Please log in.' });
                        e.target.reset();
                    }
                } else {
                    const res = await apiCall({ action: 'LOGIN', username, password });
                    if (res?.status === 'success') {
                        setUser({ username, password });
                        setDb(res.data || defaultDb);
                        setMessage(null);
                    }
                }
            };

            const syncToDrive = async () => {
                if (!user) return;
                const res = await apiCall({ 
                    action: 'SAVE', 
                    username: user.username, 
                    password: user.password, 
                    data: db 
                });
                if (res?.status === 'success') {
                    setTimeout(() => setSyncStatus('idle'), 3000);
                }
            };

            const handleLogout = () => {
                setUser(null);
                setDb(defaultDb); // Clear local DB to prevent data leaks between users
                safeStorageSet('sm_db', null);
            };

            if (!user) {
                return (
                    <div className="flex min-h-screen items-center justify-center bg-slate-100 p-6">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full border border-slate-200">
                            <div className="flex justify-center mb-6">
                                <div className="p-4 bg-blue-100 rounded-full text-blue-600"><Icon name="Lock" size={40} /></div>
                            </div>
                            <h2 className="text-2xl font-black text-center text-slate-800 mb-2">
                                {authMode === 'login' ? 'Welcome Back' : 'Create Account'}
                            </h2>
                            <p className="text-center text-slate-500 mb-6 text-sm">
                                {authMode === 'login' ? 'Sign in to sync your school data.' : 'Start managing your classes today.'}
                            </p>

                            {message && (
                                <div className={`mb-6 p-3 rounded-lg text-xs font-bold ${message.type === 'error' ? 'bg-red-50 text-red-600 border border-red-100' : 'bg-green-50 text-green-600 border border-green-100'}`}>
                                    {message.text}
                                </div>
                            )}

                            <form onSubmit={handleAuth} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-1">Username</label>
                                    <input name="username" type="text" required className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. teacher_smith" />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                                    <input name="password" type="password" required className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••" />
                                </div>
                                <button type="submit" disabled={syncStatus === 'loading'} className="w-full bg-blue-600 text-white font-bold py-2.5 rounded-lg shadow hover:bg-blue-700 transition disabled:opacity-50">
                                    {syncStatus === 'loading' ? 'Processing...' : (authMode === 'login' ? 'Sign In' : 'Register')}
                                </button>
                            </form>

                            <div className="mt-6 pt-6 border-t border-slate-100 text-center">
                                <button 
                                    onClick={() => { setAuthMode(authMode === 'login' ? 'signup' : 'login'); setMessage(null); }}
                                    className="text-sm font-bold text-blue-600 hover:underline"
                                >
                                    {authMode === 'login' ? "Don't have an account? Sign Up" : "Already have an account? Log In"}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden font-sans">
                    <aside className="w-64 bg-white border-r border-slate-200 flex flex-col">
                        <div className="p-6 border-b border-slate-100">
                            <h1 className="text-xl font-black text-blue-600">ScanMaster</h1>
                        </div>
                        <nav className="p-4 flex-1 space-y-1">
                            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-4 mb-2">Sync Status</div>
                            <div className={`flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium ${syncStatus === 'error' ? 'text-red-600 bg-red-50' : 'text-slate-600 bg-slate-50'}`}>
                                {syncStatus === 'loading' && <Icon name="Refresh" className="animate-spin text-slate-800" size={18}/>}
                                {syncStatus === 'success' && <Icon name="Check" className="text-green-500" size={18}/>}
                                {syncStatus === 'error' && <Icon name="Alert" size={18}/>}
                                {syncStatus === 'idle' && <Icon name="Cloud" size={18} className="text-slate-400"/>}
                                <span className="capitalize">{syncStatus}</span>
                            </div>
                            
                            <button onClick={syncToDrive} className="w-full text-left flex items-center gap-3 px-4 py-3 rounded-lg text-sm text-slate-600 hover:bg-blue-50 hover:text-blue-600 mt-4 border border-dashed border-slate-300 transition-colors">
                                <Icon name="Refresh" size={16}/> Save to Drive
                            </button>
                        </nav>
                        
                        <div className="p-4 border-t border-slate-100">
                            <div className="px-4 mb-3">
                                <p className="text-xs font-bold text-slate-800 truncate">@{user.username}</p>
                                <p className="text-[10px] text-slate-400 italic">Google Drive Sync</p>
                            </div>
                            <button onClick={handleLogout} className="w-full py-2 text-sm text-red-600 font-bold hover:bg-red-50 rounded-lg transition-colors">Log Out</button>
                        </div>
                    </aside>

                    <main className="flex-1 bg-slate-50 overflow-y-auto p-8">
                        <div className="max-w-4xl mx-auto">
                            <div className="bg-white p-12 rounded-3xl shadow-sm border border-slate-200 text-center">
                                <div className="p-5 bg-blue-50 text-blue-600 rounded-full inline-block mb-6"><Icon name="User" size={48} /></div>
                                <h2 className="text-3xl font-black text-slate-800 mb-2">Hello, {user.username}!</h2>
                                <p className="text-slate-500 mb-8">Your data is synced privately to your Google Drive account.</p>
                                
                                <div className="grid grid-cols-3 gap-6 text-left">
                                    <div className="p-6 bg-slate-50 rounded-2xl border border-slate-100 shadow-sm">
                                        <p className="text-xs font-bold text-slate-400 uppercase mb-2">Classes</p>
                                        <p className="text-4xl font-black text-slate-800">{db.classes?.length || 0}</p>
                                    </div>
                                    <div className="p-6 bg-slate-50 rounded-2xl border border-slate-100 shadow-sm">
                                        <p className="text-xs font-bold text-slate-400 uppercase mb-2">Exams</p>
                                        <p className="text-4xl font-black text-slate-800">{db.exams?.length || 0}</p>
                                    </div>
                                    <div className="p-6 bg-slate-50 rounded-2xl border border-slate-100 shadow-sm">
                                        <p className="text-xs font-bold text-slate-400 uppercase mb-2">Students</p>
                                        <p className="text-4xl font-black text-slate-800">{db.students?.length || 0}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        // Mount the React Application to the DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
