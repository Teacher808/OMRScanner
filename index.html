<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyOMR App</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel Standalone for in-browser JSX compiling -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Note the data-type="module" which allows modern import statements -->
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef } = React;

    // --- FIREBASE IMPORTS ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithCustomToken, signInAnonymously, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    // --- FIREBASE SETUP ---
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
    let app, auth;
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
    } catch (e) {
      console.error("Firebase init failed:", e);
    }

    // --- ICON COMPONENT MAPPER ---
    // Converts previous Lucide icons to FontAwesome equivalents for standalone HTML support
    function Icon({ name, size = 20, className = "" }) {
      const map = {
        Camera: 'fa-camera', Plus: 'fa-plus', Save: 'fa-save', Settings: 'fa-cog', 
        LogOut: 'fa-sign-out-alt', CheckCircle: 'fa-check-circle', XCircle: 'fa-times-circle', 
        List: 'fa-list', FileText: 'fa-file-alt', Users: 'fa-users', Printer: 'fa-print', 
        UserPlus: 'fa-user-plus', Upload: 'fa-upload', ChevronLeft: 'fa-chevron-left', 
        BarChart2: 'fa-chart-bar', CloudUpload: 'fa-cloud-upload-alt'
      };
      return <i className={`fas ${map[name]} ${className}`} style={{ fontSize: size }}></i>;
    }

    // --- MAIN APP COMPONENT ---
    function App() {
      const [user, setUser] = useState(null);
      const [view, setView] = useState('dashboard'); // dashboard, create_exam, scanner, settings, classes, class_details, omr_sheet
      const [exams, setExams] = useState([]);
      const [currentExam, setCurrentExam] = useState(null);
      
      const [classes, setClasses] = useState([]);
      const [currentClass, setCurrentClass] = useState(null);
      
      const [gasUrl, setGasUrl] = useState(localStorage.getItem('gasUrl') || '');

      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token).catch(console.error);
          } else {
            await signInAnonymously(auth).catch(console.error);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      const saveSettings = (url) => {
        setGasUrl(url);
        localStorage.setItem('gasUrl', url);
        alert('Backend URL saved!');
      };

      const handleLogout = () => {
        if (auth) signOut(auth);
      };

      if (!user) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
            <div className="bg-white p-8 rounded-2xl shadow-xl text-center max-w-sm w-full">
              <div className="animate-pulse flex flex-col items-center">
                <div className="h-12 w-12 bg-blue-500 rounded-full mb-4"></div>
                <h2 className="text-xl font-bold text-gray-800">Authenticating...</h2>
                <p className="text-gray-500 text-sm mt-2">Connecting to secure server</p>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800 font-sans pb-20">
          <header className="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center print:hidden">
            <h1 className="text-xl font-bold flex items-center gap-2">
              <Icon name="Camera" size={24} /> EasyOMR
            </h1>
            <div className="flex gap-3">
              <button onClick={() => setView('settings')} className="p-1 hover:bg-blue-700 rounded transition">
                <Icon name="Settings" size={20} />
              </button>
              <button onClick={handleLogout} className="p-1 hover:bg-blue-700 rounded transition">
                <Icon name="LogOut" size={20} />
              </button>
            </div>
          </header>

          <main className="p-4 max-w-2xl mx-auto">
            {view === 'dashboard' && (
              <Dashboard 
                exams={exams} 
                setView={setView} 
                setCurrentExam={setCurrentExam} 
              />
            )}
            {view === 'create_exam' && (
              <CreateExam 
                setExams={setExams} 
                setView={setView} 
                classes={classes}
              />
            )}
            {view === 'analysis' && currentExam && (
              <ItemAnalysis 
                exam={currentExam} 
                setView={setView} 
                gasUrl={gasUrl}
                userId={user.uid}
              />
            )}
            {view === 'scanner' && currentExam && (
              <Scanner 
                exam={currentExam} 
                setView={setView} 
                gasUrl={gasUrl} 
                userId={user.uid}
                setExams={setExams}
              />
            )}
            {view === 'settings' && (
              <SettingsPanel 
                gasUrl={gasUrl} 
                saveSettings={saveSettings} 
                setView={setView} 
                userId={user.uid}
              />
            )}
            {view === 'classes' && (
              <ClassesManager 
                classes={classes} 
                setClasses={setClasses} 
                setView={setView} 
                setCurrentClass={setCurrentClass} 
              />
            )}
            {view === 'class_details' && currentClass && (
              <ClassDetails 
                currentClass={currentClass} 
                setClasses={setClasses} 
                setView={setView} 
                classes={classes} 
              />
            )}
            {view === 'omr_sheet' && currentExam && (
              <OMRSheetTemplate 
                exam={currentExam} 
                setView={setView} 
              />
            )}
          </main>

          <nav className="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 pb-safe z-10 print:hidden">
            <button onClick={() => setView('dashboard')} className={`flex flex-col items-center p-2 ${view === 'dashboard' ? 'text-blue-600' : 'text-gray-500'}`}>
              <Icon name="List" size={24} />
              <span className="text-xs mt-1">Exams</span>
            </button>
            <button onClick={() => setView('classes')} className={`flex flex-col items-center p-2 ${view === 'classes' || view === 'class_details' ? 'text-blue-600' : 'text-gray-500'}`}>
              <Icon name="Users" size={24} />
              <span className="text-xs mt-1">Classes</span>
            </button>
            <button onClick={() => setView('create_exam')} className={`flex flex-col items-center p-2 ${view === 'create_exam' ? 'text-blue-600' : 'text-gray-500'}`}>
              <Icon name="Plus" size={24} />
              <span className="text-xs mt-1">New Exam</span>
            </button>
          </nav>
        </div>
      );
    }

    // --- DASHBOARD COMPONENT ---
    function Dashboard({ exams, setView, setCurrentExam }) {
      if (exams.length === 0) {
        return (
          <div className="text-center mt-20">
            <Icon name="FileText" size={64} className="mx-auto text-gray-300 mb-4" />
            <h2 className="text-xl font-semibold text-gray-700 mb-2">No Exams Yet</h2>
            <p className="text-gray-500 mb-6">Create an exam to start scanning answer sheets.</p>
            <button 
              onClick={() => setView('create_exam')}
              className="bg-blue-600 text-white px-6 py-3 rounded-lg shadow hover:bg-blue-700 transition flex items-center gap-2 mx-auto"
            >
              <Icon name="Plus" size={20} /> Create Exam
            </button>
          </div>
        );
      }

      return (
        <div className="space-y-4">
          <h2 className="text-2xl font-bold text-gray-800 mb-4">Your Exams</h2>
          {exams.map((exam, idx) => {
            const types = [...new Set(exam.answerKey.map(k => k.type))];
            const typeLabel = types.length > 1 ? 'Mixed Test Types' : (types[0] === 'true_false' ? 'True/False' : 'Multiple Choice');

            return (
              <div key={idx} className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center">
                <div>
                  <h3 className="font-semibold text-lg">{exam.name}</h3>
                  <p className="text-sm text-gray-500">
                    {exam.questions} Items • {typeLabel}
                    {exam.className ? ` • Section: ${exam.className}` : ''}
                  </p>
                </div>
                <div className="flex gap-2">
                  <button 
                    onClick={() => { setCurrentExam(exam); setView('analysis'); }}
                    className="bg-purple-100 text-purple-700 p-3 rounded-full shadow hover:bg-purple-200 transition"
                    title="Item Analysis & Sync"
                  >
                    <Icon name="BarChart2" size={20} />
                  </button>
                  <button 
                    onClick={() => { setCurrentExam(exam); setView('omr_sheet'); }}
                    className="bg-gray-100 text-gray-700 p-3 rounded-full shadow hover:bg-gray-200 transition"
                    title="Print OMR Sheet"
                  >
                    <Icon name="Printer" size={20} />
                  </button>
                  <button 
                    onClick={() => { setCurrentExam(exam); setView('scanner'); }}
                    className="bg-green-500 text-white p-3 rounded-full shadow hover:bg-green-600 transition"
                    title="Scan Answers"
                  >
                    <Icon name="Camera" size={20} />
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // --- CREATE EXAM COMPONENT ---
    function CreateExam({ setExams, setView, classes }) {
      const [name, setName] = useState('');
      const [selectedClassId, setSelectedClassId] = useState('');
      const [questions, setQuestions] = useState(50);
      const [rollNoLength, setRollNoLength] = useState(4); 
      
      const [answerKey, setAnswerKey] = useState(
        Array.from({length: 50}, () => ({ type: 'multiple_choice', options: 4, answer: 0 }))
      );

      const [bStart, setBStart] = useState(1);
      const [bEnd, setBEnd] = useState(50);
      const [bType, setBType] = useState('multiple_choice');
      const [bOptions, setBOptions] = useState(4);

      const handleQuestionsChange = (e) => {
        let val = parseInt(e.target.value) || 1;
        if (val > 200) val = 200;
        setQuestions(val);
        setBEnd(val);
        
        setAnswerKey(prev => {
          const newKey = [...prev];
          if (val > prev.length) {
            for(let i = prev.length; i < val; i++) {
              newKey.push({ type: 'multiple_choice', options: 4, answer: 0 });
            }
          } else if (val < prev.length) {
            newKey.length = val;
          }
          return newKey;
        });
      };

      const applyBatch = () => {
        if (bStart < 1 || bEnd > questions || bStart > bEnd) return alert("Invalid batch range.");
        setAnswerKey(prev => {
          const newKey = [...prev];
          for (let i = bStart - 1; i < bEnd; i++) {
            newKey[i] = { 
              ...newKey[i], 
              type: bType, 
              options: bType === 'true_false' ? 2 : bOptions,
              answer: 0
            };
          }
          return newKey;
        });
      };

      const updateAnswer = (index, val) => {
        setAnswerKey(prev => {
          const newKey = [...prev];
          newKey[index].answer = parseInt(val);
          return newKey;
        });
      };

      const handleSave = () => {
        if (!name.trim()) return alert("Please enter an exam name");
        const selectedClass = classes?.find(c => c.id === selectedClassId);
        const newExam = { 
          id: Date.now().toString(),
          name, 
          classId: selectedClassId,
          className: selectedClass ? selectedClass.name : '',
          questions, 
          rollNoLength,
          answerKey, 
          createdAt: new Date().toISOString(),
          results: []
        };
        setExams(prev => [...prev, newExam]);
        setView('dashboard');
      };

      return (
        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
          <h2 className="text-2xl font-bold mb-6">Create New Exam</h2>
          <div className="space-y-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Exam Name</label>
              <input 
                type="text" value={name} onChange={e => setName(e.target.value)} 
                className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                placeholder="e.g. Final Exam"
              />
            </div>
            <div className="flex flex-col sm:flex-row gap-4">
              <div className="flex-1">
                <label className="block text-sm font-medium text-gray-700 mb-1">Section / Class (Optional)</label>
                <select 
                  value={selectedClassId} onChange={e => setSelectedClassId(e.target.value)}
                  className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white"
                >
                  <option value="">Select a Section</option>
                  {classes?.map(cls => <option key={cls.id} value={cls.id}>{cls.name}</option>)}
                </select>
              </div>
              <div className="flex-1">
                <label className="block text-sm font-medium text-gray-700 mb-1">Total Items (Max 200)</label>
                <input 
                  type="number" min="1" max="200" 
                  value={questions} onChange={handleQuestionsChange} 
                  className="w-full p-3 border rounded-lg outline-none"
                />
              </div>
              <div className="flex-1">
                <label className="block text-sm font-medium text-gray-700 mb-1">Roll No. Digits (2-6)</label>
                <input 
                  type="number" min="2" max="6" 
                  value={rollNoLength} 
                  onChange={e => setRollNoLength(Math.min(6, Math.max(2, parseInt(e.target.value) || 4)))} 
                  className="w-full p-3 border rounded-lg outline-none"
                />
              </div>
            </div>

            <div className="bg-blue-50 p-4 rounded-lg border border-blue-100 mt-6">
              <h3 className="font-semibold text-blue-800 mb-2 text-sm">Batch Setup Sections</h3>
              <div className="flex flex-wrap items-end gap-2 text-sm">
                <div className="flex items-center gap-1">
                  <span>Q</span>
                  <input type="number" value={bStart} onChange={e => setBStart(parseInt(e.target.value)||1)} className="w-16 p-2 border rounded" min="1" max={questions} />
                  <span>to</span>
                  <input type="number" value={bEnd} onChange={e => setBEnd(parseInt(e.target.value)||1)} className="w-16 p-2 border rounded" min="1" max={questions} />
                </div>
                <select value={bType} onChange={e => setBType(e.target.value)} className="p-2 border rounded bg-white flex-1 min-w-[120px]">
                  <option value="multiple_choice">Multiple Choice</option>
                  <option value="true_false">True / False</option>
                </select>
                {bType === 'multiple_choice' && (
                  <input type="number" value={bOptions} onChange={e => setBOptions(Math.min(10, Math.max(2, parseInt(e.target.value)||4)))} className="w-16 p-2 border rounded" min="2" max="10" title="Options" />
                )}
                <button onClick={applyBatch} className="bg-blue-600 text-white px-4 py-2 rounded font-semibold hover:bg-blue-700">Apply</button>
              </div>
            </div>

            <div className="pt-4">
              <h3 className="font-semibold text-lg mb-3 border-b pb-2">Set Answer Key</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-96 overflow-y-auto p-2 bg-gray-50 rounded-lg">
                {answerKey.map((qData, idx) => (
                  <div key={idx} className="flex flex-col bg-white p-3 rounded shadow-sm border border-gray-100">
                    <div className="flex justify-between items-center mb-2">
                       <span className="font-bold text-gray-600">Q{idx + 1}</span>
                       <span className="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full uppercase tracking-wider">
                         {qData.type === 'true_false' ? 'T/F' : `MCQ-${qData.options}`}
                       </span>
                    </div>
                    <div className="flex gap-1.5 flex-wrap">
                      {Array.from({length: qData.options}).map((_, optIdx) => {
                        const label = qData.type === 'true_false' ? (optIdx === 0 ? 'T' : 'F') : String.fromCharCode(65 + optIdx);
                        return (
                          <button
                            key={optIdx}
                            onClick={() => updateAnswer(idx, optIdx)}
                            className={`w-8 h-8 rounded-full font-bold text-sm flex-shrink-0 ${qData.answer === optIdx ? 'bg-blue-600 text-white shadow-inner' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}`}
                          >
                            {label}
                          </button>
                        )
                      })}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <button 
              onClick={handleSave}
              className="w-full bg-blue-600 text-white p-3 rounded-lg mt-6 font-semibold flex justify-center items-center gap-2 hover:bg-blue-700"
            >
              <Icon name="Save" size={20} /> Save Exam
            </button>
          </div>
        </div>
      );
    }

    // --- SCANNER COMPONENT (OMR LOGIC) ---
    function Scanner({ exam, setView, gasUrl, userId, setExams }) {
      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const [stream, setStream] = useState(null);
      const [result, setResult] = useState(null);
      const [studentId, setStudentId] = useState('');
      const [isProcessing, setIsProcessing] = useState(false);
      const [syncStatus, setSyncStatus] = useState('');

      const numCols = exam.questions <= 50 ? 2 : exam.questions <= 100 ? 3 : exam.questions <= 150 ? 4 : 5;
      const rowsPerCol = Math.ceil(exam.questions / numCols);

      useEffect(() => {
        const startCamera = async () => {
          try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            setStream(s);
            if (videoRef.current) videoRef.current.srcObject = s;
          } catch (err) {
            alert("Camera access denied or unavailable.");
          }
        };
        startCamera();
        return () => { if (stream) stream.getTracks().forEach(t => t.stop()); };
      }, []);

      const processImage = () => {
        if (!videoRef.current || !canvasRef.current) return;
        setIsProcessing(true);

        const video = videoRef.current;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const boxWidth = canvas.width * 0.6;
        const boxHeight = canvas.height * 0.6;
        const startX = canvas.width * 0.2;
        const startY = canvas.height * 0.2;

        const colWidth = boxWidth / numCols;
        const rowHeight = boxHeight / rowsPerCol;
        const maxOptions = Math.max(...exam.answerKey.map(q => q.options));
        
        const optionsAreaWidth = colWidth * 0.65;
        const cellWidth = optionsAreaWidth / maxOptions;

        let scannedAnswers = [];
        let score = 0;

        for (let q = 0; q < exam.questions; q++) {
          const qData = exam.answerKey[q];
          const colIndex = Math.floor(q / rowsPerCol);
          const rowIndex = q % rowsPerCol;
          
          const colStartX = startX + (colIndex * colWidth) + (colWidth * 0.35);

          let maxDarkness = 0;
          let selectedOption = -1;

          for (let o = 0; o < qData.options; o++) {
            const sampleX = colStartX + (o * cellWidth) + (cellWidth * 0.2);
            const sampleY = startY + (rowIndex * rowHeight) + (rowHeight * 0.2);
            const sampleW = cellWidth * 0.6;
            const sampleH = rowHeight * 0.6;

            const imgData = ctx.getImageData(sampleX, sampleY, sampleW, sampleH);
            const darkness = calculateDarkness(imgData.data);

            ctx.strokeStyle = darkness > 100 ? 'red' : 'green';
            ctx.strokeRect(sampleX, sampleY, sampleW, sampleH);

            if (darkness > maxDarkness && darkness > 40) {
              maxDarkness = darkness;
              selectedOption = o;
            }
          }
          scannedAnswers.push(selectedOption);
          if (selectedOption === qData.answer) {
            score++;
          }
        }

        setResult({ score, total: exam.questions, scannedAnswers });
        setIsProcessing(false);
      };

      const calculateDarkness = (data) => {
        let total = 0;
        for (let i = 0; i < data.length; i += 4) {
          const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
          total += (255 - brightness); 
        }
        return total / (data.length / 4);
      };

      const saveToDrive = async () => {
        if (!studentId) return alert("Please enter a Student ID/Name");
        
        const newResult = {
          studentId,
          score: result.score,
          total: result.total,
          scannedAnswers: result.scannedAnswers,
          timestamp: new Date().toISOString()
        };

        setExams(prev => prev.map(e =>
          (e.id === exam.id || e.createdAt === exam.createdAt) ? { ...e, results: [...(e.results || []), newResult] } : e
        ));
        exam.results = [...(exam.results || []), newResult];

        if (!gasUrl) {
           alert("Score saved locally for Item Analysis! (Configure GAS URL in Settings to sync to Google Drive).");
           setResult(null);
           setStudentId('');
           return;
        }
        
        setSyncStatus('saving');
        try {
          await fetch(gasUrl, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'single_scan',
              userId: userId,
              examName: exam.name,
              studentId: studentId,
              score: `${result.score}/${result.total}`,
              timestamp: new Date().toISOString()
            })
          });
          setSyncStatus('success');
          setTimeout(() => {
            setResult(null);
            setStudentId('');
            setSyncStatus('');
          }, 2000);
        } catch (error) {
          console.error("Sync Error: ", error);
          setSyncStatus('error');
        }
      };

      return (
        <div className="flex flex-col h-[calc(100vh-140px)]">
          <div className="flex justify-between items-center mb-4">
            <h2 className="text-xl font-bold">Scanning: {exam.name}</h2>
            <button onClick={() => setView('dashboard')} className="text-gray-500 underline text-sm">Cancel</button>
          </div>

          {!result ? (
            <div className="relative flex-1 bg-black rounded-xl overflow-hidden shadow-inner">
              <video 
                ref={videoRef} autoPlay playsInline 
                className="absolute inset-0 w-full h-full object-cover opacity-80"
              />
              <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div className="w-[60%] h-[60%] border-4 border-dashed border-yellow-400 rounded-lg relative overflow-hidden">
                   <span className="absolute -top-6 left-0 text-yellow-400 text-xs font-bold bg-black/50 px-2 rounded">Align Grid Here</span>
                   {Array.from({length: numCols - 1}).map((_, i) => (
                     <div key={i} className="absolute top-0 bottom-0 w-px bg-yellow-400/50" style={{ left: `${(i+1) * (100/numCols)}%` }}></div>
                   ))}
                   {Array.from({length: Math.min(10, rowsPerCol) - 1}).map((_, i) => (
                     <div key={i} className="absolute left-0 right-0 h-px bg-yellow-400/20" style={{ top: `${(i+1) * (100/Math.min(10, rowsPerCol))}%` }}></div>
                   ))}
                </div>
              </div>
              <button 
                onClick={processImage}
                disabled={isProcessing}
                className="absolute bottom-6 left-1/2 -translate-x-1/2 bg-white text-black font-bold py-3 px-8 rounded-full shadow-xl hover:bg-gray-200 transition"
              >
                {isProcessing ? 'Processing...' : 'Capture & Grade'}
              </button>
            </div>
          ) : (
            <div className="flex-1 bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
              <div className="text-center mb-6">
                <h3 className="text-3xl font-black text-blue-600 mb-1">{result.score} / {result.total}</h3>
                <p className="text-gray-500 font-medium">Final Score</p>
              </div>
              <div className="mb-6">
                 <label className="block text-sm font-medium text-gray-700 mb-1">Student ID / Name</label>
                 <input 
                   type="text" value={studentId} onChange={e => setStudentId(e.target.value)}
                   className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                   placeholder="e.g. John Doe or 2024-001"
                 />
              </div>
              <div className="flex gap-3 mt-auto">
                <button 
                  onClick={() => setResult(null)}
                  className="flex-1 bg-gray-200 text-gray-800 p-3 rounded-lg font-semibold hover:bg-gray-300"
                >
                  Rescan
                </button>
                <button 
                  onClick={saveToDrive}
                  disabled={syncStatus === 'saving'}
                  className="flex-1 bg-green-500 text-white p-3 rounded-lg font-semibold hover:bg-green-600 flex items-center justify-center gap-2"
                >
                  {syncStatus === 'saving' ? 'Saving...' : syncStatus === 'success' ? <><Icon name="CheckCircle" size={20} /> Saved!</> : <><Icon name="Save" size={20} /> Sync to Drive</>}
                </button>
              </div>
            </div>
          )}
          <canvas ref={canvasRef} className="hidden" />
        </div>
      );
    }

    // --- SETTINGS COMPONENT ---
    function SettingsPanel({ gasUrl, saveSettings, setView, userId }) {
      const [url, setUrl] = useState(gasUrl);
      return (
        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
          <h2 className="text-2xl font-bold mb-6 flex items-center gap-2"><Icon name="Settings" size={24}/> Settings</h2>
          <div className="space-y-6">
            <div>
              <label className="block text-sm font-bold text-gray-800 mb-2">Google Apps Script Web App URL</label>
              <p className="text-xs text-gray-500 mb-3">
                To sync scores to your Google Drive, paste your deployed Web App URL here.
              </p>
              <input 
                type="url" value={url} onChange={e => setUrl(e.target.value)} 
                className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm"
                placeholder="https://script.google.com/macros/s/AKfycbxJpMuhsqG2bVaFxLgrKKLW0okKxvKde3RDDToUznekpWRp6QJmPesXPX7ni6lRCUSTcQ/exec"
              />
            </div>
            <div className="bg-blue-50 p-4 rounded-lg border border-blue-100">
              <p className="text-sm text-blue-800 font-semibold mb-1">Your Privacy ID:</p>
              <code className="text-xs break-all bg-white p-2 rounded block">{userId}</code>
              <p className="text-xs text-blue-600 mt-2">Only you can access this data. This ID tracks your submissions.</p>
            </div>
            <button 
              onClick={() => saveSettings(url)}
              className="w-full bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-700"
            >
              Save Configuration
            </button>
          </div>
        </div>
      );
    }

    // --- ROSTER: CLASSES MANAGER ---
    function ClassesManager({ classes, setClasses, setView, setCurrentClass }) {
      const [newClassName, setNewClassName] = useState('');
      const handleCreate = () => {
        if (!newClassName.trim()) return;
        setClasses([...classes, { id: Date.now().toString(), name: newClassName, students: [] }]);
        setNewClassName('');
      };

      return (
        <div className="space-y-6">
          <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><Icon name="Users" size={24}/> Manage Classes</h2>
            <div className="flex gap-2">
              <input 
                type="text" value={newClassName} onChange={e => setNewClassName(e.target.value)} 
                placeholder="e.g. Grade 10 Math"
                className="flex-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
              />
              <button onClick={handleCreate} className="bg-blue-600 text-white px-4 rounded-lg font-semibold hover:bg-blue-700 transition">
                Add
              </button>
            </div>
          </div>
          <div className="space-y-3">
            {classes.length === 0 ? (
               <p className="text-center text-gray-500 py-6">No classes created yet.</p>
            ) : (
              classes.map(cls => (
                <div key={cls.id} className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center">
                  <div>
                    <h3 className="font-semibold text-lg">{cls.name}</h3>
                    <p className="text-sm text-gray-500">{cls.students.length} Students enrolled</p>
                  </div>
                  <button 
                    onClick={() => { setCurrentClass(cls); setView('class_details'); }}
                    className="text-blue-600 bg-blue-50 px-4 py-2 rounded-lg font-semibold hover:bg-blue-100"
                  >
                    Manage
                  </button>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    // --- ROSTER: CLASS DETAILS & ENROLLMENT ---
    function ClassDetails({ currentClass, setClasses, setView, classes }) {
      const [name, setName] = useState('');
      const [rollNo, setRollNo] = useState('');
      const [bulkData, setBulkData] = useState('');
      const [isBulkMode, setIsBulkMode] = useState(false);

      const updateClass = (updatedClass) => {
        setClasses(classes.map(c => c.id === updatedClass.id ? updatedClass : c));
        currentClass.students = updatedClass.students;
      };

      const formatRollNo = (val) => {
        const strVal = String(val).trim();
        return /^\d+$/.test(strVal) ? strVal.padStart(2, '0') : strVal;
      };

      const addSingle = () => {
        if (!name || !rollNo) return alert("Fill both fields");
        updateClass({ ...currentClass, students: [...currentClass.students, { id: Date.now().toString(), name, rollNo: formatRollNo(rollNo) }] });
        setName(''); setRollNo('');
      };

      const addBulk = () => {
        if (!bulkData.trim()) return;
        const lines = bulkData.split('\n');
        const newStudents = lines.map(line => {
          const parts = line.split(/[,\t]+/).map(s => s.trim());
          if (parts.length >= 2) {
             return { id: Math.random().toString(), rollNo: formatRollNo(parts[0]), name: parts[1] };
          }
          return null;
        }).filter(Boolean);

        updateClass({ ...currentClass, students: [...currentClass.students, ...newStudents] });
        setBulkData('');
        setIsBulkMode(false);
      };

      return (
        <div className="space-y-6">
          <div className="flex items-center gap-2 mb-2">
            <button onClick={() => setView('classes')} className="text-gray-500 hover:text-black p-1">
              <Icon name="ChevronLeft" size={24} />
            </button>
            <h2 className="text-2xl font-bold">{currentClass.name}</h2>
          </div>
          <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-lg font-semibold flex items-center gap-2">
                 {isBulkMode ? <Icon name="Upload" size={20}/> : <Icon name="UserPlus" size={20}/>} 
                 {isBulkMode ? "Bulk Enroll" : "Enroll Student"}
              </h3>
              <button onClick={() => setIsBulkMode(!isBulkMode)} className="text-sm text-blue-600 underline">
                Switch to {isBulkMode ? 'Single Mode' : 'Bulk Mode'}
              </button>
            </div>
            {!isBulkMode ? (
              <div className="flex flex-col sm:flex-row gap-3">
                <input type="text" value={rollNo} onChange={e => setRollNo(e.target.value)} placeholder="Roll No" className="w-full sm:w-1/3 p-3 border rounded-lg focus:ring-blue-500 outline-none" />
                <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Student Name" className="w-full flex-1 p-3 border rounded-lg focus:ring-blue-500 outline-none" />
                <button onClick={addSingle} className="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold">Add</button>
              </div>
            ) : (
              <div className="space-y-3">
                <p className="text-xs text-gray-500">Paste data from Excel or separate with commas (Format: <code>RollNo, Name</code> per line).</p>
                <textarea value={bulkData} onChange={e => setBulkData(e.target.value)} rows="4" className="w-full p-3 border rounded-lg outline-none font-mono text-sm" placeholder="101, John Doe&#10;102, Jane Smith"></textarea>
                <button onClick={addBulk} className="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold">Import Students</button>
              </div>
            )}
          </div>
          <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div className="bg-gray-50 p-4 border-b">
               <h3 className="font-semibold text-gray-700">Roster ({currentClass.students.length})</h3>
            </div>
            <div className="max-h-80 overflow-y-auto">
              {currentClass.students.length === 0 ? (
                <p className="p-4 text-center text-gray-500 text-sm">No students enrolled.</p>
              ) : (
                <table className="w-full text-left border-collapse">
                  <tbody>
                    {currentClass.students.map((student, idx) => (
                      <tr key={student.id} className="border-b last:border-0 hover:bg-gray-50">
                        <td className="p-3 pl-4 text-gray-500 w-12">{idx + 1}</td>
                        <td className="p-3 font-mono text-sm">{student.rollNo}</td>
                        <td className="p-3 font-medium">{student.name}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        </div>
      );
    }

    // --- OMR SHEET TEMPLATE (PRINTABLE) ---
    function OMRSheetTemplate({ exam, setView }) {
      const numCols = exam.questions <= 50 ? 2 : exam.questions <= 100 ? 3 : exam.questions <= 150 ? 4 : 5;
      const rowsPerCol = Math.ceil(exam.questions / numCols);

      return (
        <div className="bg-white min-h-screen text-black print:p-0 p-4">
          <style>
            {`
              @media print {
                body { background: white; margin: 0; padding: 0; }
                body * { visibility: hidden; }
                .print-area, .print-area * { visibility: visible; }
                .print-area { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 20px; box-sizing: border-box; }
                @page { margin: 0.5cm; }
              }
            `}
          </style>
          
          <div className="flex justify-between items-center mb-6 print:hidden bg-gray-100 p-4 rounded-lg">
            <button onClick={() => setView('dashboard')} className="flex items-center gap-1 text-gray-700 hover:text-black font-medium">
               <Icon name="ChevronLeft" size={20} /> Back
            </button>
            <button onClick={() => window.print()} className="bg-blue-600 text-white px-5 py-2 rounded-lg shadow flex items-center gap-2 font-semibold hover:bg-blue-700">
               <Icon name="Printer" size={20} /> Print OMR Sheet
            </button>
          </div>

          <div className="print-area border-[3px] border-black p-6 mx-auto bg-white relative" style={{ maxWidth: '210mm', minHeight: '290mm' }}>
            <div className="absolute top-4 left-4 w-6 h-6 bg-black rounded-full"></div>
            <div className="absolute top-4 right-4 w-6 h-6 bg-black rounded-full"></div>
            <div className="absolute bottom-4 left-4 w-6 h-6 bg-black rounded-full"></div>
            <div className="absolute bottom-4 right-4 w-6 h-6 bg-black rounded-full"></div>

            <div className="text-center border-b-[3px] border-black pb-4 mb-6 mt-4">
              <h1 className="text-2xl font-black uppercase tracking-widest">{exam.name}</h1>
              <p className="text-sm font-bold mt-1 tracking-widest text-gray-600">OFFICIAL OMR ANSWER SHEET</p>
            </div>

            <div className="flex justify-between gap-8 mb-8 px-4">
              <div className="flex-1 space-y-6 mt-2">
                <div className="border-b border-black pb-1">
                  <span className="font-bold text-sm tracking-wide">STUDENT NAME:</span>
                </div>
                <div className="border-b border-black pb-1">
                  <span className="font-bold text-sm tracking-wide">CLASS / SECTION: <span className="font-mono ml-2 text-lg">{exam.className || ''}</span></span>
                </div>
                <div className="border-b border-black pb-1">
                  <span className="font-bold text-sm tracking-wide">DATE:</span>
                </div>
                <div className="mt-6 p-3 border-[2px] border-black text-xs font-bold bg-gray-50">
                  INSTRUCTIONS:
                  <ul className="list-disc pl-5 font-medium mt-1 space-y-1">
                    <li>Use a dark pen or pencil.</li>
                    <li>Fill the circle completely (e.g., <span className="inline-block w-3 h-3 bg-black rounded-full relative top-0.5"></span>).</li>
                    <li>Do not make stray marks on the paper.</li>
                  </ul>
                </div>
              </div>

              <div className="flex flex-col items-center">
                <span className="font-bold text-sm mb-2 tracking-wide">ROLL NUMBER</span>
                <div className="flex gap-2 p-3 border-[2px] border-black bg-white">
                  {Array.from({length: exam.rollNoLength || 4}).map((_, col) => (
                    <div key={col} className="flex flex-col gap-1 items-center">
                       <div className="w-5 h-6 border-[2px] border-black mb-1"></div>
                       {Array.from({length: 10}).map((_, num) => (
                         <div key={num} className="w-5 h-5 rounded-full border border-black flex items-center justify-center text-[10px] font-bold text-gray-800">
                            {num}
                         </div>
                       ))}
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div className="px-4">
              <h2 className="font-bold text-lg mb-4 text-center bg-black text-white py-1 tracking-widest">ANSWERS</h2>
              <div className="flex justify-between w-full">
                {Array.from({length: numCols}).map((_, c) => (
                  <div key={c} className="flex-1 px-2 border-r last:border-0 border-gray-300">
                    {Array.from({length: rowsPerCol}).map((_, r) => {
                      const qIdx = c * rowsPerCol + r;
                      if (qIdx >= exam.questions) return null;
                      
                      const qData = exam.answerKey[qIdx];
                      return (
                        <div key={qIdx} className="flex items-center gap-1.5 mb-2">
                          <span className="font-bold w-6 text-right text-[11px] leading-none">{qIdx + 1}.</span>
                          <div className="flex gap-1">
                            {Array.from({ length: qData.options }).map((_, oIdx) => {
                              const label = qData.type === 'true_false' 
                                ? (oIdx === 0 ? 'T' : 'F') 
                                : String.fromCharCode(65 + oIdx);
                              return (
                                <div key={oIdx} className="w-[18px] h-[18px] rounded-full border border-black flex items-center justify-center text-[9px] font-bold text-gray-500">
                                  {label}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // --- ITEM ANALYSIS COMPONENT ---
    function ItemAnalysis({ exam, setView, gasUrl, userId }) {
      const [isSyncing, setIsSyncing] = useState(false);
      const results = exam.results || [];
      const totalScans = results.length;

      const syncAllToDrive = async () => {
        if (!gasUrl) return alert("Please configure your Google Apps Script Web App URL in Settings first.");
        if (results.length === 0) return alert("No results to sync yet.");

        setIsSyncing(true);
        try {
          await fetch(gasUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'bulk_sync',
              userId: userId,
              examName: exam.name,
              results: results
            })
          });
          alert('Sync complete! Check your Google Sheet.');
        } catch (e) {
          console.error(e);
          alert('Failed to sync. Please ensure your Google Apps Script URL is correct.');
        }
        setIsSyncing(false);
      };

      return (
        <div className="space-y-6">
          <div className="flex items-center gap-2 mb-2">
            <button onClick={() => setView('dashboard')} className="text-gray-500 hover:text-black p-1">
              <Icon name="ChevronLeft" size={24} />
            </button>
            <h2 className="text-2xl font-bold">Item Analysis: {exam.name}</h2>
          </div>

          <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
              <div>
                <h3 className="text-lg font-semibold text-gray-800">Class Performance</h3>
                <p className="text-sm text-gray-500">Total Scans: {totalScans}</p>
              </div>
              <div className="flex items-center gap-4">
                 <button 
                   onClick={syncAllToDrive}
                   disabled={isSyncing || totalScans === 0}
                   className={`flex items-center gap-2 px-4 py-2 rounded-lg font-semibold text-white ${isSyncing || totalScans === 0 ? 'bg-gray-400' : 'bg-green-600 hover:bg-green-700'} transition shadow`}
                 >
                   <Icon name="CloudUpload" size={20} />
                   {isSyncing ? 'Syncing...' : 'Sync All to Drive'}
                 </button>
                {totalScans > 0 && (
                  <div className="text-right border-l pl-4">
                    <div className="text-2xl font-bold text-blue-600">
                      {((results.reduce((acc, r) => acc + r.score, 0) / (totalScans * exam.questions)) * 100).toFixed(1)}%
                    </div>
                    <p className="text-xs text-gray-500">Average Score</p>
                  </div>
                )}
              </div>
            </div>

            {totalScans === 0 ? (
              <p className="text-center text-gray-500 py-10">No scans recorded yet. Scan some answer sheets to see the analysis.</p>
            ) : (
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse min-w-[600px]">
                  <thead>
                    <tr className="bg-gray-50 border-b">
                      <th className="p-3 text-sm font-semibold text-gray-600">Item</th>
                      <th className="p-3 text-sm font-semibold text-gray-600">Key</th>
                      <th className="p-3 text-sm font-semibold text-gray-600">Correct % (Difficulty)</th>
                      <th className="p-3 text-sm font-semibold text-gray-600">Option Distribution</th>
                    </tr>
                  </thead>
                  <tbody>
                    {exam.answerKey.map((qData, qIdx) => {
                      let correctCount = 0;
                      const dist = Array(qData.options).fill(0);
                      let invalidCount = 0;

                      results.forEach(r => {
                        const ans = r.scannedAnswers[qIdx];
                        if (ans === qData.answer) correctCount++;
                        if (ans >= 0 && ans < qData.options) {
                          dist[ans]++;
                        } else {
                          invalidCount++;
                        }
                      });

                      const correctPct = Math.round((correctCount / totalScans) * 100);
                      const isEasy = correctPct >= 80;
                      const isHard = correctPct <= 30;

                      const keyLabel = qData.type === 'true_false' 
                        ? (qData.answer === 0 ? 'T' : 'F') 
                        : String.fromCharCode(65 + qData.answer);

                      return (
                        <tr key={qIdx} className="border-b last:border-0 hover:bg-gray-50">
                          <td className="p-3 font-medium">Q{qIdx + 1}</td>
                          <td className="p-3 font-bold text-blue-600">{keyLabel}</td>
                          <td className="p-3">
                            <div className="flex items-center gap-2">
                              <span className={`w-10 font-mono text-sm ${isEasy ? 'text-green-600' : isHard ? 'text-red-600' : 'text-gray-700'}`}>
                                {correctPct}%
                              </span>
                              <div className="w-24 h-2 bg-gray-200 rounded-full overflow-hidden">
                                <div 
                                  className={`h-full ${isEasy ? 'bg-green-500' : isHard ? 'bg-red-500' : 'bg-blue-500'}`}
                                  style={{ width: `${correctPct}%` }}
                                ></div>
                              </div>
                            </div>
                          </td>
                          <td className="p-3">
                            <div className="flex gap-2 text-xs">
                              {dist.map((count, optIdx) => {
                                const label = qData.type === 'true_false' ? (optIdx === 0 ? 'T' : 'F') : String.fromCharCode(65 + optIdx);
                                const isKey = optIdx === qData.answer;
                                const pct = Math.round((count / totalScans) * 100);
                                return (
                                  <div key={optIdx} className={`flex flex-col items-center p-1 rounded min-w-[32px] ${isKey ? 'bg-blue-50 border border-blue-200' : 'bg-gray-50 border border-gray-100'}`}>
                                    <span className={`font-bold ${isKey ? 'text-blue-700' : 'text-gray-500'}`}>{label}</span>
                                    <span className="text-gray-600">{pct}%</span>
                                  </div>
                                );
                              })}
                              {invalidCount > 0 && (
                                 <div className="flex flex-col items-center p-1 rounded min-w-[32px] bg-red-50 border border-red-100">
                                    <span className="font-bold text-red-500">-</span>
                                    <span className="text-red-600">{Math.round((invalidCount / totalScans) * 100)}%</span>
                                  </div>
                              )}
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- MOUNT REACT COMPONENT ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
