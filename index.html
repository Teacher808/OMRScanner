<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyOMR App</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel Standalone for in-browser JSX compiling -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- HTML2Canvas & jsPDF for exporting OMR Sheets -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    @media print {
      @page { size: letter portrait; margin: 0; }
      body { margin: 0; padding: 0; background: #fff; display: flex; justify-content: center; }
      .print-hidden { display: none !important; }
      .print-area { 
        margin: 0 !important; 
        box-shadow: none !important; 
        border: none !important; 
        transform: scale(1) !important; 
        width: 8.5in !important; 
        height: 11in !important; 
        page-break-after: avoid;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Note the data-type="module" which allows modern import statements -->
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef } = React;

    // --- FIREBASE IMPORTS ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithCustomToken, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- FIREBASE SETUP ---
    let firebaseConfig = {};
    if (typeof __firebase_config !== 'undefined') {
      firebaseConfig = JSON.parse(__firebase_config);
    } else {
      // REPLACE THIS WITH YOUR OWN FIREBASE CONFIG IF HOSTING EXTERNALLY
      firebaseConfig = {
        apiKey: "AIzaSyAUAqxd3hdWp0BRoG4nFTZCamry7io7k-E",
        authDomain: "examscanner-e90dd.firebaseapp.com",
        projectId: "examscanner-e90dd",
        storageBucket: "examscanner-e90dd.firebasestorage.app",
        messagingSenderId: "13021828091",
        appId: "1:13021828091:web:2c8b947cd823a4befbf15e",
        measurementId: "G-HGY1039P8L"
      };
    }
    
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'easyomr-app';
    let app, auth, db;
    let firebaseInitError = null;
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    } catch (e) {
      console.error("Firebase init failed:", e);
      firebaseInitError = e.message;
    }

    // --- ICON COMPONENT MAPPER ---
    function Icon({ name, size = 20, className = "" }) {
      const map = {
        Camera: 'fa-camera', Plus: 'fa-plus', Save: 'fa-save', Settings: 'fa-cog', 
        LogOut: 'fa-sign-out-alt', CheckCircle: 'fa-check-circle', XCircle: 'fa-times-circle', 
        List: 'fa-list', FileText: 'fa-file-alt', Users: 'fa-users', Printer: 'fa-print', 
        UserPlus: 'fa-user-plus', Upload: 'fa-upload', ChevronLeft: 'fa-chevron-left', 
        BarChart2: 'fa-chart-bar', CloudUpload: 'fa-cloud-upload-alt', Trash: 'fa-trash',
        Edit: 'fa-edit', UserCheck: 'fa-user-check', Image: 'fa-image', FilePdf: 'fa-file-pdf', Download: 'fa-download'
      };
      return <i className={`fas ${map[name]} ${className}`} style={{ fontSize: size }}></i>;
    }

    // --- CUSTOM TOAST NOTIFICATION ---
    function Toast({ message, onClose }) {
      useEffect(() => {
        if (message) {
          const timer = setTimeout(onClose, 3000);
          return () => clearTimeout(timer);
        }
      }, [message]);

      if (!message) return null;
      return (
        <div className="fixed top-4 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-2 animate-bounce z-50">
          <Icon name="CheckCircle" size={16} className="text-green-400" />
          <span className="font-medium text-sm">{message}</span>
        </div>
      );
    }

    // --- AUTHENTICATION SCREEN ---
    function AuthScreen({ auth }) {
      const [isLogin, setIsLogin] = useState(true);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          if (isLogin) {
            await signInWithEmailAndPassword(auth, email, password);
          } else {
            await createUserWithEmailAndPassword(auth, email, password);
          }
        } catch (err) {
          setError(err.message.replace('Firebase: ', ''));
        }
        setLoading(false);
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
          <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <div className="text-center mb-8">
              <div className="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <Icon name="Camera" size={32} className="text-white" />
              </div>
              <h1 className="text-2xl font-black text-gray-800">EasyOMR</h1>
              <p className="text-gray-500 text-sm mt-1">Sign in to access your secure exams</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-4">
              {error && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm border border-red-200">{error}</div>}
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1">Email Address</label>
                <input 
                  type="email" required value={email} onChange={e => setEmail(e.target.value)}
                  className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50"
                  placeholder="you@school.edu"
                />
              </div>
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1">Password</label>
                <input 
                  type="password" required value={password} onChange={e => setPassword(e.target.value)}
                  className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50"
                  placeholder="••••••••"
                />
              </div>
              <button 
                type="submit" disabled={loading}
                className="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition shadow-md disabled:opacity-70"
              >
                {loading ? 'Processing...' : (isLogin ? 'Sign In' : 'Create Account')}
              </button>
            </form>

            <div className="mt-6 text-center">
              <button onClick={() => setIsLogin(!isLogin)} className="text-sm text-blue-600 hover:underline font-medium">
                {isLogin ? "Need an account? Register here" : "Already have an account? Sign in"}
              </button>
            </div>

            <div className="mt-8 text-center text-xs text-gray-400 font-medium">
              Developed by PVNJ
            </div>
          </div>
        </div>
      );
    }

    // --- MAIN APP COMPONENT ---
    function App() {
      const [user, setUser] = useState(null);
      const [isAuthChecking, setIsAuthChecking] = useState(true);
      const [initError, setInitError] = useState('');
      const [view, setView] = useState('dashboard');
      
      // Data State
      const [exams, setExams] = useState([]);
      const [currentExam, setCurrentExam] = useState(null);
      const [classes, setClasses] = useState([]);
      const [currentClass, setCurrentClass] = useState(null);
      const [toastMsg, setToastMsg] = useState('');

      const showToast = (msg) => setToastMsg(msg);

      // Auth Listener
      useEffect(() => {
        if (!auth) {
          setInitError(firebaseInitError || "Could not connect to Firebase database.");
          setIsAuthChecking(false);
          return;
        }
        const initAuth = async () => {
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token).catch(console.error);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (u) => {
          setUser(u);
          setIsAuthChecking(false);
        });
        return () => unsubscribe();
      }, []);

      // Realtime Cloud Data Syncing (Firestore)
      useEffect(() => {
        if (!user || !db) return;
        
        const examsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'exams');
        const classesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'classes');

        const unsubExams = onSnapshot(examsRef, (snap) => {
          const data = snap.docs.map(d => d.data());
          data.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
          setExams(data);
          if (currentExam) {
             const updated = data.find(e => e.id === currentExam.id);
             if (updated) setCurrentExam(updated);
          }
        }, console.error);

        const unsubClasses = onSnapshot(classesRef, (snap) => {
          const data = snap.docs.map(d => d.data());
          setClasses(data);
          if (currentClass) {
             const updated = data.find(c => c.id === currentClass.id);
             if (updated) setCurrentClass(updated);
          }
        }, console.error);

        return () => { unsubExams(); unsubClasses(); };
      }, [user]);

      // Database Helpers
      const saveExam = async (examObj) => {
        if (!user || !db) return;
        try {
          await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'exams', examObj.id), examObj);
        } catch (e) { console.error("Error saving exam", e); showToast("Error saving data"); }
      };

      const deleteExam = async (examId) => {
        if (!user || !db) return;
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'exams', examId));
          showToast("Exam deleted successfully");
        } catch (e) {
          console.error("Error deleting exam", e);
          showToast("Error deleting exam");
        }
      };

      const saveClass = async (classObj) => {
        if (!user || !db) return;
        try {
          await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'classes', classObj.id), classObj);
        } catch (e) { console.error("Error saving class", e); showToast("Error saving class"); }
      };

      const deleteClass = async (classId) => {
        if (!user || !db) return;
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'classes', classId));
          showToast("Class deleted successfully");
          if (currentClass && currentClass.id === classId) {
            setCurrentClass(null);
            setView('classes');
          }
        } catch (e) {
          console.error("Error deleting class", e);
          showToast("Error deleting class");
        }
      };

      const handleLogout = () => {
        if (auth) signOut(auth);
      };

      if (isAuthChecking) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-gray-100">
            <div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p className="text-gray-500 font-bold">Connecting to Cloud Database...</p>
          </div>
        );
      }

      if (initError) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md text-center border border-red-100">
              <Icon name="XCircle" size={48} className="text-red-500 mb-4 mx-auto" />
              <h2 className="text-xl font-black text-gray-800 mb-2">Connection Error</h2>
              <p className="text-sm text-gray-600 mb-6 bg-red-50 p-3 rounded-lg border border-red-100">{initError}</p>
            </div>
          </div>
        );
      }

      if (!user) {
        return <AuthScreen auth={auth} />;
      }

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800 font-sans pb-20 print:bg-white print:pb-0 print:min-h-0">
          <Toast message={toastMsg} onClose={() => setToastMsg('')} />
          
          <header className="print-hidden bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
            <h1 className="text-xl font-bold flex items-center gap-2">
              <Icon name="Camera" size={24} /> EasyOMR
            </h1>
            <div className="flex gap-3">
              <button onClick={() => setView('settings')} className="p-1 hover:bg-blue-700 rounded transition">
                <Icon name="Settings" size={20} />
              </button>
              <button onClick={handleLogout} className="p-1 hover:bg-blue-700 rounded transition">
                <Icon name="LogOut" size={20} />
              </button>
            </div>
          </header>

          <main className="p-4 max-w-2xl mx-auto print:max-w-none print:p-0 print:m-0">
            {view === 'dashboard' && (
              <Dashboard 
                exams={exams} 
                setView={setView} 
                setCurrentExam={setCurrentExam} 
                deleteExam={deleteExam}
              />
            )}
            {view === 'create_exam' && (
              <CreateExam 
                saveExam={saveExam} 
                setView={setView} 
                classes={classes}
                showToast={showToast}
                examToEdit={currentExam}
              />
            )}
            {view === 'analysis' && currentExam && (
              <ItemAnalysis 
                exam={currentExam} 
                setView={setView} 
              />
            )}
            {view === 'scanner' && currentExam && (
              <Scanner 
                exam={currentExam} 
                classes={classes}
                setView={setView} 
                saveExam={saveExam}
                setCurrentExam={setCurrentExam}
                showToast={showToast}
              />
            )}
            {view === 'settings' && (
              <SettingsPanel 
                user={user}
              />
            )}
            {view === 'classes' && (
              <ClassesManager 
                classes={classes} 
                saveClass={saveClass}
                setView={setView} 
                setCurrentClass={setCurrentClass} 
                deleteClass={deleteClass}
              />
            )}
            {view === 'class_details' && currentClass && (
              <ClassDetails 
                currentClass={currentClass} 
                saveClass={saveClass}
                setView={setView} 
                showToast={showToast}
              />
            )}
            {view === 'omr_sheet' && currentExam && (
              <OMRSheetTemplate 
                exam={currentExam} 
                setView={setView} 
                showToast={showToast}
              />
            )}

            <div className="print-hidden mt-12 text-center text-xs text-gray-400 font-medium">
              Developed by PVNJ
            </div>
          </main>

          <nav className="print-hidden fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 pb-safe z-10 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
            <button onClick={() => setView('dashboard')} className={`flex flex-col items-center p-2 ${view === 'dashboard' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600 transition'}`}>
              <Icon name="List" size={24} />
              <span className="text-xs mt-1 font-semibold">Exams</span>
            </button>
            <button onClick={() => setView('classes')} className={`flex flex-col items-center p-2 ${view === 'classes' || view === 'class_details' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600 transition'}`}>
              <Icon name="Users" size={24} />
              <span className="text-xs mt-1 font-semibold">Classes</span>
            </button>
            <button onClick={() => { setCurrentExam(null); setView('create_exam'); }} className={`flex flex-col items-center p-2 ${view === 'create_exam' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600 transition'}`}>
              <Icon name="Plus" size={24} />
              <span className="text-xs mt-1 font-semibold">New Exam</span>
            </button>
          </nav>
        </div>
      );
    }

    // --- DASHBOARD COMPONENT ---
    function Dashboard({ exams, setView, setCurrentExam, deleteExam }) {
      const [confirmDelete, setConfirmDelete] = useState(null);

      if (exams.length === 0) {
        return (
          <div className="text-center mt-20 bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <Icon name="FileText" size={64} className="mx-auto text-blue-200 mb-4" />
            <h2 className="text-xl font-bold text-gray-800 mb-2">No Exams Yet</h2>
            <p className="text-gray-500 mb-6 text-sm">Create your first exam and print out bubble sheets for your students.</p>
            <button 
              onClick={() => { setCurrentExam(null); setView('create_exam'); }}
              className="bg-blue-600 text-white px-6 py-3 rounded-lg shadow-md hover:bg-blue-700 transition flex items-center gap-2 mx-auto font-bold"
            >
              <Icon name="Plus" size={20} /> Create Exam
            </button>
          </div>
        );
      }

      return (
        <div className="space-y-4">
          <div className="flex justify-between items-end mb-4">
            <h2 className="text-2xl font-black text-gray-800">Your Exams</h2>
            <span className="text-xs font-bold bg-green-100 text-green-700 px-3 py-1 rounded-full uppercase tracking-wider">
              <Icon name="CloudUpload" size={12} className="mr-1" /> Cloud Synced
            </span>
          </div>
          
          {exams.map((exam, idx) => {
            const types = [...new Set(exam.answerKey.map(k => k.type))];
            const typeLabel = types.length > 1 ? 'Mixed Types' : (types[0] === 'true_false' ? 'True/False' : 'Multiple Choice');
            const scanCount = exam.results ? exam.results.length : 0;

            return (
              <div key={exam.id || idx} className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                  <h3 className="font-bold text-xl text-gray-800">{exam.name}</h3>
                  <div className="flex items-center gap-2 mt-1 flex-wrap text-sm text-gray-500">
                    <span className="bg-gray-100 px-2 py-0.5 rounded text-gray-700 font-medium">{exam.questions} Items</span>
                    <span className="bg-gray-100 px-2 py-0.5 rounded text-gray-700">{typeLabel}</span>
                    {exam.className && <span className="text-blue-600 font-medium bg-blue-50 px-2 py-0.5 rounded">Class: {exam.className}</span>}
                  </div>
                  <p className="text-xs text-gray-400 mt-2 font-medium uppercase tracking-wider">
                     {scanCount} Scans Recorded
                  </p>
                </div>
                
                <div className="flex gap-2 w-full md:w-auto mt-2 md:mt-0 pt-3 md:pt-0 border-t border-gray-100 md:border-0 justify-between md:justify-end">
                  <div className="flex gap-2 overflow-x-auto custom-scrollbar pr-1 pb-1 md:pb-0">
                    {confirmDelete === exam.id ? (
                      <div className="flex items-center gap-1 bg-red-50 p-1.5 rounded-xl border border-red-100 shrink-0">
                        <span className="text-xs font-black text-red-600 px-2 uppercase tracking-wide">Delete?</span>
                        <button onClick={() => { deleteExam(exam.id); setConfirmDelete(null); }} className="bg-red-500 text-white p-1.5 rounded-lg hover:bg-red-600 shadow-sm transition"><Icon name="CheckCircle" size={16} /></button>
                        <button onClick={() => setConfirmDelete(null)} className="bg-gray-200 text-gray-700 p-1.5 rounded-lg hover:bg-gray-300 transition"><Icon name="XCircle" size={16} /></button>
                      </div>
                    ) : (
                      <button 
                        onClick={() => setConfirmDelete(exam.id)} 
                        className="bg-red-50 text-red-600 p-3 rounded-xl hover:bg-red-100 transition flex items-center justify-center gap-2 font-semibold text-sm shrink-0" 
                        title="Delete Exam"
                      >
                        <Icon name="Trash" size={18} />
                      </button>
                    )}
                    
                    <button 
                      onClick={() => { setCurrentExam(exam); setView('create_exam'); }}
                      className="bg-blue-50 text-blue-600 p-3 rounded-xl hover:bg-blue-100 transition flex items-center gap-2 font-semibold text-sm shrink-0"
                      title="Edit Exam"
                    >
                      <Icon name="Edit" size={18} /> <span className="md:hidden">Edit</span>
                    </button>
                    <button 
                      onClick={() => { setCurrentExam(exam); setView('analysis'); }}
                      className="bg-purple-50 text-purple-600 p-3 rounded-xl hover:bg-purple-100 transition flex items-center gap-2 font-semibold text-sm shrink-0"
                      title="Item Analysis"
                    >
                      <Icon name="BarChart2" size={18} /> <span className="md:hidden">Stats</span>
                    </button>
                    <button 
                      onClick={() => { setCurrentExam(exam); setView('omr_sheet'); }}
                      className="bg-gray-100 text-gray-700 p-3 rounded-xl hover:bg-gray-200 transition flex items-center gap-2 font-semibold text-sm shrink-0"
                      title="Print OMR Sheet"
                    >
                      <Icon name="Printer" size={18} /> <span className="md:hidden">Print</span>
                    </button>
                  </div>
                  <button 
                    onClick={() => { setCurrentExam(exam); setView('scanner'); }}
                    className="bg-green-500 text-white px-5 py-3 rounded-xl shadow-md hover:bg-green-600 transition flex items-center gap-2 font-bold text-sm ml-auto md:ml-0 shrink-0"
                  >
                    <Icon name="Camera" size={18} /> Scan
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // --- CREATE EXAM COMPONENT ---
    function CreateExam({ saveExam, setView, classes, showToast, examToEdit }) {
      const [name, setName] = useState('');
      const [selectedClassId, setSelectedClassId] = useState('');
      const [questions, setQuestions] = useState(50);
      const [rollNoLength, setRollNoLength] = useState(4); 
      
      const [answerKey, setAnswerKey] = useState(
        Array.from({length: 50}, () => ({ type: 'multiple_choice', options: 4, answer: 0 }))
      );

      const [bStart, setBStart] = useState(1);
      const [bEnd, setBEnd] = useState(50);
      const [bType, setBType] = useState('multiple_choice');
      const [bOptions, setBOptions] = useState(4);

      useEffect(() => {
        if (examToEdit) {
          setName(examToEdit.name || '');
          setSelectedClassId(examToEdit.classId || '');
          setQuestions(examToEdit.questions || 50);
          setRollNoLength(examToEdit.rollNoLength || 4);
          if (examToEdit.answerKey) {
            setAnswerKey(examToEdit.answerKey);
          }
          setBEnd(examToEdit.questions || 50);
        } else {
          setName('');
          setSelectedClassId('');
          setQuestions(50);
          setRollNoLength(4);
          setAnswerKey(Array.from({length: 50}, () => ({ type: 'multiple_choice', options: 4, answer: 0 })));
          setBEnd(50);
        }
      }, [examToEdit]);

      const handleQuestionsChange = (e) => {
        let val = parseInt(e.target.value) || 1;
        if (val > 200) val = 200;
        setQuestions(val);
        setBEnd(val);
        
        setAnswerKey(prev => {
          const newKey = [...prev];
          if (val > prev.length) {
            for(let i = prev.length; i < val; i++) {
              newKey.push({ type: 'multiple_choice', options: 4, answer: 0 });
            }
          } else if (val < prev.length) {
            newKey.length = val;
          }
          return newKey;
        });
      };

      const applyBatch = () => {
        if (bStart < 1 || bEnd > questions || bStart > bEnd) return showToast("Invalid batch range.");
        setAnswerKey(prev => {
          const newKey = [...prev];
          for (let i = bStart - 1; i < bEnd; i++) {
            newKey[i] = { 
              ...newKey[i], 
              type: bType, 
              options: bType === 'true_false' ? 2 : bOptions,
              answer: 0
            };
          }
          return newKey;
        });
        showToast(`Batch applied to Q${bStart}-Q${bEnd}`);
      };

      const updateAnswer = (index, val) => {
        setAnswerKey(prev => {
          const newKey = [...prev];
          newKey[index].answer = parseInt(val);
          return newKey;
        });
      };

      const handleSave = () => {
        if (!name.trim()) return showToast("Please enter an exam name");
        const selectedClass = classes?.find(c => c.id === selectedClassId);
        
        let updatedResults = examToEdit && examToEdit.results ? [...examToEdit.results] : [];
        
        if (examToEdit && updatedResults.length > 0) {
          updatedResults = updatedResults.map(res => {
            let newScore = 0;
            for (let i = 0; i < questions; i++) {
              if (res.scannedAnswers && res.scannedAnswers[i] !== undefined && res.scannedAnswers[i] === answerKey[i].answer) {
                newScore++;
              }
            }
            return { ...res, score: newScore, total: questions };
          });
        }

        const newExam = { 
          id: examToEdit ? examToEdit.id : Date.now().toString(),
          name, 
          classId: selectedClassId,
          className: selectedClass ? selectedClass.name : '',
          questions, 
          rollNoLength,
          answerKey, 
          createdAt: examToEdit ? examToEdit.createdAt : new Date().toISOString(),
          results: updatedResults
        };
        saveExam(newExam);
        showToast(examToEdit ? "Exam updated successfully!" : "Exam created successfully!");
        setView('dashboard');
      };

      return (
        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8">
          <div className="flex justify-between items-center mb-6 border-b pb-4">
            <h2 className="text-2xl font-black text-gray-800">
              {examToEdit ? "Edit Exam" : "Create New Exam"}
            </h2>
            {examToEdit && examToEdit.results?.length > 0 && (
              <span className="text-xs bg-yellow-100 text-yellow-800 font-bold px-3 py-1 rounded-lg">
                Warning: Editing will recalculate past scores.
              </span>
            )}
          </div>
          <div className="space-y-6">
            <div>
              <label className="block text-sm font-bold text-gray-700 mb-2">Exam Name</label>
              <input 
                type="text" value={name} onChange={e => setName(e.target.value)} 
                className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50"
                placeholder="e.g. Midterm Mathematics"
              />
            </div>
            
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-2">Assign Class</label>
                <select 
                  value={selectedClassId} onChange={e => setSelectedClassId(e.target.value)}
                  className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50"
                >
                  <option value="">(None)</option>
                  {classes?.map(cls => <option key={cls.id} value={cls.id}>{cls.name}</option>)}
                </select>
              </div>
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-2">Total Items (Max 200)</label>
                <input 
                  type="number" min="1" max="200" 
                  value={questions} onChange={handleQuestionsChange} 
                  className="w-full p-3 border border-gray-300 rounded-xl outline-none bg-gray-50"
                />
              </div>
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-2">Roll No. Digits</label>
                <select 
                  value={rollNoLength} 
                  onChange={e => setRollNoLength(parseInt(e.target.value) || 4)} 
                  className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50"
                >
                  <option value={2}>2 Digits</option>
                  <option value={3}>3 Digits</option>
                  <option value={4}>4 Digits</option>
                  <option value={5}>5 Digits</option>
                  <option value={6}>6 Digits</option>
                </select>
              </div>
            </div>

            <div className="bg-blue-50 p-5 rounded-xl border border-blue-100">
              <h3 className="font-bold text-blue-900 mb-3 text-sm flex items-center gap-2">
                <Icon name="Settings" size={16} /> Batch Formatting
              </h3>
              <div className="flex flex-col sm:flex-row items-end gap-3 text-sm">
                <div className="flex items-center gap-2 bg-white p-2 rounded-lg border border-blue-200">
                  <span className="font-bold text-gray-500">Q</span>
                  <input type="number" value={bStart} onChange={e => setBStart(parseInt(e.target.value)||1)} className="w-14 p-1 text-center font-bold outline-none" min="1" max={questions} />
                  <span className="font-bold text-gray-400">to</span>
                  <input type="number" value={bEnd} onChange={e => setBEnd(parseInt(e.target.value)||1)} className="w-14 p-1 text-center font-bold outline-none" min="1" max={questions} />
                </div>
                <select value={bType} onChange={e => setBType(e.target.value)} className="p-3 border border-blue-200 rounded-lg bg-white flex-1 outline-none font-medium text-gray-700">
                  <option value="multiple_choice">Multiple Choice</option>
                  <option value="true_false">True / False</option>
                </select>
                {bType === 'multiple_choice' && (
                  <div className="flex flex-col">
                    <span className="text-[10px] font-bold text-blue-800 uppercase pl-1">Options</span>
                    <input type="number" value={bOptions} onChange={e => setBOptions(Math.min(10, Math.max(2, parseInt(e.target.value)||4)))} className="w-16 p-2.5 border border-blue-200 rounded-lg text-center font-bold" min="2" max="10" />
                  </div>
                )}
                <button onClick={applyBatch} className="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700 w-full sm:w-auto shadow">Apply</button>
              </div>
            </div>

            <div className="pt-2">
              <h3 className="font-black text-lg text-gray-800 mb-4 flex items-center justify-between">
                Set Answer Key 
                <span className="text-xs bg-gray-200 text-gray-600 py-1 px-3 rounded-full font-bold">Tap bubble to select correct answer</span>
              </h3>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                {answerKey.map((qData, idx) => (
                  <div key={idx} className="flex flex-col bg-white p-3 rounded-xl shadow-sm border border-gray-200">
                    <div className="flex justify-between items-center mb-2 border-b border-gray-100 pb-2">
                       <span className="font-black text-gray-700 text-lg">Q{idx + 1}</span>
                       <span className="text-[10px] text-gray-500 bg-gray-100 px-2 py-1 rounded-md font-bold uppercase tracking-widest">
                         {qData.type === 'true_false' ? 'T/F' : `MCQ-${qData.options}`}
                       </span>
                    </div>
                    <div className="flex gap-2 flex-wrap justify-center">
                      {Array.from({length: qData.options}).map((_, optIdx) => {
                        const label = qData.type === 'true_false' ? (optIdx === 0 ? 'T' : 'F') : String.fromCharCode(65 + optIdx);
                        const isSelected = qData.answer === optIdx;
                        return (
                          <button
                            key={optIdx}
                            onClick={() => updateAnswer(idx, optIdx)}
                            className={`w-10 h-10 rounded-full font-black text-sm flex-shrink-0 transition transform hover:scale-105 ${isSelected ? 'bg-blue-600 text-white shadow-md ring-2 ring-blue-300 ring-offset-1' : 'bg-gray-100 text-gray-500 border border-gray-300 hover:bg-gray-200'}`}
                          >
                            {label}
                          </button>
                        )
                      })}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <button 
              onClick={handleSave}
              className="w-full bg-blue-600 text-white p-4 rounded-xl mt-8 font-black flex justify-center items-center gap-2 hover:bg-blue-700 shadow-lg text-lg"
            >
              <Icon name="Save" size={24} /> {examToEdit ? "Update Exam & Recalculate" : "Create Exam & Save to Cloud"}
            </button>
          </div>
        </div>
      );
    }

    // --- SCANNER COMPONENT (OMR LOGIC) ---
    function Scanner({ exam, classes, setView, saveExam, setCurrentExam, showToast }) {
      const videoRef = useRef(null);
      const trackingCanvasRef = useRef(null);
      const overlayCanvasRef = useRef(null);
      const scanLoopRef = useRef(null);
      const lastValidQuad = useRef(null);
      
      const [stream, setStream] = useState(null);
      const [result, setResult] = useState(null);
      const [studentId, setStudentId] = useState('');
      const [scannedStudentName, setScannedStudentName] = useState('');
      
      const [isProcessing, setIsProcessing] = useState(false);
      const [isAligned, setIsAligned] = useState(false);
      const [autoScanEnabled, setAutoScanEnabled] = useState(true);
      const alignmentFrames = useRef(0);

      const numCols = exam.questions <= 40 ? 2 : exam.questions <= 90 ? 3 : exam.questions <= 140 ? 4 : 5;
      const rowsPerCol = Math.ceil(exam.questions / numCols);
      const rnLength = exam.rollNoLength || 4;

      useEffect(() => {
        const startCamera = async () => {
          try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            setStream(s);
            if (videoRef.current) {
              videoRef.current.srcObject = s;
              videoRef.current.play();
            }
          } catch (err) {
            showToast("Camera access denied or unavailable.");
          }
        };
        startCamera();
        return () => { 
          if (stream) stream.getTracks().forEach(t => t.stop()); 
          if (scanLoopRef.current) cancelAnimationFrame(scanLoopRef.current);
        };
      }, []);

      // Calculate quad-perspective mapped point to support tilted/rotated scanning
      const getMappedPoint = (templateX, templateY, quads) => {
          // The center of the 40x40 black corner markers is exactly at 20px inward on the 816x1056 paper.
          const u = (templateX - 20) / (816 - 40);
          const v = (templateY - 20) / (1056 - 40);
          
          // Bilinear interpolation mapping standard rectangle to the detected quad
          const x = quads.tl.x * (1-u)*(1-v) + quads.tr.x * u*(1-v) + quads.bl.x * (1-u)*v + quads.br.x * u*v;
          const y = quads.tl.y * (1-u)*(1-v) + quads.tr.y * u*(1-v) + quads.bl.y * (1-u)*v + quads.br.y * u*v;
          return {x, y};
      };

      const processImage = () => {
        if (!videoRef.current) return;
        if (!lastValidQuad.current) {
           showToast("Could not find the 4 corner markers! Please align within the guide.");
           return;
        }

        setIsProcessing(true);
        if (scanLoopRef.current) cancelAnimationFrame(scanLoopRef.current);

        const video = videoRef.current;
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const quads = lastValidQuad.current;
        
        // Calculate dynamic bubble size based on the detected perspective quad size
        const quadScale = Math.hypot(quads.tl.x - quads.tr.x, quads.tl.y - quads.tr.y) / 816;
        
        const sampleDarkness = (templateX, templateY, baseSize) => {
            const p = getMappedPoint(templateX, templateY, quads);
            const size = Math.max(4, Math.floor(baseSize * quadScale));
            
            const sx = Math.floor(p.x - size/2);
            const sy = Math.floor(p.y - size/2);
            
            if(sx < 0 || sy < 0 || sx+size > canvas.width || sy+size > canvas.height) return 0;
            
            const imgData = ctx.getImageData(sx, sy, size, size).data;
            let total = 0;
            for(let i=0; i<imgData.length; i+=4) {
                total += 255 - ((imgData[i] + imgData[i+1] + imgData[i+2]) / 3);
            }
            return total / (imgData.length / 4);
        };

        // --- EXTRACT ROLL NUMBER ---
        let scannedRollNo = '';
        const rnStartX = 816 * 0.55;
        const rnTotalW = 816 * 0.40;
        const rnColW = rnTotalW / rnLength;
        const rnBubbleZoneY = 1056 * 0.10 + 30;
        const rnBubbleZoneH = (1056 * 0.24) - 30;
        const actualRnRowH = rnBubbleZoneH / 10;

        for (let c = 0; c < rnLength; c++) {
          let maxD = 0; let bestVal = -1;
          const cellCenterX = rnStartX + (c * rnColW) + (rnColW / 2);
          for (let r = 0; r < 10; r++) {
            const cellCenterY = rnBubbleZoneY + (r * actualRnRowH) + (actualRnRowH / 2);
            const d = sampleDarkness(cellCenterX, cellCenterY, 14); // 14 is base sample size
            if (d > maxD && d > 60) { maxD = d; bestVal = r; }
          }
          scannedRollNo += bestVal !== -1 ? bestVal.toString() : '?';
        }

        // --- EXTRACT ANSWERS ---
        let scannedAnswers = [];
        let score = 0;

        const ansStartX = 816 * 0.05;
        const ansStartY = 1056 * 0.40;
        const ansTotalW = 816 * 0.90;
        const ansTotalH = 1056 * 0.55;
        const colW = ansTotalW / numCols;
        const rowH = ansTotalH / rowsPerCol;

        for (let q = 0; q < exam.questions; q++) {
          const qData = exam.answerKey[q];
          const cIdx = Math.floor(q / rowsPerCol);
          const rIdx = q % rowsPerCol;
          
          const qStartX = ansStartX + (cIdx * colW);
          const qStartY = ansStartY + (rIdx * rowH);
          
          const optStartX = qStartX + colW * 0.35;
          const optW = colW * 0.65;

          let maxD = 0; let bestOpt = -1;

          for (let o = 0; o < qData.options; o++) {
            const cellCenterX = optStartX + (optW / qData.options) * (o + 0.5);
            const cellCenterY = qStartY + rowH / 2;

            const d = sampleDarkness(cellCenterX, cellCenterY, 16);
            if (d > maxD && d > 60) { maxD = d; bestOpt = o; }
          }
          scannedAnswers.push(bestOpt);
          if (bestOpt === qData.answer) score++;
        }

        // --- ROSTER LOOKUP ---
        let foundName = '';
        const cleanRoll = scannedRollNo.replace(/\?/g, '');
        
        if (exam.classId && classes.length > 0) {
          const assignedClass = classes.find(c => c.id === exam.classId);
          if (assignedClass && cleanRoll) {
            const matchedStudent = assignedClass.students.find(s => 
              s.rollNo === cleanRoll || parseInt(s.rollNo) === parseInt(cleanRoll)
            );
            if (matchedStudent) {
              foundName = matchedStudent.name;
            }
          }
        }

        setResult({ score, total: exam.questions, scannedAnswers, scannedRollNo });
        setStudentId(cleanRoll);
        setScannedStudentName(foundName);
        setIsProcessing(false);
        setIsAligned(false);
      };

      // --- AUTO SCAN TRACING LOOP (EVALBEE STYLE) ---
      const checkAlignmentLoop = () => {
        if (isProcessing || result) return;

        const video = videoRef.current;
        const tracking = trackingCanvasRef.current;
        const overlay = overlayCanvasRef.current;

        if (video && video.readyState === video.HAVE_ENOUGH_DATA && tracking && overlay) {
            
            // Sync overlay canvas to actual display pixels
            overlay.width = video.clientWidth;
            overlay.height = video.clientHeight;

            const tw = tracking.width;
            const th = tracking.height;
            const ctxT = tracking.getContext('2d', { willReadFrequently: true });
            ctxT.drawImage(video, 0, 0, tw, th);
            const imgData = ctxT.getImageData(0, 0, tw, th).data;

            // Algorithm to quickly find darkest density in a specific search region
            const findDarkestBlock = (startX, startY, radius) => {
                let bestAvg = 255; let bestX = startX; let bestY = startY;
                const bs = 8; // block size to sample
                const minX = Math.max(0, Math.floor(startX - radius));
                const maxX = Math.min(tw - bs, Math.floor(startX + radius));
                const minY = Math.max(0, Math.floor(startY - radius));
                const maxY = Math.min(th - bs, Math.floor(startY + radius));

                for (let y = minY; y < maxY; y += 2) {
                    for (let x = minX; x < maxX; x += 2) {
                        let sum = 0;
                        for(let by=0; by<bs; by+=2){
                            for(let bx=0; bx<bs; bx+=2){
                                const idx = ((y+by)*tw + (x+bx))*4;
                                sum += (imgData[idx] + imgData[idx+1] + imgData[idx+2])/3;
                            }
                        }
                        const avg = sum/16; // 4x4 samples (bs=8, step=2)
                        if (avg < bestAvg) {
                            bestAvg = avg;
                            bestX = x + bs/2;
                            bestY = y + bs/2;
                        }
                    }
                }
                return { x: bestX, y: bestY, brightness: bestAvg };
            };

            // Expected Paper bounding box to create our Search Regions
            const expectedW = th * 0.9 * (816/1056);
            const expectedH = th * 0.9;
            const cx = tw / 2; const cy = th / 2;
            
            const expTL = { x: cx - expectedW/2, y: cy - expectedH/2 };
            const expTR = { x: cx + expectedW/2, y: cy - expectedH/2 };
            const expBL = { x: cx - expectedW/2, y: cy + expectedH/2 };
            const expBR = { x: cx + expectedW/2, y: cy + expectedH/2 };

            const searchRadius = tw * 0.15; // Fairly wide catch radius

            const tl = findDarkestBlock(expTL.x, expTL.y, searchRadius);
            const tr = findDarkestBlock(expTR.x, expTR.y, searchRadius);
            const bl = findDarkestBlock(expBL.x, expBL.y, searchRadius);
            const br = findDarkestBlock(expBR.x, expBR.y, searchRadius);

            const thresh = 90; // Marker must be relatively black
            let validQuad = null;

            if (tl.brightness < thresh && tr.brightness < thresh && bl.brightness < thresh && br.brightness < thresh) {
                // Verify Geometry (Is it actually rectangular-ish?)
                const wTop = Math.hypot(tl.x - tr.x, tl.y - tr.y);
                const wBot = Math.hypot(bl.x - br.x, bl.y - br.y);
                const lH = Math.hypot(tl.x - bl.x, tl.y - bl.y);
                const rH = Math.hypot(tr.x - br.x, tr.y - br.y);
                
                if (Math.abs(wTop - wBot) < wTop * 0.3 && Math.abs(lH - rH) < lH * 0.3 && wTop > tw * 0.3) {
                    const scaleX = video.videoWidth / tw;
                    const scaleY = video.videoHeight / th;
                    validQuad = {
                        tl: {x: tl.x * scaleX, y: tl.y * scaleY},
                        tr: {x: tr.x * scaleX, y: tr.y * scaleY},
                        bl: {x: bl.x * scaleX, y: bl.y * scaleY},
                        br: {x: br.x * scaleX, y: br.y * scaleY},
                    };
                    lastValidQuad.current = validQuad;
                }
            }

            // --- DRAW MAGNETIC OVERLAY ---
            const ctxO = overlay.getContext('2d');
            ctxO.clearRect(0, 0, overlay.width, overlay.height);

            if (validQuad) {
                setIsAligned(true);
                alignmentFrames.current += 1;

                // Draw solid green perspective tracker
                ctxO.strokeStyle = '#22c55e'; // Green
                ctxO.lineWidth = 4;
                ctxO.beginPath();
                const dX = overlay.width / video.videoWidth;
                const dY = overlay.height / video.videoHeight;
                ctxO.moveTo(validQuad.tl.x * dX, validQuad.tl.y * dY);
                ctxO.lineTo(validQuad.tr.x * dX, validQuad.tr.y * dY);
                ctxO.lineTo(validQuad.br.x * dX, validQuad.br.y * dY);
                ctxO.lineTo(validQuad.bl.x * dX, validQuad.bl.y * dY);
                ctxO.closePath();
                ctxO.stroke();
                ctxO.fillStyle = 'rgba(34, 197, 94, 0.15)'; // Light green tint
                ctxO.fill();

                if (autoScanEnabled && alignmentFrames.current > 5) {
                    processImage();
                    return;
                }
            } else {
                setIsAligned(false);
                alignmentFrames.current = 0;

                // Draw expected target guide
                const tW = overlay.height * 0.85 * (816/1056);
                const tH = overlay.height * 0.85;
                const tX = (overlay.width - tW) / 2;
                const tY = (overlay.height - tH) / 2;

                ctxO.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                ctxO.setLineDash([10, 10]);
                ctxO.lineWidth = 2;
                ctxO.strokeRect(tX, tY, tW, tH);
                ctxO.setLineDash([]);
                
                // Draw corner hints
                const L = 20;
                ctxO.lineWidth = 4;
                ctxO.strokeStyle = '#ef4444'; // Red
                // TL
                ctxO.beginPath(); ctxO.moveTo(tX, tY+L); ctxO.lineTo(tX, tY); ctxO.lineTo(tX+L, tY); ctxO.stroke();
                // TR
                ctxO.beginPath(); ctxO.moveTo(tX+tW-L, tY); ctxO.lineTo(tX+tW, tY); ctxO.lineTo(tX+tW, tY+L); ctxO.stroke();
                // BL
                ctxO.beginPath(); ctxO.moveTo(tX, tY+tH-L); ctxO.lineTo(tX, tY+tH); ctxO.lineTo(tX+L, tY+tH); ctxO.stroke();
                // BR
                ctxO.beginPath(); ctxO.moveTo(tX+tW-L, tY+tH); ctxO.lineTo(tX+tW, tY+tH); ctxO.lineTo(tX+tW, tY+tH-L); ctxO.stroke();
            }
        }
        scanLoopRef.current = requestAnimationFrame(checkAlignmentLoop);
      };

      useEffect(() => {
          if (stream && !result && !isProcessing) {
              scanLoopRef.current = requestAnimationFrame(checkAlignmentLoop);
          }
          return () => {
              if (scanLoopRef.current) cancelAnimationFrame(scanLoopRef.current);
          }
      }, [stream, result, isProcessing, autoScanEnabled]);

      const saveResult = async () => {
        if (!studentId) return showToast("Please verify Student ID/Name before saving");
        
        const newResult = {
          studentId,
          studentName: scannedStudentName,
          score: result.score,
          total: result.total,
          scannedAnswers: result.scannedAnswers,
          timestamp: new Date().toISOString()
        };

        const updatedExam = { ...exam, results: [...(exam.results || []), newResult] };
        
        setCurrentExam(updatedExam);
        setResult(null);
        setStudentId('');
        setScannedStudentName('');
        
        await saveExam(updatedExam);
        showToast("Score saved securely to cloud!");
      };

      return (
        <div className="flex flex-col h-[calc(100vh-140px)]">
          <div className="flex justify-between items-center mb-4 bg-white p-3 rounded-xl shadow-sm border border-gray-100">
            <div className="flex items-center gap-3">
              <h2 className="text-lg font-black text-gray-800 flex items-center gap-2">
                <span className={`w-3 h-3 rounded-full ${autoScanEnabled ? 'bg-red-500 animate-pulse' : 'bg-gray-400'}`}></span> 
                {exam.name}
              </h2>
              <label className="flex items-center gap-2 bg-gray-100 px-3 py-1 rounded-lg cursor-pointer">
                <input type="checkbox" checked={autoScanEnabled} onChange={e => setAutoScanEnabled(e.target.checked)} className="rounded" />
                <span className="text-xs font-bold text-gray-600 uppercase tracking-wide">Auto-Scan</span>
              </label>
            </div>
            <button onClick={() => setView('dashboard')} className="text-gray-500 hover:text-black text-sm font-bold bg-gray-100 px-3 py-1 rounded-lg">Cancel</button>
          </div>

          {!result ? (
            <div className="relative flex-1 bg-black rounded-2xl overflow-hidden shadow-2xl border-4 border-gray-900 flex flex-col justify-center items-center">
              <video 
                ref={videoRef} autoPlay playsInline 
                className="absolute inset-0 w-full h-full object-cover opacity-80"
              />
              
              {/* Dynamic Tracking Overlay */}
              <canvas ref={overlayCanvasRef} className="absolute inset-0 w-full h-full z-10 pointer-events-none" />
              
              {/* Hidden fast-processing canvas */}
              <canvas ref={trackingCanvasRef} width={320} height={240} className="hidden" />

              {!isAligned && (

                     <p className="text-xs text-green-700 font-bold uppercase">Roster Match Found</p>

                     <p className="text-xs text-yellow-700 font-bold">No roster match found for this Roll No.</p>

                 <div className="mt-4 pt-4 border-t border-blue-200">
                    <label className="block text-xs font-bold text-gray-700 mb-1">Confirm/Edit Roll No:</label>
                    <input 
                      type="text" value={studentId} onChange={e => {
                        setStudentId(e.target.value);
                      }}

                      placeholder="Enter Roll No"

                <button

    // --- ROSTER: CLASSES MANAGER ---
    function ClassesManager({ classes, saveClass, setView, setCurrentClass, deleteClass }) {

      const [confirmDelete, setConfirmDelete] = useState(null);
      
      const handleCreate = () => {
        if (!newClassName.trim()) return;
        const newClass = { id: Date.now().toString(), name: newClassName, students: [], createdAt: new Date().toISOString() };
        saveClass(newClass);
        setNewClassName('');
      };

      return (
        <div className="space-y-6">
          <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 className="text-2xl font-black mb-4 text-gray-800 flex items-center gap-2 border-b pb-4">
              <Icon name="Users" size={24} className="text-blue-600"/> Manage Classes
            </h2>
            <div className="flex gap-2">
              <input 
                type="text" value={newClassName} onChange={e => setNewClassName(e.target.value)} 
                placeholder="e.g. Grade 10 Math"
                className="flex-1 p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 font-medium"
              />
              <button onClick={handleCreate} className="bg-blue-600 text-white px-6 rounded-xl font-black hover:bg-blue-700 transition shadow">

          <div className="space-y-3">

               <div className="text-center bg-white py-12 rounded-2xl border border-gray-100 shadow-sm">
                 <Icon name="Users" size={48} className="text-gray-200 mb-3 mx-auto" />
                 <p className="text-gray-500 font-medium">No classes created yet. Add one above.</p>
               </div>
            ) : (
              classes.map(cls => (
                <div key={cls.id} className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col sm:flex-row sm:items-center justify-between gap-4 transition hover:shadow-md">
                  <div>
                    <h3 className="font-bold text-xl text-gray-800">{cls.name}</h3>
                    <p className="text-sm text-blue-600 font-medium mt-1 bg-blue-50 inline-block px-2 py-0.5 rounded">
                      {cls.students.length} Students enrolled

                  </div>
                  <div className="flex items-center gap-2 self-end sm:self-auto">
                    {confirmDelete === cls.id ? (
                      <div className="flex items-center gap-1 bg-red-50 p-1.5 rounded-xl border border-red-100 shrink-0">
                        <span className="text-xs font-black text-red-600 px-2 uppercase tracking-wide">Delete?</span>
                        <button onClick={() => { deleteClass(cls.id); setConfirmDelete(null); }} className="bg-red-500 text-white p-1.5 rounded-lg hover:bg-red-600 shadow-sm transition"><Icon name="CheckCircle" size={16} /></button>
                        <button onClick={() => setConfirmDelete(null)} className="bg-gray-200 text-gray-700 p-1.5 rounded-lg hover:bg-gray-300 transition"><Icon name="XCircle" size={16} /></button>
                      </div>
                    ) : (
                      <button 
                        onClick={() => setConfirmDelete(cls.id)} 
                        className="bg-red-50 text-red-600 p-3 rounded-xl hover:bg-red-100 transition flex items-center justify-center gap-2 font-semibold text-sm shrink-0" 
                        title="Delete Class"
                      >
                        <Icon name="Trash" size={18} />
                      </button>
                    )}
                    <button 
                      onClick={() => { setCurrentClass(cls); setView('class_details'); }}
                      className="text-blue-600 bg-blue-50 px-5 py-3 rounded-xl font-bold hover:bg-blue-100 transition"

                      Manage Roster
