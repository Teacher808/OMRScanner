<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanMaster Cloud</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 for stylish notifications -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #f8fafc; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        .spinner-blue { border-color: rgba(59, 130, 246, 0.2); border-top-color: #3b82f6; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Hide scrollbar for cleaner UI */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // CONFIGURATION
        // ==========================================
        // 🚨 Paste your deployed Google Apps Script Web App URL here 🚨
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz9Y2vFk6MjoPSobkyn4WH50hethMnYA7dsmyUURmAY2apcspro4IpGOonQRyGiMvus/exec"; 

        // ==========================================
        // UI Icons (Inline SVGs for Standalone React)
        // ==========================================
        const Icons = {
            Cloud: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>,
            RefreshCw: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
            Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            FileText: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>,
            BarChart: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>,
            LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Menu: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        };

        // ==========================================
        // API Communication helper
        // ==========================================
        const callCloud = async (action, credentials, data = null) => {
            if (GAS_WEB_APP_URL === "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") {
                throw new Error("Please configure your GAS_WEB_APP_URL in the script.");
            }
            
            const payload = {
                action: action,
                username: credentials.username,
                password: credentials.password,
                data: data
            };

            // text/plain avoids CORS preflight requests
            const response = await fetch(GAS_WEB_APP_URL, {
                method: "POST",
                redirect: "follow",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
            });
            return await response.json();
        };

        // ==========================================
        // Main App Component
        // ==========================================
        function App() {
            const [userCredentials, setUserCredentials] = useState(null);
            
            // Render Login/Register Screen if no user active
            if (!userCredentials) {
                return <AuthScreen onLoginSuccess={setUserCredentials} />;
            }
            
            // Render Main Interface with protected data
            return <MainInterface credentials={userCredentials} onLogout={() => setUserCredentials(null)} />;
        }

        // ==========================================
        // Authentication Screen
        // ==========================================
        function AuthScreen({ onLoginSuccess }) {
            const [isRegistering, setIsRegistering] = useState(false);
            const [username, setUsername] = useState("");
            const [password, setPassword] = useState("");
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!username || !password) return Swal.fire("Error", "Username and Password required", "warning");

                setLoading(true);
                const action = isRegistering ? "REGISTER" : "LOGIN";
                
                try {
                    const result = await callCloud(action, { username, password });
                    
                    if (result.status === 'success') {
                        if (isRegistering) {
                            Swal.fire("Success", "Account created successfully! You are now logged in.", "success");
                        }
                        onLoginSuccess({ username, password });
                    } else {
                        Swal.fire("Authentication Failed", result.message, "error");
                    }
                } catch (error) {
                    Swal.fire("Network Error", error.message, "error");
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
                        <div className="bg-blue-600 p-8 text-center">
                            <h1 className="text-3xl font-black text-white tracking-tight">ScanMaster</h1>
                            <p className="text-blue-100 mt-2">Cloud-Synced Grading App</p>
                        </div>
                        <div className="p-8">
                            <h2 className="text-2xl font-bold text-slate-800 mb-6">
                                {isRegistering ? "Create your account" : "Sign in to your account"}
                            </h2>
                            <form onSubmit={handleSubmit} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-semibold text-slate-600 mb-1">Username</label>
                                    <input 
                                        type="text" 
                                        value={username} 
                                        onChange={(e) => setUsername(e.target.value)}
                                        className="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                                        placeholder="Enter your username"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-slate-600 mb-1">Password</label>
                                    <input 
                                        type="password" 
                                        value={password} 
                                        onChange={(e) => setPassword(e.target.value)}
                                        className="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                                        placeholder="Enter your password"
                                        required
                                    />
                                </div>
                                <button 
                                    type="submit" 
                                    disabled={loading}
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg flex justify-center items-center transition-colors disabled:opacity-70"
                                >
                                    {loading ? <div className="spinner"></div> : (isRegistering ? "Sign Up" : "Sign In")}
                                </button>
                            </form>
                            
                            <div className="mt-6 text-center text-sm text-slate-600">
                                {isRegistering ? "Already have an account? " : "Need an account? "}
                                <button 
                                    type="button" 
                                    onClick={() => setIsRegistering(!isRegistering)}
                                    className="text-blue-600 font-bold hover:underline"
                                >
                                    {isRegistering ? "Sign in" : "Register here"}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // Main Application Interface
        // ==========================================
        function MainInterface({ credentials, onLogout }) {
            const [currentView, setCurrentView] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            
            // Application Data State
            const [appData, setAppData] = useState({ classes: [], exams: [] });
            const [isSyncing, setIsSyncing] = useState(false);
            const [initialLoad, setInitialLoad] = useState(true);

            // Fetch data on initial login
            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                setIsSyncing(true);
                try {
                    const result = await callCloud("FETCH_DATA", credentials);
                    if (result.status === 'success') {
                        setAppData(result.data || { classes: [], exams: [] });
                    } else {
                        Swal.fire("Sync Error", result.message, "error");
                    }
                } catch (error) {
                    Swal.fire("Connection Error", "Could not fetch data from cloud.", "error");
                }
                setIsSyncing(false);
                setInitialLoad(false);
            };

            const saveDataToCloud = async (newData) => {
                setIsSyncing(true);
                setAppData(newData); // Optimistic UI update
                try {
                    const result = await callCloud("SYNC_DATA", credentials, newData);
                    if (result.status !== 'success') {
                        Swal.fire("Cloud Save Failed", result.message, "error");
                    }
                } catch (error) {
                    Swal.fire("Connection Error", "Changes saved locally, but cloud sync failed.", "warning");
                }
                setIsSyncing(false);
            };

            // UI Actions
            const addClass = async () => {
                const { value: className } = await Swal.fire({
                    title: 'Add New Class',
                    input: 'text',
                    inputPlaceholder: 'e.g., Math 101',
                    showCancelButton: true
                });
                
                if (className) {
                    const newClasses = [...appData.classes, { id: Date.now().toString(), name: className, students: 0 }];
                    saveDataToCloud({ ...appData, classes: newClasses });
                }
            };

            const addExam = async () => {
                if (appData.classes.length === 0) {
                    return Swal.fire("Notice", "Please create a class first.", "info");
                }
                const { value: examName } = await Swal.fire({
                    title: 'Create New Exam',
                    input: 'text',
                    showCancelButton: true
                });
                
                if (examName) {
                    const newExams = [...appData.exams, { id: Date.now().toString(), name: examName, date: new Date().toLocaleDateString() }];
                    saveDataToCloud({ ...appData, exams: newExams });
                }
            };

            const deleteItem = (type, id) => {
                Swal.fire({
                    title: 'Are you sure?',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#ef4444',
                    confirmButtonText: 'Yes, delete it!'
                }).then((result) => {
                    if (result.isConfirmed) {
                        const newData = { ...appData };
                        newData[type] = newData[type].filter(item => item.id !== id);
                        saveDataToCloud(newData);
                    }
                });
            };

            // Render Views
            const renderDashboard = () => (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold text-slate-800">Welcome, {credentials.username}!</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-lg font-bold text-slate-700">Total Classes</h3>
                                <div className="p-3 bg-blue-100 text-blue-600 rounded-lg"><Icons.Users /></div>
                            </div>
                            <p className="text-4xl font-black text-slate-900">{appData.classes?.length || 0}</p>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-lg font-bold text-slate-700">Total Exams</h3>
                                <div className="p-3 bg-purple-100 text-purple-600 rounded-lg"><Icons.FileText /></div>
                            </div>
                            <p className="text-4xl font-black text-slate-900">{appData.exams?.length || 0}</p>
                        </div>
                    </div>
                </div>
            );

            const renderClasses = () => (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-slate-800">My Classes</h2>
                        <button onClick={addClass} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold flex items-center gap-2">
                            <Icons.Plus /> Add Class
                        </button>
                    </div>
                    {appData.classes?.length === 0 ? (
                        <div className="text-center py-12 bg-white rounded-xl border border-dashed border-slate-300">
                            <p className="text-slate-500">No classes found. Create one to get started.</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {appData.classes?.map(cls => (
                                <div key={cls.id} className="bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center">
                                    <div>
                                        <h4 className="font-bold text-lg">{cls.name}</h4>
                                        <p className="text-sm text-slate-500">{cls.students} students</p>
                                    </div>
                                    <button onClick={() => deleteItem('classes', cls.id)} className="text-red-500 hover:bg-red-50 p-2 rounded-md">
                                        <Icons.X />
                                    </button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            const renderExams = () => (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-slate-800">My Exams</h2>
                        <button onClick={addExam} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold flex items-center gap-2">
                            <Icons.Plus /> Create Exam
                        </button>
                    </div>
                    {appData.exams?.length === 0 ? (
                        <div className="text-center py-12 bg-white rounded-xl border border-dashed border-slate-300">
                            <p className="text-slate-500">No exams created yet.</p>
                        </div>
                    ) : (
                        <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-slate-50 text-slate-600 border-b">
                                        <th className="p-4 font-semibold">Exam Name</th>
                                        <th className="p-4 font-semibold">Date Created</th>
                                        <th className="p-4 font-semibold">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {appData.exams?.map(exam => (
                                        <tr key={exam.id} className="border-b last:border-0 hover:bg-slate-50">
                                            <td className="p-4 font-medium text-slate-800">{exam.name}</td>
                                            <td className="p-4 text-slate-500">{exam.date}</td>
                                            <td className="p-4 flex gap-2">
                                                <button onClick={() => deleteItem('exams', exam.id)} className="text-red-500 hover:bg-red-50 p-2 rounded-md">Delete</button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>
            );

            if (initialLoad) {
                return <div className="h-screen w-full flex items-center justify-center flex-col gap-4">
                    <div className="spinner spinner-blue w-10 h-10"></div>
                    <p className="text-slate-500 font-semibold animate-pulse">Loading Cloud Data...</p>
                </div>;
            }

            return (
                <div className="flex h-screen overflow-hidden bg-slate-50">
                    {/* Mobile Menu Overlay */}
                    {isMobileMenuOpen && (
                        <div className="fixed inset-0 bg-slate-900/50 z-40 lg:hidden" onClick={() => setIsMobileMenuOpen(false)}></div>
                    )}

                    {/* Sidebar */}
                    <aside className={`fixed lg:static inset-y-0 left-0 w-64 bg-slate-900 text-slate-300 z-50 transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0 transition-transform duration-200 ease-in-out flex flex-col`}>
                        <div className="p-6 flex items-center justify-between bg-slate-950">
                            <h1 className="text-2xl font-black text-white flex items-center gap-2">
                                <span className="bg-blue-600 p-1.5 rounded-lg"><Icons.Cloud /></span> ScanMaster
                            </h1>
                            <button className="lg:hidden text-slate-400 hover:text-white" onClick={() => setIsMobileMenuOpen(false)}>
                                <Icons.X />
                            </button>
                        </div>
                        
                        <nav className="flex-1 p-4 space-y-1 overflow-y-auto">
                            {[
                                { id: 'dashboard', icon: Icons.BarChart, label: 'Dashboard' },
                                { id: 'classes', icon: Icons.Users, label: 'Classes' },
                                { id: 'exams', icon: Icons.FileText, label: 'Exams' }
                            ].map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => { setCurrentView(item.id); setIsMobileMenuOpen(false); }}
                                    className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg font-medium transition-colors ${currentView === item.id ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <item.icon />
                                    <span>{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        
                        <div className="p-4 border-t border-slate-800">
                            <div className="mb-4 px-4 py-3 bg-slate-800 rounded-lg flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 rounded-full bg-blue-500 text-white flex items-center justify-center font-bold">
                                        {credentials.username.charAt(0).toUpperCase()}
                                    </div>
                                    <span className="text-sm font-semibold text-white truncate max-w-[100px]">{credentials.username}</span>
                                </div>
                                <button onClick={onLogout} title="Sign Out" className="text-slate-400 hover:text-white p-1">
                                    <Icons.LogOut />
                                </button>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        {/* Header */}
                        <header className="bg-white shadow-sm px-6 py-4 flex items-center justify-between shrink-0 z-10">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsMobileMenuOpen(true)} className="lg:hidden p-2 bg-slate-100 rounded-md text-slate-700">
                                    <Icons.Menu />
                                </button>
                                <h2 className="text-xl font-bold text-slate-800 capitalize hidden sm:block">
                                    {currentView}
                                </h2>
                            </div>
                            
                            <div className="flex items-center gap-3 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200">
                                {isSyncing ? (
                                    <><div className="spinner spinner-blue !w-4 !h-4 border-2"></div> <span className="text-sm font-medium text-slate-500">Syncing...</span></>
                                ) : (
                                    <><span className="text-green-500"><Icons.Cloud /></span> <span className="text-sm font-medium text-slate-600">Cloud Synced</span></>
                                )}
                                <button onClick={fetchData} title="Force Sync" className="ml-2 text-slate-400 hover:text-blue-600 p-1">
                                    <Icons.RefreshCw />
                                </button>
                            </div>
                        </header>

                        {/* Scrollable View Area */}
                        <div className="flex-1 overflow-y-auto p-6 lg:p-10">
                            <div className="max-w-5xl mx-auto">
                                {currentView === 'dashboard' && renderDashboard()}
                                {currentView === 'classes' && renderClasses()}
                                {currentView === 'exams' && renderExams()}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
