<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Scanner</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .toast-enter { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn {
            0% { transform: translateY(-100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        // --- FIREBASE IMPORTS ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyDQ1oFts4jTQ50MZ3UfjEPjJFX3o3l3mlc",
            authDomain: "easyomr-99a32.firebaseapp.com",
            projectId: "easyomr-99a32",
            storageBucket: "easyomr-99a32.firebasestorage.app",
            messagingSenderId: "545734045836",
            appId: "1:545734045836:web:d963157f9a2e3576c94ba9",
            measurementId: "G-HGY1039P8L"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const globalAppId = "easyomr-app";

        // --- ICONS (Inline SVGs) ---
        const Icons = {
            Camera: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
            Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
            FileText: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Alert: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        };

        // --- MAIN APP COMPONENT ---
        function App() {
            // Auth States
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [isLoginMode, setIsLoginMode] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            // App States
            const [classes, setClasses] = useState([]);
            const [exams, setExams] = useState([]);
            const [currentView, setCurrentView] = useState('exams'); // 'exams', 'classes', 'students', 'scanner'
            const [selectedClass, setSelectedClass] = useState(null);
            const [toast, setToast] = useState({ show: false, msg: '', type: 'error' });

            // Form states
            const [newClassName, setNewClassName] = useState('');
            const [newStudentRoll, setNewStudentRoll] = useState('');
            const [newStudentName, setNewStudentName] = useState('');
            const [newExamTitle, setNewExamTitle] = useState('');

            // Scanner simulation state
            const [simulatedRoll, setSimulatedRoll] = useState('');
            const [scanResult, setScanResult] = useState(null);
            const videoRef = useRef(null);
            const streamRef = useRef(null);

            const showToast = (msg, type = 'error') => {
                setToast({ show: true, msg, type });
                setTimeout(() => setToast({ show: false, msg: '', type: 'error' }), 4000);
            };

            // 1. Listen for Firebase Auth State Changes
            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    if (currentUser) {
                        setUser(currentUser);
                    } else if (user?.uid !== 'local-user') {
                        // Only set to null if they aren't explicitly in local mode
                        setUser(null);
                    }
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            // 2. Fetch Classes and Exams Data (Cloud Sync - strictly bound to user.uid)
            useEffect(() => {
                if (!user || user.uid === 'local-user') return;
                
                // Privacy: Each user gets their own dedicated sub-collection based on their unique ID
                const classesRef = collection(db, 'artifacts', globalAppId, 'users', user.uid, 'classes');
                const examsRef = collection(db, 'artifacts', globalAppId, 'users', user.uid, 'exams');
                
                const unsubClasses = onSnapshot(classesRef, (snapshot) => {
                    const fetchedClasses = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    fetchedClasses.sort((a, b) => b.createdAt - a.createdAt);
                    setClasses(fetchedClasses);
                }, (error) => {
                    console.error("Firestore error:", error);
                });

                const unsubExams = onSnapshot(examsRef, (snapshot) => {
                    const fetchedExams = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    fetchedExams.sort((a, b) => b.createdAt - a.createdAt);
                    setExams(fetchedExams);
                }, (error) => {
                    console.error("Firestore error:", error);
                });

                return () => {
                    unsubClasses();
                    unsubExams();
                };
            }, [user]);

            // Keep selectedClass up to date when 'classes' array changes
            useEffect(() => {
                if (selectedClass) {
                    const updated = classes.find(c => c.id === selectedClass.id);
                    if (updated) setSelectedClass(updated);
                }
            }, [classes]);

            // 3. Camera Handling for Scanner View
            useEffect(() => {
                if (currentView === 'scanner') {
                    startCamera();
                } else {
                    stopCamera();
                }
                return () => stopCamera();
            }, [currentView]);

            const startCamera = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    streamRef.current = stream;
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                    }
                } catch (err) {
                    console.error("Camera error:", err);
                    showToast("Could not access camera. Please allow permissions.", "error");
                }
            };

            const stopCamera = () => {
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(track => track.stop());
                    streamRef.current = null;
                }
            };

            // --- AUTH ACTIONS ---
            const handleEmailAuth = async (e) => {
                e.preventDefault();
                if (!email || !password) {
                    showToast("Please enter email and password.", "error");
                    return;
                }

                try {
                    if (isLoginMode) {
                        await signInWithEmailAndPassword(auth, email, password);
                        showToast("Successfully logged in!", "success");
                    } else {
                        await createUserWithEmailAndPassword(auth, email, password);
                        showToast("Account created successfully!", "success");
                    }
                    setEmail('');
                    setPassword('');
                } catch (error) {
                    console.error("Auth error:", error);
                    // Provide clear error messages
                    let msg = error.message;
                    if (error.code === 'auth/invalid-credential') msg = "Incorrect email or password.";
                    if (error.code === 'auth/email-already-in-use') msg = "An account with this email already exists.";
                    if (error.code === 'auth/weak-password') msg = "Password should be at least 6 characters.";
                    if (error.code === 'auth/operation-not-allowed') msg = "Please enable Email/Password login in your Firebase Console.";
                    
                    showToast(msg, "error");
                }
            };

            const handleLogout = async () => {
                if (user?.uid === 'local-user') {
                    setUser(null);
                    setClasses([]);
                    setExams([]);
                    setSelectedClass(null);
                    setCurrentView('exams');
                    showToast("Exited offline mode.", "success");
                } else {
                    try {
                        await signOut(auth);
                        setUser(null);
                        setClasses([]);
                        setExams([]);
                        setSelectedClass(null);
                        setCurrentView('exams');
                        showToast("Successfully logged out.", "success");
                    } catch (error) {
                        showToast("Failed to log out.", "error");
                    }
                }
            };

            const enableLocalMode = () => {
                setUser({ uid: 'local-user', email: 'Offline User' });
                showToast("Working locally. Data will not be saved to the cloud.", "success");
            };

            // --- EXAM ACTIONS ---
            const addExam = async (e) => {
                e.preventDefault();
                if (!newExamTitle.trim() || !user) return;
                
                const newExam = {
                    id: Date.now().toString(),
                    title: newExamTitle.trim(),
                    createdAt: Date.now()
                };

                if (user.uid === 'local-user') {
                    setExams(prev => [newExam, ...prev]);
                    setNewExamTitle('');
                    showToast("Exam added (Local Mode)", "success");
                    return;
                }

                try {
                    await setDoc(doc(db, 'artifacts', globalAppId, 'users', user.uid, 'exams', newExam.id), newExam);
                    setNewExamTitle('');
                    showToast("Exam added successfully", "success");
                } catch (error) {
                    showToast("Failed to add exam", "error");
                }
            };

            const deleteExam = async (examId) => {
                if (!user) return;
                
                if (user.uid === 'local-user') {
                    setExams(prev => prev.filter(e => e.id !== examId));
                    showToast("Exam deleted (Local Mode)", "success");
                    return;
                }

                try {
                    await deleteDoc(doc(db, 'artifacts', globalAppId, 'users', user.uid, 'exams', examId));
                    showToast("Exam deleted", "success");
                } catch (error) {
                    showToast("Failed to delete exam", "error");
                }
            };

            // --- CLASS & STUDENT ACTIONS ---
            const addClass = async (e) => {
                e.preventDefault();
                if (!newClassName.trim() || !user) return;
                
                const newClass = {
                    id: Date.now().toString(),
                    name: newClassName.trim(),
                    createdAt: Date.now(),
                    students: []
                };

                if (user.uid === 'local-user') {
                    setClasses(prev => [newClass, ...prev]);
                    setNewClassName('');
                    showToast("Section added (Local Mode)", "success");
                    return;
                }

                try {
                    await setDoc(doc(db, 'artifacts', globalAppId, 'users', user.uid, 'classes', newClass.id), newClass);
                    setNewClassName('');
                    showToast("Section added successfully", "success");
                } catch (error) {
                    showToast("Failed to add section", "error");
                }
            };

            const addStudent = async (e) => {
                e.preventDefault();
                if (!newStudentRoll.trim() || !newStudentName.trim() || !selectedClass || !user) return;

                if (selectedClass.students.some(s => s.rollNumber === newStudentRoll.trim())) {
                    showToast("A student with this roll number already exists in this section.", "error");
                    return;
                }

                const updatedStudents = [...selectedClass.students, {
                    rollNumber: newStudentRoll.trim(),
                    name: newStudentName.trim(),
                    addedAt: Date.now()
                }];
                
                const updatedClass = { ...selectedClass, students: updatedStudents };

                if (user.uid === 'local-user') {
                    setClasses(prev => prev.map(c => c.id === selectedClass.id ? updatedClass : c));
                    setNewStudentRoll('');
                    setNewStudentName('');
                    showToast("Student added (Local Mode)", "success");
                    return;
                }

                try {
                    await setDoc(doc(db, 'artifacts', globalAppId, 'users', user.uid, 'classes', selectedClass.id), updatedClass);
                    setNewStudentRoll('');
                    setNewStudentName('');
                    showToast("Student added", "success");
                } catch (error) {
                    showToast("Failed to add student", "error");
                }
            };

            const deleteStudent = async (rollNumber) => {
                if (!selectedClass || !user) return;
                const updatedStudents = selectedClass.students.filter(s => s.rollNumber !== rollNumber);
                const updatedClass = { ...selectedClass, students: updatedStudents };

                if (user.uid === 'local-user') {
                    setClasses(prev => prev.map(c => c.id === selectedClass.id ? updatedClass : c));
                    showToast("Student removed (Local Mode)", "success");
                    return;
                }

                try {
                    await setDoc(doc(db, 'artifacts', globalAppId, 'users', user.uid, 'classes', selectedClass.id), updatedClass);
                } catch (error) {
                    showToast("Failed to remove student", "error");
                }
            };

            const processScan = (scannedRollStr) => {
                if (!selectedClass) {
                    showToast("Please select a section to grade first.", "error");
                    return;
                }

                const rollNumber = scannedRollStr.trim();

                if (!rollNumber) {
                    setScanResult(null);
                    showToast("Invalid roll number! Use specified generated template.", "error");
                    return;
                }

                const matchedStudent = selectedClass.students.find(s => s.rollNumber === rollNumber);

                if (matchedStudent) {
                    setScanResult(matchedStudent);
                    showToast(`Success! Linked to: ${matchedStudent.name}`, "success");
                } else {
                    setScanResult(null);
                    showToast("Invalid roll number! Use specified generated template.", "error");
                }
            };

            // --- RENDERERS ---
            
            // Loading Screen
            if (authLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-50">
                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                    </div>
                );
            }

            // Authentication Screen (if no user is logged in)
            if (!user) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50 p-4">
                        {/* Toast Notification */}
                        {toast.show && (
                            <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-2 px-6 py-3 rounded-full shadow-lg text-white font-medium toast-enter ${toast.type === 'error' ? 'bg-red-600' : 'bg-green-600'}`}>
                                {toast.type === 'error' ? <Icons.Alert /> : <Icons.Check />}
                                {toast.msg}
                            </div>
                        )}
                        
                        <div className="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
                            <div className="text-center mb-8">
                                <div className="inline-flex bg-blue-600 p-3 rounded-xl text-white mb-4">
                                    <Icons.Camera />
                                </div>
                                <h1 className="text-2xl font-bold text-gray-900">Exam Scanner</h1>
                                <p className="text-gray-500 mt-2">Sign in to sync your classes and scans securely across devices.</p>
                            </div>

                            <form onSubmit={handleEmailAuth} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                                    <input 
                                        type="email" 
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        placeholder="you@example.com"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                    <input 
                                        type="password" 
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        placeholder="••••••••"
                                        required
                                        minLength="6"
                                    />
                                </div>

                                <button type="submit" className="w-full bg-blue-600 text-white rounded-xl px-4 py-3 font-bold hover:bg-blue-700 transition-colors shadow-sm">
                                    {isLoginMode ? 'Sign In' : 'Create Account'}
                                </button>
                            </form>

                            <div className="mt-6 text-center">
                                <button 
                                    onClick={() => setIsLoginMode(!isLoginMode)}
                                    className="text-sm text-blue-600 hover:underline font-medium"
                                >
                                    {isLoginMode ? "Don't have an account? Sign up" : "Already have an account? Sign in"}
                                </button>
                            </div>

                            <div className="mt-8 pt-6 border-t border-gray-100">
                                <button 
                                    onClick={enableLocalMode}
                                    className="w-full bg-white border border-gray-300 text-gray-700 rounded-xl px-4 py-3 font-medium hover:bg-gray-50 transition-colors"
                                >
                                    Continue Offline (No Sync)
                                </button>
                            </div>
                        </div>

                        {/* Auth Screen Footer */}
                        <div className="mt-8 text-sm text-gray-400 font-medium">
                            Developed by PVNJ
                        </div>
                    </div>
                );
            }

            // Main App View (when logged in)
            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    
                    {/* Toast Notification */}
                    {toast.show && (
                        <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-2 px-6 py-3 rounded-full shadow-lg text-white font-medium toast-enter ${toast.type === 'error' ? 'bg-red-600' : 'bg-green-600'}`}>
                            {toast.type === 'error' ? <Icons.Alert /> : <Icons.Check />}
                            {toast.msg}
                        </div>
                    )}

                    {/* Sidebar Navigation */}
                    <nav className="w-full md:w-64 bg-white border-r border-gray-200 flex-shrink-0 flex flex-col">
                        <div className="p-6 border-b border-gray-200">
                            <h1 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                <div className="bg-blue-600 p-1.5 rounded-lg text-white"><Icons.Camera /></div>
                                EasyOMR
                            </h1>
                        </div>
                        <div className="p-4 space-y-2 flex-1">
                            <button 
                                onClick={() => setCurrentView('exams')}
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-colors ${currentView === 'exams' ? 'bg-blue-50 text-blue-700 font-semibold' : 'text-gray-600 hover:bg-gray-50'}`}
                            >
                                <Icons.FileText /> Exams & Templates
                            </button>
                            <button 
                                onClick={() => setCurrentView('classes')}
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-colors ${currentView === 'classes' || currentView === 'students' ? 'bg-blue-50 text-blue-700 font-semibold' : 'text-gray-600 hover:bg-gray-50'}`}
                            >
                                <Icons.Users /> Roster & Sections
                            </button>
                            <button 
                                onClick={() => setCurrentView('scanner')}
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-colors ${currentView === 'scanner' ? 'bg-blue-50 text-blue-700 font-semibold' : 'text-gray-600 hover:bg-gray-50'}`}
                            >
                                <Icons.Camera /> Camera Scanner
                            </button>
                        </div>
                        
                        {/* User Account Info / Logout Footer */}
                        <div className="p-4 border-t border-gray-200 bg-gray-50">
                            <div className="mb-3 px-2">
                                <p className="text-xs text-gray-500 font-medium uppercase tracking-wider">Logged in as</p>
                                <p className="text-sm font-semibold text-gray-900 truncate" title={user.email}>{user.email}</p>
                            </div>
                            <button 
                                onClick={handleLogout}
                                className="w-full flex items-center gap-2 justify-center px-4 py-2 bg-white border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-100 transition-colors"
                            >
                                <Icons.LogOut /> Sign Out
                            </button>
                        </div>
                    </nav>

                    {/* Main Content Area */}
                    <main className="flex-1 overflow-auto bg-gray-50 p-4 md:p-8 flex flex-col">
                        
                        <div className="flex-1">
                            {/* VIEW: EXAMS */}
                            {currentView === 'exams' && (
                                <div className="max-w-4xl mx-auto space-y-6">
                                    <header>
                                        <h2 className="text-2xl font-bold text-gray-900">Exams & Templates</h2>
                                        <p className="text-gray-500">Create exams and prepare templates for grading.</p>
                                        {user.uid === 'local-user' && (
                                            <div className="mt-4 p-4 bg-amber-50 border border-amber-200 rounded-xl text-amber-800 shadow-sm flex items-start gap-2">
                                                <Icons.Alert /> 
                                                <div className="text-sm">
                                                    <strong>Offline Mode Active:</strong> Your data is currently stored in memory and will be lost if you refresh. Sign in to save your work.
                                                </div>
                                            </div>
                                        )}
                                    </header>

                                    <form onSubmit={addExam} className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 flex gap-4">
                                        <input 
                                            type="text" 
                                            value={newExamTitle}
                                            onChange={(e) => setNewExamTitle(e.target.value)}
                                            placeholder="e.g. Midterm Examination"
                                            className="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        />
                                        <button type="submit" className="bg-blue-600 text-white px-6 py-3 rounded-xl font-medium hover:bg-blue-700 flex items-center gap-2">
                                            <Icons.Plus /> Create Exam
                                        </button>
                                    </form>

                                    <div className="grid gap-4 md:grid-cols-2">
                                        {exams.length === 0 && <div className="col-span-2 text-center py-12 text-gray-400">No exams created yet.</div>}
                                        {exams.map(exam => (
                                            <div key={exam.id} className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 hover:border-blue-300 transition-colors">
                                                <h3 className="text-lg font-bold text-gray-900">{exam.title}</h3>
                                                <p className="text-gray-500 mt-1 text-sm">Created on: {new Date(exam.createdAt).toLocaleDateString()}</p>
                                                <div className="mt-6 flex justify-between items-center border-t border-gray-100 pt-4">
                                                    <span className="text-blue-600 text-sm font-medium">Template Pending</span>
                                                    <button 
                                                        onClick={() => deleteExam(exam.id)} 
                                                        className="text-gray-400 hover:text-red-500 transition-colors p-2 rounded-lg hover:bg-red-50"
                                                        title="Delete Exam"
                                                    >
                                                        <Icons.Trash />
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* VIEW: CLASSES */}
                            {currentView === 'classes' && (
                                <div className="max-w-4xl mx-auto space-y-6">
                                    <header>
                                        <h2 className="text-2xl font-bold text-gray-900">Sections & Rosters</h2>
                                        <p className="text-gray-500">Create classes and register students securely to your account.</p>
                                        {user.uid === 'local-user' && (
                                            <div className="mt-4 p-4 bg-amber-50 border border-amber-200 rounded-xl text-amber-800 shadow-sm flex items-start gap-2">
                                                <Icons.Alert /> 
                                                <div className="text-sm">
                                                    <strong>Offline Mode Active:</strong> Your data is currently stored in memory and will be lost if you refresh. Sign in to save your work.
                                                </div>
                                            </div>
                                        )}
                                    </header>

                                    <form onSubmit={addClass} className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 flex gap-4">
                                        <input 
                                            type="text" 
                                            value={newClassName}
                                            onChange={(e) => setNewClassName(e.target.value)}
                                            placeholder="e.g. Physics 101 - Section A"
                                            className="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        />
                                        <button type="submit" className="bg-blue-600 text-white px-6 py-3 rounded-xl font-medium hover:bg-blue-700 flex items-center gap-2">
                                            <Icons.Plus /> Add Section
                                        </button>
                                    </form>

                                    <div className="grid gap-4 md:grid-cols-2">
                                        {classes.length === 0 && <div className="col-span-2 text-center py-12 text-gray-400">No sections added yet.</div>}
                                        {classes.map(cls => (
                                            <div key={cls.id} className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 hover:border-blue-300 transition-colors cursor-pointer"
                                                 onClick={() => { setSelectedClass(cls); setCurrentView('students'); }}>
                                                <h3 className="text-lg font-bold text-gray-900">{cls.name}</h3>
                                                <p className="text-gray-500 mt-1">{cls.students?.length || 0} Registered Students</p>
                                                <div className="mt-4 text-blue-600 text-sm font-medium flex items-center gap-1">
                                                    Manage Roster &rarr;
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* VIEW: STUDENTS (ROSTER) */}
                            {currentView === 'students' && selectedClass && (
                                <div className="max-w-4xl mx-auto space-y-6">
                                    <button onClick={() => setCurrentView('classes')} className="text-blue-600 hover:underline font-medium text-sm flex items-center gap-1">
                                        &larr; Back to Sections
                                    </button>
                                    <header>
                                        <h2 className="text-2xl font-bold text-gray-900">{selectedClass.name} Roster</h2>
                                        <p className="text-gray-500">Add students and their unique Roll Numbers for this section. The scanner will validate against this list.</p>
                                    </header>

                                    <form onSubmit={addStudent} className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 flex flex-col md:flex-row gap-4">
                                        <input 
                                            type="text" 
                                            value={newStudentRoll}
                                            onChange={(e) => setNewStudentRoll(e.target.value)}
                                            placeholder="Roll Number (e.g. 01)"
                                            className="md:w-1/3 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        />
                                        <input 
                                            type="text" 
                                            value={newStudentName}
                                            onChange={(e) => setNewStudentName(e.target.value)}
                                            placeholder="Student Name (e.g. Juan Dela Cruz)"
                                            className="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        />
                                        <button type="submit" className="bg-blue-600 text-white px-6 py-3 rounded-xl font-medium hover:bg-blue-700 whitespace-nowrap">
                                            Add Student
                                        </button>
                                    </form>

                                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                                        <table className="w-full text-left">
                                            <thead className="bg-gray-50 border-b border-gray-200">
                                                <tr>
                                                    <th className="px-6 py-4 font-semibold text-gray-700">Roll No.</th>
                                                    <th className="px-6 py-4 font-semibold text-gray-700">Student Name</th>
                                                    <th className="px-6 py-4 text-right">Actions</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {(!selectedClass.students || selectedClass.students.length === 0) && (
                                                    <tr><td colSpan="3" className="px-6 py-8 text-center text-gray-400">No students registered in this section yet.</td></tr>
                                                )}
                                                {selectedClass.students?.map((s, idx) => (
                                                    <tr key={idx} className="hover:bg-gray-50">
                                                        <td className="px-6 py-4 font-mono font-medium text-gray-900">{s.rollNumber}</td>
                                                        <td className="px-6 py-4 text-gray-700">{s.name}</td>
                                                        <td className="px-6 py-4 text-right">
                                                            <button onClick={() => deleteStudent(s.rollNumber)} className="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors">
                                                                <Icons.Trash />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* VIEW: SCANNER */}
                            {currentView === 'scanner' && (
                                <div className="max-w-4xl mx-auto space-y-6">
                                    <header className="text-center md:text-left">
                                        <h2 className="text-2xl font-bold text-gray-900">OMR Scanner</h2>
                                        <p className="text-gray-500">Select a section and scan the student's OMR sheet.</p>
                                    </header>

                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">1. Select Target Section</label>
                                        <select 
                                            className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none font-medium text-gray-800"
                                            value={selectedClass?.id || ''}
                                            onChange={(e) => {
                                                const cls = classes.find(c => c.id === e.target.value);
                                                setSelectedClass(cls);
                                                setScanResult(null); // Reset scan when section changes
                                            }}
                                        >
                                            <option value="" disabled>-- Select a Section --</option>
                                            {classes.map(cls => (
                                                <option key={cls.id} value={cls.id}>{cls.name} ({cls.students?.length || 0} students)</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div className="grid md:grid-cols-2 gap-6">
                                        {/* Camera Feed */}
                                        <div className="bg-black rounded-2xl overflow-hidden shadow-lg border-4 border-gray-800 relative aspect-[4/3] flex items-center justify-center">
                                            <video ref={videoRef} autoPlay playsInline muted className="absolute inset-0 w-full h-full object-cover"></video>
                                            <div className="absolute inset-0 border-2 border-white/30 m-8 rounded-lg pointer-events-none"></div>
                                            <div className="absolute bottom-4 left-0 right-0 text-center text-white/70 text-sm font-medium drop-shadow-md">
                                                Align OMR sheet within frame
                                            </div>
                                        </div>

                                        {/* Scan Action & Results */}
                                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 space-y-6 flex flex-col justify-center">
                                            
                                            <div className="space-y-3">
                                                <label className="block text-sm font-semibold text-gray-700">2. Simulate OMR Detection</label>
                                                <p className="text-xs text-gray-500">Since reading bubbles requires heavy CV processing, enter the roll number the camera "detected" to test the exact validation logic.</p>
                                                
                                                <div className="flex gap-2">
                                                    <input 
                                                        type="text" 
                                                        value={simulatedRoll}
                                                        onChange={(e) => setSimulatedRoll(e.target.value)}
                                                        placeholder="Detected Roll No."
                                                        className="flex-1 bg-gray-50 border border-gray-300 text-center font-mono text-lg rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase"
                                                    />
                                                    <button 
                                                        onClick={() => processScan(simulatedRoll)}
                                                        className="bg-green-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-700 active:scale-95 transition-all"
                                                    >
                                                        PROCESS
                                                    </button>
                                                </div>
                                            </div>

                                            <div className="h-px bg-gray-200 w-full"></div>

                                            <div className="space-y-2">
                                                <h3 className="text-sm font-semibold text-gray-700 uppercase tracking-wider">Linking Result</h3>
                                                
                                                {scanResult ? (
                                                    <div className="bg-blue-50 border border-blue-200 p-4 rounded-xl flex items-center gap-4">
                                                        <div className="bg-blue-600 text-white w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl flex-shrink-0">
                                                            {scanResult.rollNumber}
                                                        </div>
                                                        <div>
                                                            <p className="text-sm text-blue-600 font-bold uppercase">Matched Student</p>
                                                            <p className="text-xl font-bold text-gray-900">{scanResult.name}</p>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="bg-gray-50 border border-gray-200 border-dashed p-6 rounded-xl text-center text-gray-400 font-medium">
                                                        Waiting for valid scan...
                                                    </div>
                                                )}
                                            </div>

                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Main App Footer */}
                        <footer className="mt-12 text-center text-sm text-gray-400 font-medium">
                            Developed by PVNJ
                        </footer>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
