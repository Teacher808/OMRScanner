<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScanMaster - OMR Scanner App</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for inline JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-slate-800 antialiased overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Inline Icons (Self-Contained SVGs to replace lucide-react dependencies) ---
    const Icon = ({ path, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {path}
      </svg>
    );
    const Icons = {
      Menu: <path d="M4 12h16M4 6h16M4 18h16" />,
      X: <path d="M18 6L6 18M6 6l12 12" />,
      Layout: <path d="M3 3h18v18H3zM3 9h18M9 21V9" />,
      Users: <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />,
      User: <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" />,
      FileText: <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6M16 13H8M16 17H8M10 9H8" />,
      LayoutTemplate: <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16zM3.27 6.96L12 12.01l8.73-5.05M12 22.08V12" />,
      Plus: <path d="M12 5v14M5 12h14" />,
      Trash2: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6" />,
      Edit3: <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
    };

    // --- Lightweight Offline IndexedDB Wrapper ---
    const initDB = () => new Promise((resolve, reject) => {
      const request = indexedDB.open('EvalBeeOfflineStore', 1);
      request.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('store')) db.createObjectStore('store');
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });

    const saveLocal = async (key, val) => {
      const db = await initDB();
      const tx = db.transaction('store', 'readwrite');
      tx.objectStore('store').put(val, key);
    };

    const loadLocal = async (key) => {
      const db = await initDB();
      return new Promise((resolve) => {
        const request = db.transaction('store', 'readonly').objectStore('store').get(key);
        request.onsuccess = () => resolve(request.result);
      });
    };

    // --- Main Application Component ---
    function App() {
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [currentView, setCurrentView] = useState('dashboard');
      const [isLoaded, setIsLoaded] = useState(false);

      // App State (Initially Empty as requested)
      const [classes, setClasses] = useState([]);
      const [students, setStudents] = useState([]);
      const [exams, setExams] = useState([]);
      // Default template is provided, but user can edit or create new ones
      const [templates, setTemplates] = useState([{ id: 't1', name: 'Standard 20 Questions', numQuestions: 20, numOptions: 4 }]);
      
      const [editingTemplate, setEditingTemplate] = useState(null);

      // Load Data on Mount
      useEffect(() => {
        const loadData = async () => {
          const loadedClasses = await loadLocal('classes');
          const loadedStudents = await loadLocal('students');
          const loadedExams = await loadLocal('exams');
          const loadedTemplates = await loadLocal('templates');
          
          if (loadedClasses) setClasses(loadedClasses);
          if (loadedStudents) setStudents(loadedStudents);
          if (loadedExams) setExams(loadedExams);
          if (loadedTemplates && loadedTemplates.length > 0) setTemplates(loadedTemplates);
          
          setIsLoaded(true);
        };
        loadData();
      }, []);

      // Save Data on Change
      useEffect(() => {
        if (isLoaded) {
          saveLocal('classes', classes);
          saveLocal('students', students);
          saveLocal('exams', exams);
          saveLocal('templates', templates);
        }
      }, [classes, students, exams, templates, isLoaded]);

      if (!isLoaded) return <div className="flex h-screen items-center justify-center text-xl text-slate-500">Loading Application...</div>;

      // --- Views ---
      
      const renderDashboard = () => (
        <div className="p-6">
          <h2 className="text-2xl font-bold text-slate-800 mb-6">Dashboard Overview</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center space-x-4">
              <div className="p-4 bg-blue-100 text-blue-600 rounded-lg"><Icon path={Icons.Users} size={28} /></div>
              <div>
                <p className="text-sm text-slate-500 font-medium">Total Classes/Sections</p>
                <p className="text-3xl font-bold text-slate-800">{classes.length}</p>
              </div>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center space-x-4">
              <div className="p-4 bg-orange-100 text-orange-600 rounded-lg"><Icon path={Icons.User} size={28} /></div>
              <div>
                <p className="text-sm text-slate-500 font-medium">Total Students</p>
                <p className="text-3xl font-bold text-slate-800">{students.length}</p>
              </div>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center space-x-4">
              <div className="p-4 bg-emerald-100 text-emerald-600 rounded-lg"><Icon path={Icons.FileText} size={28} /></div>
              <div>
                <p className="text-sm text-slate-500 font-medium">Total Exams</p>
                <p className="text-3xl font-bold text-slate-800">{exams.length}</p>
              </div>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center space-x-4">
              <div className="p-4 bg-purple-100 text-purple-600 rounded-lg"><Icon path={Icons.LayoutTemplate} size={28} /></div>
              <div>
                <p className="text-sm text-slate-500 font-medium">OMR Templates</p>
                <p className="text-3xl font-bold text-slate-800">{templates.length}</p>
              </div>
            </div>
          </div>
        </div>
      );

      const renderClasses = () => {
        const handleAddClass = (e) => {
          e.preventDefault();
          const name = e.target.className.value;
          const section = e.target.sectionName.value;
          if (name && section) {
            setClasses([...classes, { id: Date.now().toString(), name, section }]);
            e.target.reset();
          }
        };
        const handleDelete = (id) => {
          if (confirm("Delete this class? Associated students and exams might lose their reference.")) {
            setClasses(classes.filter(c => c.id !== id));
            setStudents(students.filter(s => s.classId !== id)); // Remove students linked to this class
          }
        };

        return (
          <div className="p-6">
            <h2 className="text-2xl font-bold text-slate-800 mb-6">Manage Classes & Sections</h2>
            
            <form onSubmit={handleAddClass} className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-8 flex flex-col md:flex-row gap-4 items-end">
              <div className="flex-1 w-full">
                <label className="block text-sm font-medium text-slate-700 mb-1">Subject / Class Name</label>
                <input required type="text" name="className" placeholder="e.g. Mathematics 101" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
              </div>
              <div className="flex-1 w-full">
                <label className="block text-sm font-medium text-slate-700 mb-1">Section</label>
                <input required type="text" name="sectionName" placeholder="e.g. Section A" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
              </div>
              <button type="submit" className="bg-blue-600 text-white px-6 py-2 rounded-lg font-medium flex items-center justify-center gap-2 hover:bg-blue-700 w-full md:w-auto">
                <Icon path={Icons.Plus} size={18} /> Add Class
              </button>
            </form>

            <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
              {classes.length === 0 ? (
                <div className="p-8 text-center text-slate-500">No classes added yet. Add your first class above.</div>
              ) : (
                <table className="w-full text-left">
                  <thead className="bg-slate-50 border-b border-slate-100">
                    <tr>
                      <th className="px-6 py-3 text-sm font-semibold text-slate-600">Class Name</th>
                      <th className="px-6 py-3 text-sm font-semibold text-slate-600">Section</th>
                      <th className="px-6 py-3 text-sm font-semibold text-slate-600 text-right">Actions</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {classes.map(c => (
                      <tr key={c.id} className="hover:bg-slate-50 transition-colors">
                        <td className="px-6 py-4 text-slate-800 font-medium">{c.name}</td>
                        <td className="px-6 py-4 text-slate-600">{c.section}</td>
                        <td className="px-6 py-4 text-right">
                          <button onClick={() => handleDelete(c.id)} className="text-red-500 hover:text-red-700 p-2 rounded-md hover:bg-red-50">
                            <Icon path={Icons.Trash2} size={18} />
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        );
      };

      const renderStudents = () => {
        const handleAddStudent = (e) => {
          e.preventDefault();
          const name = e.target.studentName.value;
          const rollNo = e.target.rollNo.value;
          const classId = e.target.classId.value;
          
          if (!classId) return alert("Please assign the student to a class/section.");
          
          if (name && rollNo && classId) {
            setStudents([...students, { id: Date.now().toString(), name, rollNo, classId }]);
            e.target.reset();
          }
        };

        const handleDelete = (id) => {
          if (confirm("Are you sure you want to delete this student's record?")) {
            setStudents(students.filter(s => s.id !== id));
          }
        };

        return (
          <div className="p-6">
            <h2 className="text-2xl font-bold text-slate-800 mb-6">Manage Students</h2>
            
            <form onSubmit={handleAddStudent} className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-8 flex flex-col md:flex-row gap-4 items-end">
              <div className="flex-1 w-full">
                <label className="block text-sm font-medium text-slate-700 mb-1">Student Name</label>
                <input required type="text" name="studentName" placeholder="e.g. Juan Dela Cruz" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
              </div>
              <div className="flex-1 w-full">
                <label className="block text-sm font-medium text-slate-700 mb-1">Roll / ID Number</label>
                <input required type="text" name="rollNo" placeholder="e.g. 2024-001" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
              </div>
              <div className="flex-1 w-full">
                <label className="block text-sm font-medium text-slate-700 mb-1">Assign Class & Section</label>
                <select required name="classId" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                  <option value="">-- Select Class & Section --</option>
                  {classes.map(c => (
                    <option key={c.id} value={c.id}>{c.name} (Section: {c.section})</option>
                  ))}
                </select>
              </div>
              <button type="submit" className="bg-blue-600 text-white px-6 py-2 rounded-lg font-medium flex items-center justify-center gap-2 hover:bg-blue-700 w-full md:w-auto">
                <Icon path={Icons.Plus} size={18} /> Add Student
              </button>
            </form>

            <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
              {students.length === 0 ? (
                <div className="p-8 text-center text-slate-500">No students added yet. Add your first student above.</div>
              ) : (
                <table className="w-full text-left">
                  <thead className="bg-slate-50 border-b border-slate-100">
                    <tr>
                      <th className="px-6 py-3 text-sm font-semibold text-slate-600">Name</th>
                      <th className="px-6 py-3 text-sm font-semibold text-slate-600">Roll / ID No.</th>
                      <th className="px-6 py-3 text-sm font-semibold text-slate-600">Class & Section</th>
                      <th className="px-6 py-3 text-sm font-semibold text-slate-600 text-right">Actions</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {students.map(s => {
                      const assignedClass = classes.find(c => c.id === s.classId);
                      return (
                        <tr key={s.id} className="hover:bg-slate-50 transition-colors">
                          <td className="px-6 py-4 text-slate-800 font-medium">{s.name}</td>
                          <td className="px-6 py-4 text-slate-600">{s.rollNo}</td>
                          <td className="px-6 py-4 text-slate-600">
                            {assignedClass ? (
                              <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                                {assignedClass.name} - {assignedClass.section}
                              </span>
                            ) : (
                              <span className="text-red-400 text-sm">Unassigned</span>
                            )}
                          </td>
                          <td className="px-6 py-4 text-right">
                            <button onClick={() => handleDelete(s.id)} className="text-red-500 hover:text-red-700 p-2 rounded-md hover:bg-red-50">
                              <Icon path={Icons.Trash2} size={18} />
                            </button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        );
      };

      const renderExams = () => {
        const handleDelete = (id) => {
          if (confirm("Are you sure you want to delete this exam?")) {
            setExams(exams.filter(e => e.id !== id));
          }
        };

        return (
          <div className="p-6">
            <div className="flex justify-between items-center mb-6">
              <h2 className="text-2xl font-bold text-slate-800">Manage Exams</h2>
              <button onClick={() => setCurrentView('addExam')} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2 hover:bg-blue-700">
                <Icon path={Icons.Plus} size={18} /> New Exam
              </button>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
              {exams.length === 0 ? (
                <div className="p-8 text-center text-slate-500">No exams created yet. Click 'New Exam' to assign one.</div>
              ) : (
                <table className="w-full text-left">
                  <thead className="bg-slate-50 border-b border-slate-100">
                    <tr>
                      <th className="px-6 py-3 text-sm font-semibold text-slate-600">Exam Title</th>
                      <th className="px-6 py-3 text-sm font-semibold text-slate-600">Date</th>
                      <th className="px-6 py-3 text-sm font-semibold text-slate-600">Assigned Section</th>
                      <th className="px-6 py-3 text-sm font-semibold text-slate-600">OMR Template</th>
                      <th className="px-6 py-3 text-sm font-semibold text-slate-600 text-right">Actions</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {exams.map(exam => {
                      const assignedClass = classes.find(c => c.id === exam.classId);
                      const templateUsed = templates.find(t => t.id === exam.templateId);
                      return (
                        <tr key={exam.id} className="hover:bg-slate-50 transition-colors">
                          <td className="px-6 py-4 text-slate-800 font-medium">{exam.title}</td>
                          <td className="px-6 py-4 text-slate-600">{exam.date}</td>
                          <td className="px-6 py-4 text-slate-600">
                            {assignedClass ? (
                              <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                                {assignedClass.name} - {assignedClass.section}
                              </span>
                            ) : (
                              <span className="text-red-400 text-sm">Unassigned</span>
                            )}
                          </td>
                          <td className="px-6 py-4 text-slate-600 text-sm">
                            {templateUsed ? templateUsed.name : 'Unknown Template'}
                          </td>
                          <td className="px-6 py-4 text-right">
                            <button onClick={() => handleDelete(exam.id)} className="text-red-500 hover:text-red-700 p-2 rounded-md hover:bg-red-50">
                              <Icon path={Icons.Trash2} size={18} />
                            </button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        );
      };

      const renderAddExam = () => {
        const handleSubmit = (e) => {
          e.preventDefault();
          const title = e.target.title.value;
          const date = e.target.date.value;
          const classId = e.target.classId.value;
          const templateId = e.target.templateId.value;

          if (!classId) return alert("Please assign a class/section.");
          if (!templateId) return alert("Please select an OMR template.");

          setExams([...exams, { id: Date.now().toString(), title, date, classId, templateId }]);
          setCurrentView('exams');
        };

        return (
          <div className="p-6 max-w-2xl mx-auto">
            <h2 className="text-2xl font-bold text-slate-800 mb-6">Add New Exam</h2>
            <form onSubmit={handleSubmit} className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex flex-col gap-5">
              
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Exam Title</label>
                <input required type="text" name="title" placeholder="e.g. Midterm Assessment" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
              </div>

              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Date</label>
                <input required type="date" name="date" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
              </div>

              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Assign Class & Section</label>
                <select required name="classId" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                  <option value="">-- Select Class & Section --</option>
                  {classes.map(c => (
                    <option key={c.id} value={c.id}>{c.name} (Section: {c.section})</option>
                  ))}
                </select>
                {classes.length === 0 && <p className="text-red-500 text-xs mt-1">Please add a Class first in the Classes menu.</p>}
              </div>

              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Select OMR Template</label>
                <select required name="templateId" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                  <option value="">-- Select OMR Template --</option>
                  {templates.map(t => (
                    <option key={t.id} value={t.id}>{t.name} ({t.numQuestions} Qs, {t.numOptions} Options)</option>
                  ))}
                </select>
              </div>

              <div className="flex gap-4 mt-4">
                <button type="button" onClick={() => setCurrentView('exams')} className="flex-1 bg-slate-100 text-slate-700 px-4 py-2 rounded-lg font-medium hover:bg-slate-200">Cancel</button>
                <button type="submit" className="flex-1 bg-blue-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-700">Save Exam</button>
              </div>
            </form>
          </div>
        );
      };

      const renderTemplatesList = () => {
        const handleDelete = (id) => {
          if (templates.length === 1) return alert("You must have at least one template.");
          if (confirm("Delete this template?")) {
            setTemplates(templates.filter(t => t.id !== id));
          }
        };

        const startEdit = (template = null) => {
          if (template) {
            setEditingTemplate(template);
          } else {
            setEditingTemplate({ id: Date.now().toString(), name: 'New Custom Template', numQuestions: 30, numOptions: 4 });
          }
          setCurrentView('editTemplate');
        };

        return (
          <div className="p-6">
            <div className="flex justify-between items-center mb-6">
              <h2 className="text-2xl font-bold text-slate-800">OMR Templates</h2>
              <button onClick={() => startEdit()} className="bg-purple-600 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2 hover:bg-purple-700">
                <Icon path={Icons.Plus} size={18} /> Create Template
              </button>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              {templates.map(t => (
                <div key={t.id} className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col">
                  <div className="flex justify-between items-start mb-4">
                    <h3 className="font-bold text-slate-800 text-lg leading-tight">{t.name}</h3>
                    <div className="flex gap-1">
                      <button onClick={() => startEdit(t)} className="text-slate-400 hover:text-blue-600 p-1"><Icon path={Icons.Edit3} size={18} /></button>
                      <button onClick={() => handleDelete(t.id)} className="text-slate-400 hover:text-red-600 p-1"><Icon path={Icons.Trash2} size={18} /></button>
                    </div>
                  </div>
                  <div className="text-sm text-slate-600 mb-1"><span className="font-medium text-slate-800">{t.numQuestions}</span> Questions</div>
                  <div className="text-sm text-slate-600 mb-4"><span className="font-medium text-slate-800">{t.numOptions}</span> Options per question</div>
                  
                  {/* Miniature Preview */}
                  <div className="mt-auto bg-slate-50 p-3 rounded border border-slate-100 overflow-hidden h-24 relative">
                     <div className="absolute inset-0 opacity-50 p-2 space-y-1">
                        {[1, 2, 3].map(q => (
                          <div key={q} className="flex gap-1 items-center">
                            <div className="w-3 h-3 rounded-full border border-slate-400"></div>
                            <div className="w-3 h-3 rounded-full border border-slate-400"></div>
                            <div className="w-3 h-3 rounded-full border border-slate-400"></div>
                            <div className="w-3 h-3 rounded-full border border-slate-400"></div>
                          </div>
                        ))}
                     </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      };

      const renderTemplateEditor = () => {
        if (!editingTemplate) return null;

        const updateField = (field, value) => {
          setEditingTemplate({ ...editingTemplate, [field]: value });
        };

        const handleSave = () => {
          if (!editingTemplate.name.trim()) return alert("Template needs a name.");
          const exists = templates.find(t => t.id === editingTemplate.id);
          if (exists) {
            setTemplates(templates.map(t => t.id === editingTemplate.id ? editingTemplate : t));
          } else {
            setTemplates([...templates, editingTemplate]);
          }
          setEditingTemplate(null);
          setCurrentView('templates');
        };

        return (
          <div className="p-6 h-full flex flex-col md:flex-row gap-8">
            {/* Editor Sidebar */}
            <div className="w-full md:w-80 flex-shrink-0 bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex flex-col gap-6 h-fit">
              <div>
                <h2 className="text-xl font-bold text-slate-800">Edit Template</h2>
                <p className="text-sm text-slate-500 mt-1">Adjust OMR sheet parameters</p>
              </div>

              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Template Name</label>
                <input type="text" value={editingTemplate.name} onChange={(e) => updateField('name', e.target.value)} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none" />
              </div>

              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Number of Questions ({editingTemplate.numQuestions})</label>
                <input type="range" min="5" max="100" step="5" value={editingTemplate.numQuestions} onChange={(e) => updateField('numQuestions', parseInt(e.target.value))} className="w-full accent-purple-600" />
                <div className="flex justify-between text-xs text-slate-500 mt-1"><span>5</span><span>100</span></div>
              </div>

              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Options Per Question ({editingTemplate.numOptions})</label>
                <input type="range" min="2" max="6" step="1" value={editingTemplate.numOptions} onChange={(e) => updateField('numOptions', parseInt(e.target.value))} className="w-full accent-purple-600" />
                <div className="flex justify-between text-xs text-slate-500 mt-1"><span>2 (A-B)</span><span>6 (A-F)</span></div>
              </div>

              <div className="pt-4 flex gap-3 border-t border-slate-100">
                <button onClick={() => setCurrentView('templates')} className="flex-1 bg-slate-100 text-slate-700 px-4 py-2 rounded-lg font-medium hover:bg-slate-200">Cancel</button>
                <button onClick={handleSave} className="flex-1 bg-purple-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-purple-700">Save</button>
              </div>
            </div>

            {/* Live Preview Area */}
            <div className="flex-1 bg-white p-8 rounded-xl shadow-sm border border-slate-100 overflow-y-auto">
               <h3 className="text-center font-bold text-lg mb-8 uppercase tracking-widest text-slate-700">{editingTemplate.name}</h3>
               <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-8 gap-y-4">
                  {Array.from({ length: editingTemplate.numQuestions }).map((_, i) => (
                    <div key={i} className="flex items-center space-x-3">
                      <span className="w-6 text-right font-medium text-slate-700">{i + 1}.</span>
                      <div className="flex space-x-2">
                        {Array.from({ length: editingTemplate.numOptions }).map((_, j) => (
                          <div key={j} className="w-7 h-7 rounded-full border-2 border-slate-400 flex items-center justify-center text-xs font-semibold text-slate-500">
                            {String.fromCharCode(65 + j)}
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
               </div>
            </div>
          </div>
        );
      };

      // Helper for Sidebar navigation active state
      const NavItem = ({ icon, label, viewId }) => {
        const active = currentView === viewId || (viewId === 'templates' && currentView === 'editTemplate');
        return (
          <button 
            onClick={() => { setCurrentView(viewId); setIsMobileMenuOpen(false); }} 
            className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors ${active ? 'bg-blue-50 text-blue-700 font-medium' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}
          >
            <Icon path={icon} size={20} />
            <span>{label}</span>
          </button>
        );
      };

      return (
        <div className="flex h-screen bg-slate-50 w-full overflow-hidden font-sans">
          
          {/* Mobile Overlay */}
          {isMobileMenuOpen && (
            <div className="fixed inset-0 bg-slate-900/50 z-40 lg:hidden" onClick={() => setIsMobileMenuOpen(false)}></div>
          )}

          {/* Sidebar Menu */}
          <aside className={`fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-slate-200 transform transition-transform duration-200 ease-in-out lg:translate-x-0 lg:static lg:block flex flex-col ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
            <div className="p-6 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">SM</div>
                <h1 className="text-xl font-black text-slate-900 tracking-tight">ScanMaster</h1>
              </div>
              <button onClick={() => setIsMobileMenuOpen(false)} className="lg:hidden text-slate-500 p-1">
                <Icon path={Icons.X} size={24} />
              </button>
            </div>
            
            <nav className="flex-1 px-4 py-2 space-y-1 overflow-y-auto">
              <NavItem icon={Icons.Layout} label="Dashboard" viewId="dashboard" />
              <NavItem icon={Icons.Users} label="Classes & Sections" viewId="classes" />
              <NavItem icon={Icons.User} label="Students" viewId="students" />
              <NavItem icon={Icons.FileText} label="Exams" viewId="exams" />
              <NavItem icon={Icons.LayoutTemplate} label="OMR Templates" viewId="templates" />
            </nav>
          </aside>

          {/* Main Content Area */}
          <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
            <header className="lg:hidden bg-white shadow-sm px-4 py-3 flex items-center justify-between z-30">
               <h1 className="text-xl font-black text-slate-900">ScanMaster</h1>
               <button onClick={() => setIsMobileMenuOpen(true)} className="p-2 bg-slate-100 rounded-md text-slate-700">
                 <Icon path={Icons.Menu} size={20} />
               </button>
            </header>
            
            <div className="flex-1 overflow-y-auto bg-slate-50/50">
              {currentView === 'dashboard' && renderDashboard()}
              {currentView === 'classes' && renderClasses()}
              {currentView === 'students' && renderStudents()}
              {currentView === 'exams' && renderExams()}
              {currentView === 'addExam' && renderAddExam()}
              {currentView === 'templates' && renderTemplatesList()}
              {currentView === 'editTemplate' && renderTemplateEditor()}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
