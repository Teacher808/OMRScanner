<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyOMR App</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel Standalone for in-browser JSX compiling -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- HTML2Canvas & jsPDF for exporting OMR Sheets -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    @media print {
      @page { size: letter portrait; margin: 0; }
      body { margin: 0; padding: 0; background: #fff; }
      .print-hidden { display: none !important; }
      .print-area { width: 100% !important; max-width: 100% !important; border: none !important; margin: 0 !important; box-shadow: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Note the data-type="module" which allows modern import statements -->
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef } = React;

    // --- FIREBASE IMPORTS ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithCustomToken, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- FIREBASE SETUP ---
    let firebaseConfig = {};
    if (typeof __firebase_config !== 'undefined') {
      firebaseConfig = JSON.parse(__firebase_config);
    } else {
      // REPLACE THIS WITH YOUR OWN FIREBASE CONFIG IF HOSTING EXTERNALLY
      firebaseConfig = {
  apiKey: "AIzaSyAUAqxd3hdWp0BRoG4nFTZCamry7io7k-E",
  authDomain: "examscanner-e90dd.firebaseapp.com",
  projectId: "examscanner-e90dd",
  storageBucket: "examscanner-e90dd.firebasestorage.app",
  messagingSenderId: "13021828091",
  appId: "1:13021828091:web:2c8b947cd823a4befbf15e"
};
    }
    
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'easyomr-app';
    let app, auth, db;
    let firebaseInitError = null;
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    } catch (e) {
      console.error("Firebase init failed:", e);
      firebaseInitError = e.message;
    }

    // --- ICON COMPONENT MAPPER ---
    function Icon({ name, size = 20, className = "" }) {
      const map = {
        Camera: 'fa-camera', Plus: 'fa-plus', Save: 'fa-save', Settings: 'fa-cog', 
        LogOut: 'fa-sign-out-alt', CheckCircle: 'fa-check-circle', XCircle: 'fa-times-circle', 
        List: 'fa-list', FileText: 'fa-file-alt', Users: 'fa-users', Printer: 'fa-print', 
        UserPlus: 'fa-user-plus', Upload: 'fa-upload', ChevronLeft: 'fa-chevron-left', 
        BarChart2: 'fa-chart-bar', CloudUpload: 'fa-cloud-upload-alt', Trash: 'fa-trash',
        Edit: 'fa-edit', UserCheck: 'fa-user-check', Image: 'fa-image', FilePdf: 'fa-file-pdf', Download: 'fa-download'
      };
      return <i className={`fas ${map[name]} ${className}`} style={{ fontSize: size }}></i>;
    }

    // --- CUSTOM TOAST NOTIFICATION ---
    function Toast({ message, onClose }) {
      useEffect(() => {
        if (message) {
          const timer = setTimeout(onClose, 3000);
          return () => clearTimeout(timer);
        }
      }, [message]);

      if (!message) return null;
      return (
        <div className="fixed top-4 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-2 animate-bounce">
          <Icon name="CheckCircle" size={16} className="text-green-400" />
          <span className="font-medium text-sm">{message}</span>
        </div>
      );
    }

    // --- AUTHENTICATION SCREEN ---
    function AuthScreen({ auth }) {
      const [isLogin, setIsLogin] = useState(true);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          if (isLogin) {
            await signInWithEmailAndPassword(auth, email, password);
          } else {
            await createUserWithEmailAndPassword(auth, email, password);
          }
        } catch (err) {
          setError(err.message.replace('Firebase: ', ''));
        }
        setLoading(false);
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
          <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <div className="text-center mb-8">
              <div className="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <Icon name="Camera" size={32} className="text-white" />
              </div>
              <h1 className="text-2xl font-black text-gray-800">EasyOMR</h1>
              <p className="text-gray-500 text-sm mt-1">Sign in to access your secure exams</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-4">
              {error && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm border border-red-200">{error}</div>}
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1">Email Address</label>
                <input 
                  type="email" required value={email} onChange={e => setEmail(e.target.value)}
                  className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50"
                  placeholder="you@school.edu"
                />
              </div>
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1">Password</label>
                <input 
                  type="password" required value={password} onChange={e => setPassword(e.target.value)}
                  className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50"
                  placeholder="••••••••"
                />
              </div>
              <button 
                type="submit" disabled={loading}
                className="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition shadow-md disabled:opacity-70"
              >
                {loading ? 'Processing...' : (isLogin ? 'Sign In' : 'Create Account')}
              </button>
            </form>

            <div className="mt-6 text-center">
              <button onClick={() => setIsLogin(!isLogin)} className="text-sm text-blue-600 hover:underline font-medium">
                {isLogin ? "Need an account? Register here" : "Already have an account? Sign in"}
              </button>
            </div>

            <div className="mt-8 text-center text-xs text-gray-400 font-bold uppercase tracking-wider">
              Developed by PVNJ
            </div>
          </div>
        </div>
      );
    }

    // --- MAIN APP COMPONENT ---
    function App() {
      const [user, setUser] = useState(null);
      const [isAuthChecking, setIsAuthChecking] = useState(true);
      const [initError, setInitError] = useState('');
      const [view, setView] = useState('dashboard');
      
      // Data State
      const [exams, setExams] = useState([]);
      const [currentExam, setCurrentExam] = useState(null);
      const [classes, setClasses] = useState([]);
      const [currentClass, setCurrentClass] = useState(null);
      const [toastMsg, setToastMsg] = useState('');

      const showToast = (msg) => setToastMsg(msg);

      // Auth Listener
      useEffect(() => {
        if (!auth) {
          setInitError(firebaseInitError || "Could not connect to Firebase database.");
          setIsAuthChecking(false);
          return;
        }
        const initAuth = async () => {
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token).catch(console.error);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (u) => {
          setUser(u);
          setIsAuthChecking(false);
        });
        return () => unsubscribe();
      }, []);

      // Realtime Cloud Data Syncing (Firestore)
      useEffect(() => {
        if (!user || !db) return;
        
        const examsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'exams');
        const classesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'classes');

        const unsubExams = onSnapshot(examsRef, (snap) => {
          const data = snap.docs.map(d => d.data());
          data.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
          setExams(data);
          if (currentExam) {
             const updated = data.find(e => e.id === currentExam.id);
             if (updated) setCurrentExam(updated);
          }
        }, console.error);

        const unsubClasses = onSnapshot(classesRef, (snap) => {
          const data = snap.docs.map(d => d.data());
          setClasses(data);
          if (currentClass) {
             const updated = data.find(c => c.id === currentClass.id);
             if (updated) setCurrentClass(updated);
          }
        }, console.error);

        return () => { unsubExams(); unsubClasses(); };
      }, [user]);

      // Database Helpers
      const saveExam = async (examObj) => {
        if (!user || !db) return;
        try {
          await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'exams', examObj.id), examObj);
        } catch (e) { console.error("Error saving exam", e); showToast("Error saving data"); }
      };

      const deleteExam = async (examId) => {
        if (!user || !db) return;
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'exams', examId));
          showToast("Exam deleted successfully");
        } catch (e) {
          console.error("Error deleting exam", e);
          showToast("Error deleting exam");
        }
      };

      const saveClass = async (classObj) => {
        if (!user || !db) return;
        try {
          await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'classes', classObj.id), classObj);
        } catch (e) { console.error("Error saving class", e); showToast("Error saving class"); }
      };

      const handleLogout = () => {
        if (auth) signOut(auth);
      };

      if (isAuthChecking) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-gray-100">
            <div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p className="text-gray-500 font-bold">Connecting to Cloud Database...</p>
          </div>
        );
      }

      if (initError) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md text-center border border-red-100">
              <Icon name="XCircle" size={48} className="text-red-500 mb-4 mx-auto" />
              <h2 className="text-xl font-black text-gray-800 mb-2">Connection Error</h2>
              <p className="text-sm text-gray-600 mb-6 bg-red-50 p-3 rounded-lg border border-red-100">{initError}</p>
            </div>
          </div>
        );
      }

      if (!user) {
        return <AuthScreen auth={auth} />;
      }

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800 font-sans pb-20 print:bg-white print:pb-0 print:min-h-0">
          <Toast message={toastMsg} onClose={() => setToastMsg('')} />
          
          <header className="print-hidden bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
            <h1 className="text-xl font-bold flex items-center gap-2">
              <Icon name="Camera" size={24} /> EasyOMR
            </h1>
            <div className="flex gap-3">
              <button onClick={() => setView('settings')} className="p-1 hover:bg-blue-700 rounded transition">
                <Icon name="Settings" size={20} />
              </button>
              <button onClick={handleLogout} className="p-1 hover:bg-blue-700 rounded transition">
                <Icon name="LogOut" size={20} />
              </button>
            </div>
          </header>

          <main className="p-4 max-w-2xl mx-auto print:max-w-none print:p-0 print:m-0">
            {view === 'dashboard' && (
              <Dashboard 
                exams={exams} 
                setView={setView} 
                setCurrentExam={setCurrentExam} 
                deleteExam={deleteExam}
              />
            )}
            {view === 'create_exam' && (
              <CreateExam 
                saveExam={saveExam} 
                setView={setView} 
                classes={classes}
                showToast={showToast}
                examToEdit={currentExam}
              />
            )}
            {view === 'analysis' && currentExam && (
              <ItemAnalysis 
                exam={currentExam} 
                setView={setView} 
              />
            )}
            {view === 'scanner' && currentExam && (
              <Scanner 
                exam={currentExam} 
                classes={classes} // Pass classes for roster lookup
                setView={setView} 
                saveExam={saveExam}
                setCurrentExam={setCurrentExam}
                showToast={showToast}
              />
            )}
            {view === 'settings' && (
              <SettingsPanel 
                user={user}
              />
            )}
            {view === 'classes' && (
              <ClassesManager 
                classes={classes} 
                saveClass={saveClass}
                setView={setView} 
                setCurrentClass={setCurrentClass} 
              />
            )}
            {view === 'class_details' && currentClass && (
              <ClassDetails 
                currentClass={currentClass} 
                saveClass={saveClass}
                setView={setView} 
                showToast={showToast}
              />
            )}
            {view === 'omr_sheet' && currentExam && (
              <OMRSheetTemplate 
                exam={currentExam} 
                setView={setView} 
                showToast={showToast}
              />
            )}

            <div className="print-hidden mt-12 text-center text-xs text-gray-400 font-bold uppercase tracking-wider">
              Developed by PVNJ
            </div>
          </main>

          <nav className="print-hidden fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 pb-safe z-10 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
            <button onClick={() => setView('dashboard')} className={`flex flex-col items-center p-2 ${view === 'dashboard' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600 transition'}`}>
              <Icon name="List" size={24} />
              <span className="text-xs mt-1 font-semibold">Exams</span>
            </button>
            <button onClick={() => setView('classes')} className={`flex flex-col items-center p-2 ${view === 'classes' || view === 'class_details' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600 transition'}`}>
              <Icon name="Users" size={24} />
              <span className="text-xs mt-1 font-semibold">Classes</span>
            </button>
            <button onClick={() => { setCurrentExam(null); setView('create_exam'); }} className={`flex flex-col items-center p-2 ${view === 'create_exam' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600 transition'}`}>
              <Icon name="Plus" size={24} />
              <span className="text-xs mt-1 font-semibold">New Exam</span>
            </button>
          </nav>
        </div>
      );
    }

    // --- DASHBOARD COMPONENT ---
    function Dashboard({ exams, setView, setCurrentExam, deleteExam }) {
      const [confirmDelete, setConfirmDelete] = useState(null);

      if (exams.length === 0) {
        return (
          <div className="text-center mt-20 bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <Icon name="FileText" size={64} className="mx-auto text-blue-200 mb-4" />
            <h2 className="text-xl font-bold text-gray-800 mb-2">No Exams Yet</h2>
            <p className="text-gray-500 mb-6 text-sm">Create your first exam and print out bubble sheets for your students.</p>
            <button 
              onClick={() => { setCurrentExam(null); setView('create_exam'); }}
              className="bg-blue-600 text-white px-6 py-3 rounded-lg shadow-md hover:bg-blue-700 transition flex items-center gap-2 mx-auto font-bold"
            >
              <Icon name="Plus" size={20} /> Create Exam
            </button>
          </div>
        );
      }

      return (
        <div className="space-y-4">
          <div className="flex justify-between items-end mb-4">
            <h2 className="text-2xl font-black text-gray-800">Your Exams</h2>
            <span className="text-xs font-bold bg-green-100 text-green-700 px-3 py-1 rounded-full uppercase tracking-wider">
              <Icon name="CloudUpload" size={12} className="mr-1" /> Cloud Synced
            </span>
          </div>
          
          {exams.map((exam, idx) => {
            const types = [...new Set(exam.answerKey.map(k => k.type))];
            const typeLabel = types.length > 1 ? 'Mixed Types' : (types[0] === 'true_false' ? 'True/False' : 'Multiple Choice');
            const scanCount = exam.results ? exam.results.length : 0;

            return (
              <div key={exam.id || idx} className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                  <h3 className="font-bold text-xl text-gray-800">{exam.name}</h3>
                  <div className="flex items-center gap-2 mt-1 flex-wrap text-sm text-gray-500">
                    <span className="bg-gray-100 px-2 py-0.5 rounded text-gray-700 font-medium">{exam.questions} Items</span>
                    <span className="bg-gray-100 px-2 py-0.5 rounded text-gray-700">{typeLabel}</span>
                    {exam.className && <span className="text-blue-600 font-medium bg-blue-50 px-2 py-0.5 rounded">Class: {exam.className}</span>}
                  </div>
                  <p className="text-xs text-gray-400 mt-2 font-medium uppercase tracking-wider">
                     {scanCount} Scans Recorded
                  </p>
                </div>
                
                <div className="flex gap-2 w-full md:w-auto mt-2 md:mt-0 pt-3 md:pt-0 border-t border-gray-100 md:border-0 justify-between md:justify-end">
                  <div className="flex gap-2 overflow-x-auto custom-scrollbar pr-1 pb-1 md:pb-0">
                    {confirmDelete === exam.id ? (
                      <div className="flex items-center gap-1 bg-red-50 p-1.5 rounded-xl border border-red-100 shrink-0">
                        <span className="text-xs font-black text-red-600 px-2 uppercase tracking-wide">Delete?</span>
                        <button onClick={() => { deleteExam(exam.id); setConfirmDelete(null); }} className="bg-red-500 text-white p-1.5 rounded-lg hover:bg-red-600 shadow-sm transition"><Icon name="CheckCircle" size={16} /></button>
                        <button onClick={() => setConfirmDelete(null)} className="bg-gray-200 text-gray-700 p-1.5 rounded-lg hover:bg-gray-300 transition"><Icon name="XCircle" size={16} /></button>
                      </div>
                    ) : (
                      <button 
                        onClick={() => setConfirmDelete(exam.id)} 
                        className="bg-red-50 text-red-600 p-3 rounded-xl hover:bg-red-100 transition flex items-center justify-center gap-2 font-semibold text-sm shrink-0" 
                        title="Delete Exam"
                      >
                        <Icon name="Trash" size={18} />
                      </button>
                    )}
                    
                    <button 
                      onClick={() => { setCurrentExam(exam); setView('create_exam'); }}
                      className="bg-blue-50 text-blue-600 p-3 rounded-xl hover:bg-blue-100 transition flex items-center gap-2 font-semibold text-sm shrink-0"
                      title="Edit Exam"
                    >
                      <Icon name="Edit" size={18} /> <span className="md:hidden">Edit</span>
                    </button>
                    <button 
                      onClick={() => { setCurrentExam(exam); setView('analysis'); }}
                      className="bg-purple-50 text-purple-600 p-3 rounded-xl hover:bg-purple-100 transition flex items-center gap-2 font-semibold text-sm shrink-0"
                      title="Item Analysis"
                    >
                      <Icon name="BarChart2" size={18} /> <span className="md:hidden">Stats</span>
                    </button>
                    <button 
                      onClick={() => { setCurrentExam(exam); setView('omr_sheet'); }}
                      className="bg-gray-100 text-gray-700 p-3 rounded-xl hover:bg-gray-200 transition flex items-center gap-2 font-semibold text-sm shrink-0"
                      title="Print OMR Sheet"
                    >
                      <Icon name="Printer" size={18} /> <span className="md:hidden">Print</span>
                    </button>
                  </div>
                  <button 
                    onClick={() => { setCurrentExam(exam); setView('scanner'); }}
                    className="bg-green-500 text-white px-5 py-3 rounded-xl shadow-md hover:bg-green-600 transition flex items-center gap-2 font-bold text-sm ml-auto md:ml-0 shrink-0"
                  >
                    <Icon name="Camera" size={18} /> Scan
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // --- CREATE EXAM COMPONENT ---
    function CreateExam({ saveExam, setView, classes, showToast, examToEdit }) {
      const [name, setName] = useState('');
      const [selectedClassId, setSelectedClassId] = useState('');
      const [questions, setQuestions] = useState(50);
      const [rollNoLength, setRollNoLength] = useState(4); 
      
      const [answerKey, setAnswerKey] = useState(
        Array.from({length: 50}, () => ({ type: 'multiple_choice', options: 4, answer: 0 }))
      );

      const [bStart, setBStart] = useState(1);
      const [bEnd, setBEnd] = useState(50);
      const [bType, setBType] = useState('multiple_choice');
      const [bOptions, setBOptions] = useState(4);

      useEffect(() => {
        if (examToEdit) {
          setName(examToEdit.name || '');
          setSelectedClassId(examToEdit.classId || '');
          setQuestions(examToEdit.questions || 50);
          setRollNoLength(examToEdit.rollNoLength || 4);
          if (examToEdit.answerKey) {
            setAnswerKey(examToEdit.answerKey);
          }
          setBEnd(examToEdit.questions || 50);
        } else {
          setName('');
          setSelectedClassId('');
          setQuestions(50);
          setRollNoLength(4);
          setAnswerKey(Array.from({length: 50}, () => ({ type: 'multiple_choice', options: 4, answer: 0 })));
          setBEnd(50);
        }
      }, [examToEdit]);

      const handleQuestionsChange = (e) => {
        let val = parseInt(e.target.value) || 1;
        if (val > 200) val = 200;
        setQuestions(val);
        setBEnd(val);
        
        setAnswerKey(prev => {
          const newKey = [...prev];
          if (val > prev.length) {
            for(let i = prev.length; i < val; i++) {
              newKey.push({ type: 'multiple_choice', options: 4, answer: 0 });
            }
          } else if (val < prev.length) {
            newKey.length = val;
          }
          return newKey;
        });
      };

      const applyBatch = () => {
        if (bStart < 1 || bEnd > questions || bStart > bEnd) return showToast("Invalid batch range.");
        setAnswerKey(prev => {
          const newKey = [...prev];
          for (let i = bStart - 1; i < bEnd; i++) {
            newKey[i] = { 
              ...newKey[i], 
              type: bType, 
              options: bType === 'true_false' ? 2 : bOptions,
              answer: 0
            };
          }
          return newKey;
        });
        showToast(`Batch applied to Q${bStart}-Q${bEnd}`);
      };

      const updateAnswer = (index, val) => {
        setAnswerKey(prev => {
          const newKey = [...prev];
          newKey[index].answer = parseInt(val);
          return newKey;
        });
      };

      const handleSave = () => {
        if (!name.trim()) return showToast("Please enter an exam name");
        const selectedClass = classes?.find(c => c.id === selectedClassId);
        
        let updatedResults = examToEdit && examToEdit.results ? [...examToEdit.results] : [];
        
        if (examToEdit && updatedResults.length > 0) {
          updatedResults = updatedResults.map(res => {
            let newScore = 0;
            for (let i = 0; i < questions; i++) {
              if (res.scannedAnswers && res.scannedAnswers[i] !== undefined && res.scannedAnswers[i] === answerKey[i].answer) {
                newScore++;
              }
            }
            return { ...res, score: newScore, total: questions };
          });
        }

        const newExam = { 
          id: examToEdit ? examToEdit.id : Date.now().toString(),
          name, 
          classId: selectedClassId,
          className: selectedClass ? selectedClass.name : '',
          questions, 
          rollNoLength,
          answerKey, 
          createdAt: examToEdit ? examToEdit.createdAt : new Date().toISOString(),
          results: updatedResults
        };
        saveExam(newExam);
        showToast(examToEdit ? "Exam updated successfully!" : "Exam created successfully!");
        setView('dashboard');
      };

      return (
        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8">
          <div className="flex justify-between items-center mb-6 border-b pb-4">
            <h2 className="text-2xl font-black text-gray-800">
              {examToEdit ? "Edit Exam" : "Create New Exam"}
            </h2>
            {examToEdit && examToEdit.results?.length > 0 && (
              <span className="text-xs bg-yellow-100 text-yellow-800 font-bold px-3 py-1 rounded-lg">
                Warning: Editing will recalculate past scores.
              </span>
            )}
          </div>
          <div className="space-y-6">
            <div>
              <label className="block text-sm font-bold text-gray-700 mb-2">Exam Name</label>
              <input 
                type="text" value={name} onChange={e => setName(e.target.value)} 
                className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50"
                placeholder="e.g. Midterm Mathematics"
              />
            </div>
            
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-2">Assign Class</label>
                <select 
                  value={selectedClassId} onChange={e => setSelectedClassId(e.target.value)}
                  className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50"
                >
                  <option value="">(None)</option>
                  {classes?.map(cls => <option key={cls.id} value={cls.id}>{cls.name}</option>)}
                </select>
              </div>
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-2">Total Items (Max 200)</label>
                <input 
                  type="number" min="1" max="200" 
                  value={questions} onChange={handleQuestionsChange} 
                  className="w-full p-3 border border-gray-300 rounded-xl outline-none bg-gray-50"
                />
              </div>
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-2">Roll No. Digits</label>
                <input 
                  type="number" min="2" max="6" 
                  value={rollNoLength} 
                  onChange={e => setRollNoLength(Math.min(6, Math.max(2, parseInt(e.target.value) || 4)))} 
                  className="w-full p-3 border border-gray-300 rounded-xl outline-none bg-gray-50"
                />
              </div>
            </div>

            <div className="bg-blue-50 p-5 rounded-xl border border-blue-100">
              <h3 className="font-bold text-blue-900 mb-3 text-sm flex items-center gap-2">
                <Icon name="Settings" size={16} /> Batch Formatting
              </h3>
              <div className="flex flex-col sm:flex-row items-end gap-3 text-sm">
                <div className="flex items-center gap-2 bg-white p-2 rounded-lg border border-blue-200">
                  <span className="font-bold text-gray-500">Q</span>
                  <input type="number" value={bStart} onChange={e => setBStart(parseInt(e.target.value)||1)} className="w-14 p-1 text-center font-bold outline-none" min="1" max={questions} />
                  <span className="font-bold text-gray-400">to</span>
                  <input type="number" value={bEnd} onChange={e => setBEnd(parseInt(e.target.value)||1)} className="w-14 p-1 text-center font-bold outline-none" min="1" max={questions} />
                </div>
                <select value={bType} onChange={e => setBType(e.target.value)} className="p-3 border border-blue-200 rounded-lg bg-white flex-1 outline-none font-medium text-gray-700">
                  <option value="multiple_choice">Multiple Choice</option>
                  <option value="true_false">True / False</option>
                </select>
                {bType === 'multiple_choice' && (
                  <div className="flex flex-col">
                    <span className="text-[10px] font-bold text-blue-800 uppercase pl-1">Options</span>
                    <input type="number" value={bOptions} onChange={e => setBOptions(Math.min(10, Math.max(2, parseInt(e.target.value)||4)))} className="w-16 p-2.5 border border-blue-200 rounded-lg text-center font-bold" min="2" max="10" />
                  </div>
                )}
                <button onClick={applyBatch} className="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700 w-full sm:w-auto shadow">Apply</button>
              </div>
            </div>

            <div className="pt-2">
              <h3 className="font-black text-lg text-gray-800 mb-4 flex items-center justify-between">
                Set Answer Key 
                <span className="text-xs bg-gray-200 text-gray-600 py-1 px-3 rounded-full font-bold">Tap bubble to select correct answer</span>
              </h3>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                {answerKey.map((qData, idx) => (
                  <div key={idx} className="flex flex-col bg-white p-3 rounded-xl shadow-sm border border-gray-200">
                    <div className="flex justify-between items-center mb-2 border-b border-gray-100 pb-2">
                       <span className="font-black text-gray-700 text-lg">Q{idx + 1}</span>
                       <span className="text-[10px] text-gray-500 bg-gray-100 px-2 py-1 rounded-md font-bold uppercase tracking-widest">
                         {qData.type === 'true_false' ? 'T/F' : `MCQ-${qData.options}`}
                       </span>
                    </div>
                    <div className="flex gap-2 flex-wrap justify-center">
                      {Array.from({length: qData.options}).map((_, optIdx) => {
                        const label = qData.type === 'true_false' ? (optIdx === 0 ? 'T' : 'F') : String.fromCharCode(65 + optIdx);
                        const isSelected = qData.answer === optIdx;
                        return (
                          <button
                            key={optIdx}
                            onClick={() => updateAnswer(idx, optIdx)}
                            className={`w-10 h-10 rounded-full font-black text-sm flex-shrink-0 transition transform hover:scale-105 ${isSelected ? 'bg-blue-600 text-white shadow-md ring-2 ring-blue-300 ring-offset-1' : 'bg-gray-100 text-gray-500 border border-gray-300 hover:bg-gray-200'}`}
                          >
                            {label}
                          </button>
                        )
                      })}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <button 
              onClick={handleSave}
              className="w-full bg-blue-600 text-white p-4 rounded-xl mt-8 font-black flex justify-center items-center gap-2 hover:bg-blue-700 shadow-lg text-lg"
            >
              <Icon name="Save" size={24} /> {examToEdit ? "Update Exam & Recalculate" : "Create Exam & Save to Cloud"}
            </button>
          </div>
        </div>
      );
    }

    // --- SCANNER COMPONENT (WITH ROLL NO & ANSWER OMR) ---
    function Scanner({ exam, classes, setView, saveExam, setCurrentExam, showToast }) {
      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const [stream, setStream] = useState(null);
      const [result, setResult] = useState(null);
      const [studentId, setStudentId] = useState('');
      const [scannedStudentName, setScannedStudentName] = useState('');
      const [isProcessing, setIsProcessing] = useState(false);

      const numCols = exam.questions <= 40 ? 2 : exam.questions <= 90 ? 3 : exam.questions <= 140 ? 4 : 5;
      const rowsPerCol = Math.ceil(exam.questions / numCols);
      const rnLength = exam.rollNoLength || 4;

      useEffect(() => {
        const startCamera = async () => {
          try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            setStream(s);
            if (videoRef.current) {
              videoRef.current.srcObject = s;
              // Ensure video is playing to get correct dimensions
              videoRef.current.play();
            }
          } catch (err) {
            showToast("Camera access denied or unavailable.");
          }
        };
        startCamera();
        return () => { if (stream) stream.getTracks().forEach(t => t.stop()); };
      }, []);

      const calculateDarkness = (data) => {
        let total = 0;
        for (let i = 0; i < data.length; i += 4) {
          const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
          total += (255 - brightness); 
        }
        return total / (data.length / 4);
      };

      const processImage = () => {
        if (!videoRef.current || !canvasRef.current) return;
        setIsProcessing(true);

        const video = videoRef.current;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        
        // Match canvas strictly to video feed resolution
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const W = canvas.width;
        const H = canvas.height;

        // --- ZONE MATHEMATICS (Matches UI absolute positioning strictly) ---
        // 1. Roll Number Zone (Left: 55%, Top: 15%, Width: 35%, Height: 20%)
        const rnStartX = W * 0.55;
        const rnStartY = H * 0.15;
        const rnTotalW = W * 0.35;
        const rnTotalH = H * 0.20;
        
        const rnColW = rnTotalW / rnLength;
        const rnRowH = rnTotalH / 10;
        const rnBoxSize = Math.min(rnColW * 0.6, rnRowH * 0.6);

        let scannedRollNo = '';

        for (let c = 0; c < rnLength; c++) {
          let maxD = 0;
          let bestVal = -1;
          for (let r = 0; r < 10; r++) {
            const cellCenterX = rnStartX + (c * rnColW) + (rnColW / 2);
            const cellCenterY = rnStartY + (r * rnRowH) + (rnRowH / 2);
            
            const sx = cellCenterX - (rnBoxSize / 2);
            const sy = cellCenterY - (rnBoxSize / 2);
            const sw = rnBoxSize;
            const sh = rnBoxSize;
            
            const imgD = ctx.getImageData(sx, sy, sw, sh);
            const d = calculateDarkness(imgD.data);
            
            if (d > maxD && d > 35) { // 35 is darkness threshold
              maxD = d;
              bestVal = r;
            }
          }
          scannedRollNo += bestVal !== -1 ? bestVal.toString() : '?';
        }

        // --- 2. Answers Zone (Left: 5%, Top: 40%, Width: 90%, Height: 55%) ---
        const ansStartX = W * 0.05;
        const ansStartY = H * 0.40;
        const ansTotalW = W * 0.90;
        const ansTotalH = H * 0.55;

        const ansColW = ansTotalW / numCols;
        const ansRowH = ansTotalH / rowsPerCol;
        const maxOptions = Math.max(...exam.answerKey.map(q => q.options));
        const optAreaW = ansColW * 0.7; // Leave 30% width for question numbers
        const cellW = optAreaW / maxOptions;
        const boxSize = Math.min(cellW * 0.6, ansRowH * 0.6);

        let scannedAnswers = [];
        let score = 0;

        for (let q = 0; q < exam.questions; q++) {
          const qData = exam.answerKey[q];
          const cIdx = Math.floor(q / rowsPerCol);
          const rIdx = q % rowsPerCol;
          
          const qStartX = ansStartX + (cIdx * ansColW) + (ansColW * 0.3); // offset past Q number
          const qStartY = ansStartY + (rIdx * ansRowH);

          let maxD = 0;
          let bestOpt = -1;

          for (let o = 0; o < qData.options; o++) {
            const cellCenterX = qStartX + (o * cellW) + (cellW / 2);
            const cellCenterY = qStartY + (ansRowH / 2);

            const sx = cellCenterX - (boxSize / 2);
            const sy = cellCenterY - (boxSize / 2);
            const sw = boxSize;
            const sh = boxSize;

            const imgD = ctx.getImageData(sx, sy, sw, sh);
            const d = calculateDarkness(imgD.data);

            if (d > maxD && d > 35) {
              maxD = d;
              bestOpt = o;
            }
          }
          scannedAnswers.push(bestOpt);
          if (bestOpt === qData.answer) score++;
        }

        // --- ROSTER LOOKUP ---
        let foundName = '';
        const cleanRoll = scannedRollNo.replace(/\?/g, '');
        
        if (exam.classId && classes.length > 0) {
          const assignedClass = classes.find(c => c.id === exam.classId);
          if (assignedClass && cleanRoll) {
            // Check formatted matching (e.g. 01 vs 1)
            const matchedStudent = assignedClass.students.find(s => 
              s.rollNo === cleanRoll || parseInt(s.rollNo) === parseInt(cleanRoll)
            );
            if (matchedStudent) {
              foundName = matchedStudent.name;
            }
          }
        }

        setResult({ score, total: exam.questions, scannedAnswers, scannedRollNo });
        setStudentId(cleanRoll);
        setScannedStudentName(foundName);
        setIsProcessing(false);
      };

      const saveResult = async () => {
        if (!studentId) return showToast("Please verify Student ID/Name before saving");
        
        const newResult = {
          studentId,
          studentName: scannedStudentName,
          score: result.score,
          total: result.total,
          scannedAnswers: result.scannedAnswers,
          timestamp: new Date().toISOString()
        };

        const updatedExam = { ...exam, results: [...(exam.results || []), newResult] };
        
        setCurrentExam(updatedExam);
        setResult(null);
        setStudentId('');
        setScannedStudentName('');
        
        await saveExam(updatedExam);
        showToast("Score saved securely to cloud!");
      };

      return (
        <div className="flex flex-col h-[calc(100vh-140px)]">
          <div className="flex justify-between items-center mb-4 bg-white p-3 rounded-xl shadow-sm border border-gray-100">
            <h2 className="text-lg font-black text-gray-800 flex items-center gap-2">
              <span className="w-3 h-3 bg-red-500 rounded-full animate-pulse"></span> Scanning: {exam.name}
            </h2>
            <button onClick={() => setView('dashboard')} className="text-gray-500 hover:text-black text-sm font-bold bg-gray-100 px-3 py-1 rounded-lg">Cancel</button>
          </div>

          {!result ? (
            <div className="relative flex-1 bg-black rounded-2xl overflow-hidden shadow-2xl border-4 border-gray-900">
              <video 
                ref={videoRef} autoPlay playsInline 
                className="absolute inset-0 w-full h-full object-cover opacity-80"
              />
              
              {/* TARGETING OVERLAYS */}
              <div className="absolute inset-0 pointer-events-none p-2 sm:p-4">
                 <div className="w-full h-full border-2 border-white/30 border-dashed rounded relative flex">
                    <span className="absolute -top-3 left-1/2 -translate-x-1/2 text-white/80 text-[10px] font-bold bg-black/50 px-2 py-0.5 rounded whitespace-nowrap">ALIGN SHEET BORDERS HERE</span>
                    
                    {/* Roll No Guide (Right 55%, Top 15%, W: 35%, H: 20%) */}
                    <div className="absolute border-2 border-blue-400 bg-blue-400/10 rounded flex flex-col items-center shadow-[0_0_15px_rgba(59,130,246,0.5)]"
                         style={{ left: '55%', top: '15%', width: '35%', height: '20%' }}>
                       <span className="bg-blue-600 text-white text-[9px] px-1 font-bold rounded-b absolute top-0">ROLL NO</span>
                       <div className="flex w-full h-full justify-between px-[10%]">
                          {Array.from({length: rnLength}).map((_, i) => (
                             <div key={i} className="h-full border-l border-r border-blue-400/50 w-[10%]"></div>
                          ))}
                       </div>
                    </div>

                    {/* Answers Guide (Left 5%, Top 40%, W: 90%, H: 55%) */}
                    <div className="absolute border-2 border-green-400 bg-green-400/10 rounded flex flex-col items-center shadow-[0_0_15px_rgba(34,197,94,0.5)]"
                         style={{ left: '5%', top: '40%', width: '90%', height: '55%' }}>
                       <span className="bg-green-600 text-white text-[9px] px-1 font-bold rounded-b absolute top-0">ANSWERS</span>
                       <div className="flex w-full h-full pt-[18px] pb-2 px-2 gap-2">
                          {Array.from({length: numCols}).map((_, i) => (
                             <div key={i} className="flex-1 border border-green-400/50 rounded-sm"></div>
                          ))}
                       </div>
                    </div>
                 </div>
              </div>

              <button 
                onClick={processImage}
                disabled={isProcessing}
                className="absolute bottom-6 left-1/2 -translate-x-1/2 bg-white text-blue-600 font-black py-4 px-10 rounded-full shadow-[0_4px_20px_rgba(255,255,255,0.4)] hover:scale-105 transition disabled:opacity-50 text-lg z-10"
              >
                {isProcessing ? 'Reading...' : 'Capture Image'}
              </button>
            </div>
          ) : (
            <div className="flex-1 bg-white p-6 rounded-2xl shadow-lg border border-gray-100 flex flex-col items-center relative overflow-y-auto">
              
              <div className="text-center w-full mb-6 mt-4">
                <p className="text-gray-500 font-bold uppercase tracking-widest text-xs mb-1">Final Score</p>
                <div className="text-6xl font-black text-blue-600 mb-2">
                  {result.score} <span className="text-3xl text-gray-400">/ {result.total}</span>
                </div>
                <div className="w-full bg-gray-100 h-2 rounded-full overflow-hidden max-w-xs mx-auto">
                  <div className="bg-blue-600 h-full" style={{width: `${(result.score/result.total)*100}%`}}></div>
                </div>
              </div>

              {/* Identity Verification Block */}
              <div className="w-full max-w-sm bg-blue-50 border border-blue-100 rounded-xl p-4 mb-6 relative">
                 <div className="absolute -top-3 left-4 bg-blue-600 text-white text-[10px] font-black px-2 py-1 rounded uppercase tracking-wider">
                   Student Verification
                 </div>
                 
                 <div className="mb-3">
                   <p className="text-xs text-blue-800 font-bold mb-1">Scanned Roll No:</p>
                   <div className="flex gap-1 justify-center">
                     {result.scannedRollNo.split('').map((char, i) => (
                       <div key={i} className={`w-8 h-10 flex items-center justify-center font-mono font-black text-xl rounded border ${char === '?' ? 'bg-red-100 border-red-300 text-red-600' : 'bg-white border-blue-200 text-blue-900'}`}>
                         {char}
                       </div>
                     ))}
                   </div>
                   {result.scannedRollNo.includes('?') && (
                     <p className="text-sm text-red-600 text-center mt-2 font-black">Invalid Roll Number! Use the correct template.</p>
                   )}
                 </div>

                 {scannedStudentName ? (
                   <div className="bg-green-100 border border-green-200 rounded-lg p-3 text-center flex flex-col items-center">
                     <Icon name="UserCheck" className="text-green-600 mb-1" />
                     <p className="text-xs text-green-700 font-bold uppercase">Roster Match Found</p>
                     <p className="font-black text-green-900 text-lg">{scannedStudentName}</p>
                   </div>
                 ) : (
                   <div className="bg-yellow-100 border border-yellow-200 rounded-lg p-3 text-center">
                     <p className="text-xs text-yellow-700 font-bold">No roster match found for this Roll No.</p>
                   </div>
                 )}

                 <div className="mt-4 pt-4 border-t border-blue-200">
                    <label className="block text-xs font-bold text-gray-700 mb-1">Confirm/Edit Roll No:</label>
                    <input 
                      type="text" value={studentId} onChange={e => {
                        setStudentId(e.target.value);
                        // Optional: Live re-check roster here if needed
                      }}
                      className="w-full p-3 border border-gray-300 rounded-lg focus:border-blue-600 focus:ring-1 focus:ring-blue-600 outline-none text-center font-bold text-lg bg-white"
                      placeholder="Enter Roll No"
                    />
                 </div>
              </div>

              <div className="flex gap-4 w-full max-w-sm mt-auto">
                <button 
                  onClick={() => setResult(null)}
                  className="w-1/3 bg-gray-200 text-gray-700 p-4 rounded-xl font-bold hover:bg-gray-300 transition text-sm"
                >
                  Discard
                </button>
                <button 
                  onClick={saveResult}
                  className="w-2/3 bg-green-500 text-white p-4 rounded-xl font-black hover:bg-green-600 flex items-center justify-center gap-2 shadow-lg shadow-green-200 transition"
                >
                  <Icon name="Save" size={20} /> Save Result
                </button>
              </div>
            </div>
          )}
          <canvas ref={canvasRef} className="hidden" />
        </div>
      );
    }

    // --- SETTINGS COMPONENT ---
    function SettingsPanel({ user }) {
      return (
        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
          <h2 className="text-2xl font-black mb-6 text-gray-800 flex items-center gap-2 border-b pb-4">
            <Icon name="Settings" size={24} className="text-blue-600"/> Account Settings
          </h2>
          
          <div className="space-y-6">
            <div className="bg-green-50 p-5 rounded-xl border border-green-200 flex items-start gap-3">
              <Icon name="CheckCircle" size={24} className="text-green-600 mt-0.5" />
              <div>
                <h3 className="font-bold text-green-900 text-lg">Cloud Database Active</h3>
                <p className="text-sm text-green-800 mt-1">
                  Your account is securely connected to the internal Firebase Cloud. All your classes, exams, and student scores are encrypted and synced automatically.
                </p>
              </div>
            </div>

            <div className="bg-gray-50 p-5 rounded-xl border border-gray-200">
              <p className="text-sm text-gray-500 font-bold uppercase tracking-wider mb-1">Logged in as</p>
              <p className="text-xl font-black text-gray-800">{user.email}</p>
            </div>
          </div>
        </div>
      );
    }

    // --- ROSTER: CLASSES MANAGER ---
    function ClassesManager({ classes, saveClass, setView, setCurrentClass }) {
      const [newClassName, setNewClassName] = useState('');
      
      const handleCreate = () => {
        if (!newClassName.trim()) return;
        const newClass = { id: Date.now().toString(), name: newClassName, students: [], createdAt: new Date().toISOString() };
        saveClass(newClass);
        setNewClassName('');
      };

      return (
        <div className="space-y-6">
          <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 className="text-2xl font-black mb-4 text-gray-800 flex items-center gap-2 border-b pb-4">
              <Icon name="Users" size={24} className="text-blue-600"/> Manage Classes
            </h2>
            <div className="flex gap-2">
              <input 
                type="text" value={newClassName} onChange={e => setNewClassName(e.target.value)} 
                placeholder="e.g. Grade 10 Math"
                className="flex-1 p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 font-medium"
              />
              <button onClick={handleCreate} className="bg-blue-600 text-white px-6 rounded-xl font-black hover:bg-blue-700 transition shadow">
                Add Class
              </button>
            </div>
          </div>

          <div className="space-y-3">
            {classes.length === 0 ? (
               <div className="text-center bg-white py-12 rounded-2xl border border-gray-100 shadow-sm">
                 <Icon name="Users" size={48} className="text-gray-200 mb-3 mx-auto" />
                 <p className="text-gray-500 font-medium">No classes created yet. Add one above.</p>
               </div>
            ) : (
              classes.map(cls => (
                <div key={cls.id} className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center transition hover:shadow-md">
                  <div>
                    <h3 className="font-bold text-xl text-gray-800">{cls.name}</h3>
                    <p className="text-sm text-blue-600 font-medium mt-1 bg-blue-50 inline-block px-2 py-0.5 rounded">
                      {cls.students.length} Students enrolled
                    </p>
                  </div>
                  <button 
                    onClick={() => { setCurrentClass(cls); setView('class_details'); }}
                    className="text-blue-600 bg-blue-50 px-5 py-3 rounded-xl font-bold hover:bg-blue-100 transition"
                  >
                    Manage Roster
                  </button>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    // --- ROSTER: CLASS DETAILS & ENROLLMENT ---
    function ClassDetails({ currentClass, saveClass, setView, showToast }) {
      const [name, setName] = useState('');
      const [rollNo, setRollNo] = useState('');
      const [bulkData, setBulkData] = useState('');
      const [isBulkMode, setIsBulkMode] = useState(false);

      const formatRollNo = (val) => {
        const strVal = String(val).trim();
        return /^\d+$/.test(strVal) ? strVal.padStart(2, '0') : strVal;
      };

      const addSingle = async () => {
        if (!name || !rollNo) return showToast("Fill both fields");
        const updatedClass = { 
          ...currentClass, 
          students: [...currentClass.students, { id: Date.now().toString(), name, rollNo: formatRollNo(rollNo) }] 
        };
        await saveClass(updatedClass);
        setName(''); setRollNo('');
        showToast("Student added!");
      };

      const addBulk = async () => {
        if (!bulkData.trim()) return showToast("No data to import");
        const lines = bulkData.split('\n');
        const newStudents = lines.map(line => {
          const parts = line.split(/[,\t]+/).map(s => s.trim());
          if (parts.length >= 2) {
             return { id: Math.random().toString(), rollNo: formatRollNo(parts[0]), name: parts[1] };
          }
          return null;
        }).filter(Boolean);

        if (newStudents.length === 0) return showToast("Could not read any valid data");

        const updatedClass = { ...currentClass, students: [...currentClass.students, ...newStudents] };
        await saveClass(updatedClass);
        setBulkData('');
        setIsBulkMode(false);
        showToast(`Imported ${newStudents.length} students!`);
      };

      return (
        <div className="space-y-6">
          <div className="flex items-center gap-3 mb-2">
            <button onClick={() => setView('classes')} className="text-gray-500 hover:text-blue-600 transition bg-white p-2 rounded-full shadow-sm border border-gray-100">
              <Icon name="ChevronLeft" size={20} />
            </button>
            <h2 className="text-3xl font-black text-gray-800">{currentClass.name}</h2>
          </div>

          <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div className="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
              <h3 className="text-lg font-black text-gray-800 flex items-center gap-2">
                 {isBulkMode ? <Icon name="Upload" className="text-blue-600"/> : <Icon name="UserPlus" className="text-blue-600"/>} 
                 {isBulkMode ? "Bulk Enroll Students" : "Enroll Single Student"}
              </h3>
              <button onClick={() => setIsBulkMode(!isBulkMode)} className="text-sm bg-gray-100 text-gray-700 font-bold px-3 py-1.5 rounded-lg hover:bg-gray-200">
                Switch to {isBulkMode ? 'Single Mode' : 'Bulk Mode'}
              </button>
            </div>

            {!isBulkMode ? (
              <div className="flex flex-col sm:flex-row gap-3">
                <input type="text" value={rollNo} onChange={e => setRollNo(e.target.value)} placeholder="Roll No" className="w-full sm:w-1/3 p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 font-bold text-center" />
                <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Student Full Name" className="w-full flex-1 p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 font-medium" />
                <button onClick={addSingle} className="bg-blue-600 text-white px-8 py-4 rounded-xl font-black shadow-md hover:bg-blue-700">Add</button>
              </div>
            ) : (
              <div className="space-y-3">
                <p className="text-sm text-gray-600 font-medium bg-blue-50 p-3 rounded-lg border border-blue-100">
                  <span className="font-bold text-blue-800">Instructions:</span> Paste data from Excel. Use the format <code>RollNo, Name</code> per line.
                </p>
                <textarea 
                  value={bulkData} onChange={e => setBulkData(e.target.value)} 
                  rows="5" className="w-full p-4 border border-gray-300 rounded-xl outline-none font-mono text-sm bg-gray-50" 
                  placeholder="01, John Doe&#10;02, Jane Smith"
                ></textarea>
                <button onClick={addBulk} className="w-full bg-blue-600 text-white py-4 rounded-xl font-black shadow-md hover:bg-blue-700 flex justify-center items-center gap-2">
                  <Icon name="CloudUpload" /> Import Data
                </button>
              </div>
            )}
          </div>

          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div className="bg-gray-50 p-5 border-b border-gray-200 flex justify-between items-center">
               <h3 className="font-black text-gray-800 text-lg">Class Roster</h3>
               <span className="bg-blue-100 text-blue-800 font-bold text-xs px-3 py-1 rounded-full uppercase tracking-wider">{currentClass.students.length} Total</span>
            </div>
            <div className="max-h-96 overflow-y-auto custom-scrollbar">
              {currentClass.students.length === 0 ? (
                <p className="p-8 text-center text-gray-500 font-medium">No students enrolled yet.</p>
              ) : (
                <table className="w-full text-left border-collapse">
                  <tbody>
                    {currentClass.students.map((student, idx) => (
                      <tr key={student.id} className="border-b border-gray-100 last:border-0 hover:bg-gray-50 transition">
                        <td className="p-4 pl-6 text-gray-400 font-bold w-12 text-sm">{idx + 1}</td>
                        <td className="p-4 font-black font-mono text-gray-700 w-32 bg-gray-50/50 border-r border-gray-100">{student.rollNo}</td>
                        <td className="p-4 font-bold text-gray-800">{student.name}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        </div>
      );
    }

    // --- ITEM ANALYSIS COMPONENT ---
    function ItemAnalysis({ exam, setView }) {
      const results = exam.results || [];
      const totalScans = results.length;

      return (
        <div className="space-y-6 mb-8">
          <div className="flex items-center gap-3 mb-2">
            <button onClick={() => setView('dashboard')} className="text-gray-500 hover:text-blue-600 transition bg-white p-2 rounded-full shadow-sm border border-gray-100">
              <Icon name="ChevronLeft" size={20} />
            </button>
            <h2 className="text-3xl font-black text-gray-800">Item Analysis</h2>
          </div>

          <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-gray-100 pb-6">
              <div>
                <h3 className="text-xl font-black text-gray-800">{exam.name}</h3>
                <p className="text-sm font-bold text-gray-500 mt-1 uppercase tracking-widest">{totalScans} Total Scans Recorded</p>
              </div>
              <div className="flex items-center gap-6 bg-gray-50 p-4 rounded-xl border border-gray-200 w-full md:w-auto">
                <div className="text-center w-full">
                  <div className="text-4xl font-black text-blue-600">
                    {totalScans > 0 ? ((results.reduce((acc, r) => acc + r.score, 0) / (totalScans * exam.questions)) * 100).toFixed(1) : '0'}%
                  </div>
                  <p className="text-xs font-bold text-gray-500 uppercase tracking-widest mt-1">Class Average</p>
                </div>
              </div>
            </div>

            {totalScans === 0 ? (
              <div className="text-center py-12">
                <Icon name="Camera" size={48} className="text-gray-200 mx-auto mb-4" />
                <p className="text-gray-500 font-bold text-lg">No scans recorded yet.</p>
                <p className="text-gray-400 text-sm mt-1">Scan answer sheets to generate beautiful analytics.</p>
              </div>
            ) : (
              <div className="overflow-x-auto custom-scrollbar pb-4">
                <table className="w-full text-left border-collapse min-w-[700px]">
                  <thead>
                    <tr className="bg-gray-50 border-y border-gray-200">
                      <th className="p-4 text-xs font-black text-gray-500 uppercase tracking-widest w-16 text-center border-r border-gray-200">Item</th>
                      <th className="p-4 text-xs font-black text-gray-500 uppercase tracking-widest w-20 text-center border-r border-gray-200">Key</th>
                      <th className="p-4 text-xs font-black text-gray-500 uppercase tracking-widest w-1/3 border-r border-gray-200">Difficulty Level (Correct %)</th>
                      <th className="p-4 text-xs font-black text-gray-500 uppercase tracking-widest">Student Response Distribution</th>
                    </tr>
                  </thead>
                  <tbody>
                    {exam.answerKey.map((qData, qIdx) => {
                      let correctCount = 0;
                      const dist = Array(qData.options).fill(0);
                      let invalidCount = 0;

                      results.forEach(r => {
                        const ans = r.scannedAnswers[qIdx];
                        if (ans === qData.answer) correctCount++;
                        if (ans >= 0 && ans < qData.options) {
                          dist[ans]++;
                        } else {
                          invalidCount++;
                        }
                      });

                      const correctPct = Math.round((correctCount / totalScans) * 100);
                      const isEasy = correctPct >= 75;
                      const isHard = correctPct <= 40;

                      const keyLabel = qData.type === 'true_false' 
                        ? (qData.answer === 0 ? 'T' : 'F') 
                        : String.fromCharCode(65 + qData.answer);

                      return (
                        <tr key={qIdx} className="border-b border-gray-100 last:border-0 hover:bg-gray-50 transition">
                          <td className="p-4 font-black text-gray-700 text-center border-r border-gray-100 bg-gray-50/30 text-lg">Q{qIdx + 1}</td>
                          <td className="p-4 font-black text-blue-600 text-center border-r border-gray-100 text-xl">{keyLabel}</td>
                          <td className="p-4 border-r border-gray-100">
                            <div className="flex items-center gap-3">
                              <span className={`w-12 text-right font-black text-sm ${isEasy ? 'text-green-600' : isHard ? 'text-red-600' : 'text-yellow-600'}`}>
                                {correctPct}%
                              </span>
                              <div className="flex-1 h-3 bg-gray-200 rounded-full overflow-hidden shadow-inner">
                                <div 
                                  className={`h-full transition-all duration-1000 ${isEasy ? 'bg-green-500' : isHard ? 'bg-red-500' : 'bg-yellow-400'}`}
                                  style={{ width: `${correctPct}%` }}
                                ></div>
                              </div>
                            </div>
                          </td>
                          <td className="p-4">
                            <div className="flex gap-2">
                              {dist.map((count, optIdx) => {
                                const label = qData.type === 'true_false' ? (optIdx === 0 ? 'T' : 'F') : String.fromCharCode(65 + optIdx);
                                const isKey = optIdx === qData.answer;
                                const pct = Math.round((count / totalScans) * 100);
                                return (
                                  <div key={optIdx} className={`flex flex-col justify-center items-center w-12 h-12 rounded-lg border-2 ${isKey ? 'bg-blue-50 border-blue-400 shadow-sm' : 'bg-white border-gray-200'}`}>
                                    <span className={`text-xs font-bold ${isKey ? 'text-blue-600' : 'text-gray-400'}`}>{label}</span>
                                    <span className={`text-sm font-black ${isKey ? 'text-blue-800' : 'text-gray-800'}`}>{pct}%</span>
                                  </div>
                                );
                              })}
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- OMR SHEET PRINT TEMPLATE COMPONENT ---
    function OMRSheetTemplate({ exam, setView, showToast }) {
      const printAreaRef = useRef(null);
      const [isExporting, setIsExporting] = useState(false);
      const [customHeader, setCustomHeader] = useState("OFFICIAL OMR ANSWER SHEET");
      const [customInstructions, setCustomInstructions] = useState("INSTRUCTIONS: Completely fill in the circle corresponding to your answer. Do not use checkmarks or Xs.");

      // Dynamic Resizing Logic based on Number of Questions to fit 1 page
      const numCols = exam.questions <= 40 ? 2 : exam.questions <= 90 ? 3 : exam.questions <= 140 ? 4 : 5;
      const rowsPerCol = Math.ceil(exam.questions / numCols);
      const maxOptions = Math.max(...exam.answerKey.map(q => q.options), 1);

      const handlePrint = () => {
        window.print();
      };

      const handleExportJPEG = async () => {
        if (!printAreaRef.current) return;
        setIsExporting(true);
        try {
          const canvas = await html2canvas(printAreaRef.current, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
          const dataUrl = canvas.toDataURL('image/jpeg', 1.0);
          const link = document.createElement('a');
          link.download = `${exam.name.replace(/\s+/g, '_')}_OMR.jpg`;
          link.href = dataUrl;
          link.click();
          showToast("JPEG exported successfully!");
        } catch (error) {
          console.error("Export Error:", error);
          showToast("Error generating JPEG");
        }
        setIsExporting(false);
      };

      const handleExportPDF = async () => {
        if (!printAreaRef.current) return;
        setIsExporting(true);
        try {
          const canvas = await html2canvas(printAreaRef.current, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
          const imgData = canvas.toDataURL('image/jpeg', 1.0);
          
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF('p', 'in', 'letter');
          pdf.addImage(imgData, 'JPEG', 0, 0, 8.5, 11);
          pdf.save(`${exam.name.replace(/\s+/g, '_')}_OMR.pdf`);
          showToast("PDF exported successfully!");
        } catch (error) {
          console.error("Export Error:", error);
          showToast("Error generating PDF");
        }
        setIsExporting(false);
      };

      return (
        <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 mb-8 print:p-0 print:shadow-none print:border-none print:m-0">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 print-hidden">
            <button onClick={() => setView('dashboard')} className="text-gray-500 hover:text-blue-600 transition bg-white p-2 rounded-full shadow-sm border border-gray-100 flex items-center gap-2 px-4 font-bold">
              <Icon name="ChevronLeft" size={20} /> Back
            </button>
            
            <div className="flex flex-wrap gap-2 w-full md:w-auto">
              <button 
                onClick={handleExportJPEG} 
                disabled={isExporting}
                className="bg-gray-100 text-gray-700 px-4 py-3 rounded-xl hover:bg-gray-200 transition flex items-center justify-center gap-2 font-bold flex-1 md:flex-none disabled:opacity-50"
              >
                <Icon name="Image" size={18} /> JPEG
              </button>
              <button 
                onClick={handleExportPDF} 
                disabled={isExporting}
                className="bg-red-50 text-red-600 px-4 py-3 rounded-xl hover:bg-red-100 transition flex items-center justify-center gap-2 font-bold flex-1 md:flex-none disabled:opacity-50"
              >
                <Icon name="FilePdf" size={18} /> PDF
              </button>
              <button 
                onClick={handlePrint} 
                disabled={isExporting}
                className="bg-blue-600 text-white px-6 py-3 rounded-xl shadow-md hover:bg-blue-700 transition flex items-center justify-center gap-2 font-bold flex-1 md:flex-none disabled:opacity-50"
              >
                <Icon name="Printer" size={18} /> Print
              </button>
            </div>
          </div>

          <div className="mb-6 print-hidden bg-blue-50 p-4 rounded-xl border border-blue-100 flex flex-col gap-4">
             <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4">
                <label className="font-bold text-blue-900 whitespace-nowrap w-32">Custom Header:</label>
                <input type="text" value={customHeader} onChange={e => setCustomHeader(e.target.value)} className="flex-1 w-full p-2 rounded-lg border border-blue-200 outline-none font-bold text-gray-800" placeholder="Enter header text..." />
             </div>
             <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4">
                <label className="font-bold text-blue-900 whitespace-nowrap w-32">Instructions:</label>
                <input type="text" value={customInstructions} onChange={e => setCustomInstructions(e.target.value)} className="flex-1 w-full p-2 rounded-lg border border-blue-200 outline-none font-medium text-gray-800" placeholder="Leave blank for no instructions" />
             </div>
          </div>

          {/* Absolute Absolute Positioning Print Wrapper - Strict Map to Optical Scanner zones */}
          <div className="w-full flex justify-center">
            <div 
              ref={printAreaRef} 
              className="print-area relative bg-white border-[6px] border-black overflow-hidden shadow-sm" 
              style={{ width: '100%', maxWidth: '800px', aspectRatio: '8.5/11', boxSizing: 'border-box' }}
            >
              {/* Corner Registration Markers for manual checking if needed */}
              <div className="absolute top-[2%] left-[2%] w-[20px] h-[20px] sm:w-[30px] sm:h-[30px] border-t-[6px] border-l-[6px] border-black"></div>
              <div className="absolute top-[2%] right-[2%] w-[20px] h-[20px] sm:w-[30px] sm:h-[30px] border-t-[6px] border-r-[6px] border-black"></div>
              <div className="absolute bottom-[2%] left-[2%] w-[20px] h-[20px] sm:w-[30px] sm:h-[30px] border-b-[6px] border-l-[6px] border-black"></div>
              <div className="absolute bottom-[2%] right-[2%] w-[20px] h-[20px] sm:w-[30px] sm:h-[30px] border-b-[6px] border-r-[6px] border-black"></div>

              {/* Title Section */}
              <div className="absolute w-full text-center" style={{ top: '3%', left: '0', height: '6%' }}>
                <h1 className="text-xl sm:text-3xl font-black uppercase tracking-widest text-black">{customHeader || " "}</h1>
              </div>

              {/* Information Section (Map: Top 15% to 35%, Left 5% to 50%) */}
              <div className="absolute border-[3px] border-black p-2 sm:p-4 flex flex-col justify-between" style={{ top: '15%', left: '5%', width: '45%', height: '20%' }}>
                <div className="border-b border-gray-300 pb-1 mb-1 sm:mb-2">
                  <p className="font-black text-sm sm:text-lg uppercase tracking-widest text-black line-clamp-1">{exam.name}</p>
                </div>
                <div className="flex flex-col gap-1 sm:gap-2">
                  <div className="flex items-end gap-2 w-full">
                    <p className="font-bold text-[10px] sm:text-sm">NAME:</p>
                    <div className="border-b-[2px] border-black flex-1 h-3 sm:h-4"></div>
                  </div>
                  <div className="flex items-end gap-2 w-full">
                    <p className="font-bold text-[10px] sm:text-sm">CLASS:</p>
                    <span className="flex-1 font-normal border-b-[2px] border-black text-[10px] sm:text-sm whitespace-nowrap overflow-hidden">{exam.className || ''}</span>
                  </div>
                </div>
                <div className="flex justify-between items-end mt-auto gap-4">
                  <div className="flex items-end gap-2 flex-1">
                    <p className="font-bold text-[10px] sm:text-sm">DATE:</p>
                    <div className="flex-1 border-b-[2px] border-black h-3 sm:h-4"></div>
                  </div>
                  <p className="font-bold text-[10px] sm:text-sm whitespace-nowrap">SCORE: ____ / {exam.questions}</p>
                </div>
              </div>

              {/* Roll No Text Box Area (Top 9%, Left 55%, Width 35%, Height 6%) */}
              <div className="absolute border-l-[3px] border-r-[3px] border-t-[3px] border-black bg-gray-50/30 px-1 sm:px-2 pt-1 flex flex-col items-center" style={{ top: '9%', left: '55%', width: '35%', height: '6%' }}>
                 <p className="font-black text-[8px] sm:text-xs uppercase tracking-widest text-black flex-1 flex items-center">Roll No.</p>
                 <div className="flex w-full pb-1 h-[60%]">
                   {Array.from({length: exam.rollNoLength || 4}).map((_, i) => (
                      <div key={i} className="flex-1 flex justify-center items-center h-full border-r last:border-0 border-transparent">
                         <div className="w-[80%] h-full border-[2px] border-black bg-white"></div>
                      </div>
                   ))}
                 </div>
              </div>

              {/* Roll No Bubble Area (Scanned - Matches math: Top 15%, Left 55%, Height 20%, Width 35%) */}
              <div className="absolute border-[3px] border-black bg-gray-50/50 flex" style={{ top: '15%', left: '55%', width: '35%', height: '20%' }}>
                 {Array.from({length: exam.rollNoLength || 4}).map((_, c) => (
                    <div key={c} className="flex-1 flex flex-col h-full border-r last:border-0 border-black/30">
                       {Array.from({length: 10}).map((_, r) => (
                         <div key={r} className="flex-1 w-full flex items-center justify-center">
                            <div className="rounded-full border-[1px] sm:border-[1.5px] border-black bg-white flex items-center justify-center font-bold text-black"
                                 style={{ height: '75%', maxWidth: '75%', aspectRatio: '1/1', fontSize: 'min(1.5vw, 10px)' }}>
                              {r}
                            </div>
                         </div>
                       ))}
                    </div>
                 ))}
              </div>

              {/* Answers Title (Top 36%, Left 5%, Width 90%) */}
              <div className="absolute flex items-end pb-1 border-b-[2px] border-black" style={{ top: '35%', left: '5%', width: '90%', height: '4%' }}>
                <p className="font-bold text-[8px] sm:text-[11px] text-black tracking-wide">
                  {customInstructions}
                </p>
              </div>

              {/* Answers Area (Scanned - Matches math: Top 40%, Left 5%, Height 55%, Width 90%) */}
              <div className="absolute border-[3px] border-black flex" style={{ top: '40%', left: '5%', width: '90%', height: '55%' }}>
                 {Array.from({length: numCols}).map((_, cIdx) => (
                    <div key={cIdx} className="relative h-full border-r border-gray-300 last:border-0" style={{ width: `${100 / numCols}%` }}>
                       {Array.from({length: rowsPerCol}).map((_, rIdx) => {
                          const qIdx = (cIdx * rowsPerCol) + rIdx;
                          if (qIdx >= exam.questions) return null;
                          const qData = exam.answerKey[qIdx];
                          return (
                             <div key={qIdx} className="absolute w-full flex items-center" style={{ top: `${(100 / rowsPerCol) * rIdx}%`, height: `${100 / rowsPerCol}%` }}>
                                <div className="flex items-center justify-end pr-1 sm:pr-2" style={{ width: '30%', height: '100%' }}>
                                   <span className="font-bold text-black" style={{ fontSize: 'min(1.5vw, 12px)' }}>{qIdx + 1}.</span>
                                </div>
                                <div className="flex items-center" style={{ width: '70%', height: '100%' }}>
                                   {Array.from({length: maxOptions}).map((_, oIdx) => {
                                      if (oIdx >= qData.options) return <div key={oIdx} style={{ width: `${100 / maxOptions}%` }} />;
                                      const label = qData.type === 'true_false' ? (oIdx === 0 ? 'T' : 'F') : String.fromCharCode(65 + oIdx);
                                      return (
                                         <div key={oIdx} className="flex justify-center items-center h-full" style={{ width: `${100 / maxOptions}%` }}>
                                            <div className="rounded-full border-[1px] sm:border-[1.5px] border-black bg-white flex items-center justify-center font-bold text-black"
                                                 style={{
                                                    height: '75%',
                                                    maxWidth: '75%',
                                                    aspectRatio: '1/1',
                                                    fontSize: 'min(1.2vw, 10px)'
                                                 }}>
                                              {label}
                                            </div>
                                         </div>
                                      );
                                   })}
                                </div>
                             </div>
                          );
                       })}
                    </div>
                 ))}
              </div>

            </div>
          </div>
        </div>
      );
    }

    // --- RENDER APP ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>
</html>
