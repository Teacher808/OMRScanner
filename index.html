<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMR ScanMaster System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- jsPDF & html2canvas for Exporting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* OMR Template Strict Sizing: 5 inches by 7 inches */
        .omr-template {
            width: 5in;
            height: 7in;
            background-color: white;
            color: black;
            border: 4px solid black; /* Fiducial marker border for scanning */
            box-sizing: border-box;
            padding: 0.2in;
            position: relative;
            margin: 0 auto;
        }

        .omr-bubble {
            width: 14px;
            height: 14px;
            border: 1px solid black;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: bold;
            color: #ccc; /* Very light text so it doesn't interfere with scan darkness */
            margin: 1px;
            background-color: transparent;
        }

        .omr-bubble.filled {
            background-color: black !important;
            color: black !important;
        }

        /* Print Styles */
        @media print {
            body * { visibility: hidden; }
            #printable-template, #printable-template * { visibility: visible; }
            #printable-template {
                position: absolute;
                left: 0;
                top: 0;
                margin: 0;
                page-break-after: always;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONS (Inline SVGs to prevent dependency issues) ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Home: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
                Users: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
                Book: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>,
                FileText: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>,
                Scan: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/></svg>,
                Trash: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
                Download: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
                Printer: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            };
            return icons[name] || null;
        };

        // --- UTILS ---
        const generateId = () => Math.random().toString(36).substr(2, 9);

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [currentView, setCurrentView] = useState('dashboard');
            
            // Database State
            const [db, setDb] = useState({
                classes: [],
                students: [],
                exams: [],
                submissions: []
            });

            // Load initial data
            useEffect(() => {
                const stored = localStorage.getItem('omr_db');
                if (stored) setDb(JSON.parse(stored));
            }, []);

            // Save data on change
            useEffect(() => {
                localStorage.setItem('omr_db', JSON.stringify(db));
            }, [db]);

            // --- VIEW CONTROLLERS ---
            const renderView = () => {
                switch (currentView) {
                    case 'dashboard': return <Dashboard db={db} />;
                    case 'classes': return <ClassManager db={db} setDb={setDb} />;
                    case 'students': return <StudentManager db={db} setDb={setDb} />;
                    case 'exams': return <ExamManager db={db} setDb={setDb} setCurrentView={setCurrentView} />;
                    case 'scanner': return <Scanner db={db} setDb={setDb} />;
                    default: return <Dashboard db={db} />;
                }
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-64 bg-slate-900 text-white flex flex-col">
                        <div className="p-6">
                            <h1 className="text-2xl font-black flex items-center gap-2">
                                <Icon name="Scan" size={28} className="text-blue-400"/>
                                ScanMaster
                            </h1>
                            <p className="text-slate-400 text-xs mt-1">OMR Evaluation System</p>
                        </div>
                        <nav className="flex-1 px-4 space-y-2">
                            {[
                                { id: 'dashboard', icon: 'Home', label: 'Dashboard' },
                                { id: 'classes', icon: 'Book', label: 'Classes & Sections' },
                                { id: 'students', icon: 'Users', label: 'Students' },
                                { id: 'exams', icon: 'FileText', label: 'Exams & Templates' },
                                { id: 'scanner', icon: 'Scan', label: 'Scan & Grade' },
                            ].map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setCurrentView(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-colors ${currentView === item.id ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-300 hover:bg-slate-800'}`}
                                >
                                    <Icon name={item.icon} size={18} />
                                    <span className="font-medium">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 overflow-auto bg-slate-50 p-8">
                        {renderView()}
                    </div>
                </div>
            );
        };

        // --- COMPONENTS ---

        const Dashboard = ({ db }) => (
            <div className="animate-fade-in">
                <h2 className="text-3xl font-black text-slate-800 mb-6">Dashboard</h2>
                <div className="grid grid-cols-4 gap-6">
                    <div className="p-6 bg-white rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                        <div className="p-4 bg-blue-100 text-blue-600 rounded-xl"><Icon name="Book" size={24}/></div>
                        <div><p className="text-sm font-bold text-slate-400 uppercase">Classes</p><p className="text-3xl font-black">{db.classes.length}</p></div>
                    </div>
                    <div className="p-6 bg-white rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                        <div className="p-4 bg-green-100 text-green-600 rounded-xl"><Icon name="Users" size={24}/></div>
                        <div><p className="text-sm font-bold text-slate-400 uppercase">Students</p><p className="text-3xl font-black">{db.students.length}</p></div>
                    </div>
                    <div className="p-6 bg-white rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                        <div className="p-4 bg-purple-100 text-purple-600 rounded-xl"><Icon name="FileText" size={24}/></div>
                        <div><p className="text-sm font-bold text-slate-400 uppercase">Exams</p><p className="text-3xl font-black">{db.exams.length}</p></div>
                    </div>
                    <div className="p-6 bg-white rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                        <div className="p-4 bg-orange-100 text-orange-600 rounded-xl"><Icon name="Scan" size={24}/></div>
                        <div><p className="text-sm font-bold text-slate-400 uppercase">Scans</p><p className="text-3xl font-black">{db.submissions.length}</p></div>
                    </div>
                </div>
            </div>
        );

        const ClassManager = ({ db, setDb }) => {
            const [name, setName] = useState('');
            
            const addClass = (e) => {
                e.preventDefault();
                if (!name.trim()) return;
                setDb(prev => ({ ...prev, classes: [...prev.classes, { id: generateId(), name }] }));
                setName('');
            };

            const deleteClass = (id) => {
                setDb(prev => ({ ...prev, classes: prev.classes.filter(c => c.id !== id) }));
            };

            return (
                <div>
                    <h2 className="text-2xl font-bold text-slate-800 mb-6">Manage Classes & Sections</h2>
                    <div className="grid grid-cols-3 gap-8">
                        <div className="col-span-1 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-fit">
                            <h3 className="font-bold text-lg mb-4">Add New Class</h3>
                            <form onSubmit={addClass} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">Class/Section Name</label>
                                    <input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="e.g. Grade 10 - Newton" required />
                                </div>
                                <button type="submit" className="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700">Add Class</button>
                            </form>
                        </div>
                        <div className="col-span-2 bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 border-b">
                                    <tr>
                                        <th className="p-4 font-semibold text-slate-600">Class Name</th>
                                        <th className="p-4 font-semibold text-slate-600">Students Enrolled</th>
                                        <th className="p-4 font-semibold text-slate-600 text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {db.classes.map(c => (
                                        <tr key={c.id} className="border-b last:border-0 hover:bg-slate-50">
                                            <td className="p-4 font-medium">{c.name}</td>
                                            <td className="p-4">{db.students.filter(s => s.classId === c.id).length}</td>
                                            <td className="p-4 text-right">
                                                <button onClick={() => deleteClass(c.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg"><Icon name="Trash" size={16}/></button>
                                            </td>
                                        </tr>
                                    ))}
                                    {db.classes.length === 0 && <tr><td colSpan="3" className="p-8 text-center text-slate-500">No classes added yet.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const StudentManager = ({ db, setDb }) => {
            const [mode, setMode] = useState('single'); // single or bulk
            const [name, setName] = useState('');
            const [roll, setRoll] = useState('');
            const [classId, setClassId] = useState('');
            const [bulkData, setBulkData] = useState('');

            const addSingle = (e) => {
                e.preventDefault();
                if (!name || !roll || !classId) return;
                setDb(prev => ({ ...prev, students: [...prev.students, { id: generateId(), name, rollNumber: roll, classId }] }));
                setName(''); setRoll('');
            };

            const addBulk = (e) => {
                e.preventDefault();
                if (!bulkData.trim() || !classId) return;
                const rows = bulkData.split('\n');
                const newStudents = rows.map(row => {
                    const [sName, sRoll] = row.split(',').map(s => s.trim());
                    if (sName && sRoll) return { id: generateId(), name: sName, rollNumber: sRoll, classId };
                    return null;
                }).filter(Boolean);
                
                setDb(prev => ({ ...prev, students: [...prev.students, ...newStudents] }));
                setBulkData('');
            };

            const deleteStudent = (id) => setDb(prev => ({ ...prev, students: prev.students.filter(s => s.id !== id) }));

            return (
                <div>
                    <h2 className="text-2xl font-bold text-slate-800 mb-6">Manage Students</h2>
                    <div className="grid grid-cols-3 gap-8">
                        <div className="col-span-1 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-fit">
                            <div className="flex bg-slate-100 p-1 rounded-lg mb-6">
                                <button onClick={() => setMode('single')} className={`flex-1 py-1 text-sm font-medium rounded-md ${mode === 'single' ? 'bg-white shadow' : 'text-slate-500'}`}>Single</button>
                                <button onClick={() => setMode('bulk')} className={`flex-1 py-1 text-sm font-medium rounded-md ${mode === 'bulk' ? 'bg-white shadow' : 'text-slate-500'}`}>Bulk CSV</button>
                            </div>

                            {mode === 'single' ? (
                                <form onSubmit={addSingle} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Select Class</label>
                                        <select value={classId} onChange={e => setClassId(e.target.value)} className="w-full p-2 border rounded-lg" required>
                                            <option value="">-- Choose Class --</option>
                                            {db.classes.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                        </select>
                                    </div>
                                    <div><label className="block text-sm font-medium text-slate-700 mb-1">Student Name</label><input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full p-2 border rounded-lg" required /></div>
                                    <div><label className="block text-sm font-medium text-slate-700 mb-1">Roll Number</label><input type="number" value={roll} onChange={e => setRoll(e.target.value)} className="w-full p-2 border rounded-lg" required /></div>
                                    <button type="submit" className="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700">Add Student</button>
                                </form>
                            ) : (
                                <form onSubmit={addBulk} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Select Class</label>
                                        <select value={classId} onChange={e => setClassId(e.target.value)} className="w-full p-2 border rounded-lg" required>
                                            <option value="">-- Choose Class --</option>
                                            {db.classes.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Paste CSV Data (Name, RollNumber)</label>
                                        <textarea value={bulkData} onChange={e => setBulkData(e.target.value)} className="w-full p-2 border rounded-lg h-32 font-mono text-sm" placeholder="John Doe, 1001&#10;Jane Smith, 1002" required></textarea>
                                    </div>
                                    <button type="submit" className="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700">Import Students</button>
                                </form>
                            )}
                        </div>
                        <div className="col-span-2 bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 border-b">
                                    <tr>
                                        <th className="p-4 font-semibold text-slate-600">Roll No.</th>
                                        <th className="p-4 font-semibold text-slate-600">Name</th>
                                        <th className="p-4 font-semibold text-slate-600">Class</th>
                                        <th className="p-4 font-semibold text-slate-600 text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {db.students.map(s => (
                                        <tr key={s.id} className="border-b last:border-0 hover:bg-slate-50">
                                            <td className="p-4 font-mono text-slate-600">{s.rollNumber}</td>
                                            <td className="p-4 font-medium">{s.name}</td>
                                            <td className="p-4 text-slate-600">{db.classes.find(c => c.id === s.classId)?.name || 'Unknown'}</td>
                                            <td className="p-4 text-right">
                                                <button onClick={() => deleteStudent(s.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg"><Icon name="Trash" size={16}/></button>
                                            </td>
                                        </tr>
                                    ))}
                                    {db.students.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-slate-500">No students added yet.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const ExamManager = ({ db, setDb }) => {
            const [editingExamId, setEditingExamId] = useState(null);

            const createNewExam = () => {
                const newExam = {
                    id: generateId(),
                    name: 'New Exam ' + (db.exams.length + 1),
                    classId: db.classes[0]?.id || '',
                    date: new Date().toISOString().split('T')[0],
                    templateConfig: {
                        rollDigits: 4,
                        sections: [
                            { id: generateId(), type: 'MCQ', count: 10, options: 4, startNumber: 1 }
                        ]
                    },
                    answerKey: {} // e.g., { 'q-1': 'A', 'q-2': 'B', ... }
                };
                setDb(prev => ({ ...prev, exams: [...prev.exams, newExam] }));
                setEditingExamId(newExam.id);
            };

            const deleteExam = (id) => {
                setDb(prev => ({ ...prev, exams: prev.exams.filter(e => e.id !== id), submissions: prev.submissions.filter(s => s.examId !== id) }));
                if (editingExamId === id) setEditingExamId(null);
            };

            if (editingExamId) {
                const exam = db.exams.find(e => e.id === editingExamId);
                return <TemplateEditor exam={exam} db={db} setDb={setDb} onBack={() => setEditingExamId(null)} />;
            }

            return (
                <div>
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold text-slate-800">Manage Exams & Templates</h2>
                        <button onClick={createNewExam} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-700 flex items-center gap-2">
                            <Icon name="FileText" size={18}/> Create Exam
                        </button>
                    </div>

                    <div className="grid grid-cols-3 gap-6">
                        {db.exams.map(exam => (
                            <div key={exam.id} className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col">
                                <h3 className="text-xl font-bold mb-1">{exam.name}</h3>
                                <p className="text-slate-500 text-sm mb-4">Class: {db.classes.find(c => c.id === exam.classId)?.name || 'Unassigned'} • Date: {exam.date}</p>
                                
                                <div className="mt-auto flex gap-2">
                                    <button onClick={() => setEditingExamId(exam.id)} className="flex-1 bg-slate-100 text-slate-700 py-2 rounded-lg font-medium hover:bg-slate-200 text-sm text-center">Edit & Template</button>
                                    <button onClick={() => deleteExam(exam.id)} className="px-3 bg-red-50 text-red-500 rounded-lg hover:bg-red-100"><Icon name="Trash" size={16}/></button>
                                </div>
                            </div>
                        ))}
                        {db.exams.length === 0 && <div className="col-span-3 text-center p-12 bg-white rounded-2xl border border-slate-200 text-slate-500">No exams created yet.</div>}
                    </div>
                </div>
            );
        };

        // --- TEMPLATE EDITOR & VIEWER COMPONENT ---
        const TemplateEditor = ({ exam, db, setDb, onBack }) => {
            const [localExam, setLocalExam] = useState(exam);

            const updateExam = (updates) => {
                const updated = { ...localExam, ...updates };
                setLocalExam(updated);
                setDb(prev => ({
                    ...prev,
                    exams: prev.exams.map(e => e.id === updated.id ? updated : e)
                }));
            };

            const addSection = (type) => {
                const currentSections = localExam.templateConfig.sections;
                let startNumber = 1;
                if (currentSections.length > 0) {
                    const last = currentSections[currentSections.length - 1];
                    startNumber = last.startNumber + last.count;
                }
                const newSection = { id: generateId(), type, count: 5, options: 4, startNumber };
                updateExam({ templateConfig: { ...localExam.templateConfig, sections: [...currentSections, newSection] } });
            };

            const removeSection = (id) => {
                updateExam({ templateConfig: { ...localExam.templateConfig, sections: localExam.templateConfig.sections.filter(s => s.id !== id) } });
            };

            const exportPDF = () => {
                const el = document.getElementById('printable-template');
                html2canvas(el, { scale: 3 }).then(canvas => {
                    const imgData = canvas.toDataURL('image/jpeg', 1.0);
                    const pdf = new window.jspdf.jsPDF('p', 'in', [5, 7]);
                    pdf.addImage(imgData, 'JPEG', 0, 0, 5, 7);
                    pdf.save(`${localExam.name}_OMR.pdf`);
                });
            };

            const exportJPEG = () => {
                const el = document.getElementById('printable-template');
                html2canvas(el, { scale: 3 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `${localExam.name}_OMR.jpg`;
                    link.href = canvas.toDataURL('image/jpeg', 1.0);
                    link.click();
                });
            };

            const printTemplate = () => window.print();

            return (
                <div className="flex gap-8">
                    {/* Controls Sidebar */}
                    <div className="w-80 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col overflow-y-auto max-h-[85vh]">
                        <button onClick={onBack} className="text-sm font-medium text-slate-500 hover:text-slate-800 mb-6 flex items-center gap-1">&larr; Back to Exams</button>
                        
                        <h3 className="font-bold text-lg mb-4">Exam Settings</h3>
                        <div className="space-y-4 mb-8">
                            <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1">Exam Name</label><input type="text" value={localExam.name} onChange={e => updateExam({name: e.target.value})} className="w-full p-2 border rounded-lg text-sm" /></div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Assign Class</label>
                                <select value={localExam.classId} onChange={e => updateExam({classId: e.target.value})} className="w-full p-2 border rounded-lg text-sm">
                                    <option value="">-- Choose --</option>
                                    {db.classes.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Roll Number Digits ({localExam.templateConfig.rollDigits})</label>
                                <input type="range" min="2" max="6" value={localExam.templateConfig.rollDigits} onChange={e => updateExam({templateConfig: {...localExam.templateConfig, rollDigits: parseInt(e.target.value)}})} className="w-full" />
                            </div>
                        </div>

                        <h3 className="font-bold text-lg mb-4">Template Sections</h3>
                        <div className="space-y-4 flex-1">
                            {localExam.templateConfig.sections.map((sec, idx) => (
                                <div key={sec.id} className="p-3 border rounded-lg bg-slate-50 relative">
                                    <button onClick={() => removeSection(sec.id)} className="absolute top-2 right-2 text-red-400 hover:text-red-600"><Icon name="Trash" size={14}/></button>
                                    <p className="font-bold text-sm mb-2">{sec.type} Section</p>
                                    <div className="flex items-center gap-2">
                                        <label className="text-xs text-slate-600">Count:</label>
                                        <input type="number" min="1" max="50" value={sec.count} onChange={e => {
                                            const newSecs = [...localExam.templateConfig.sections];
                                            newSecs[idx].count = parseInt(e.target.value) || 1;
                                            updateExam({templateConfig: {...localExam.templateConfig, sections: newSecs}});
                                        }} className="w-16 p-1 border rounded text-xs" />
                                    </div>
                                </div>
                            ))}
                            <div className="flex gap-2">
                                <button onClick={() => addSection('MCQ')} className="flex-1 bg-white border border-slate-300 text-slate-700 py-1 rounded text-xs font-medium hover:bg-slate-50">+ MCQ</button>
                                <button onClick={() => addSection('T/F')} className="flex-1 bg-white border border-slate-300 text-slate-700 py-1 rounded text-xs font-medium hover:bg-slate-50">+ T/F</button>
                                <button onClick={() => addSection('Supply')} className="flex-1 bg-white border border-slate-300 text-slate-700 py-1 rounded text-xs font-medium hover:bg-slate-50">+ Supply</button>
                            </div>
                        </div>

                        <div className="mt-8 pt-4 border-t space-y-2">
                            <button onClick={printTemplate} className="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 flex justify-center items-center gap-2"><Icon name="Printer" size={16}/> Print OMR</button>
                            <div className="flex gap-2">
                                <button onClick={exportPDF} className="flex-1 bg-slate-800 text-white py-2 rounded-lg font-medium hover:bg-slate-900 text-sm flex justify-center items-center gap-1"><Icon name="Download" size={14}/> PDF</button>
                                <button onClick={exportJPEG} className="flex-1 bg-slate-800 text-white py-2 rounded-lg font-medium hover:bg-slate-900 text-sm flex justify-center items-center gap-1"><Icon name="Download" size={14}/> JPEG</button>
                            </div>
                        </div>
                    </div>

                    {/* Preview Area */}
                    <div className="flex-1 bg-slate-200 rounded-2xl flex justify-center items-start overflow-auto p-8 border border-slate-300 shadow-inner">
                        <div id="printable-template" className="bg-white shadow-2xl">
                            <OMRSheet config={localExam.templateConfig} title={localExam.name} classNameName={db.classes.find(c => c.id === localExam.classId)?.name} />
                        </div>
                    </div>
                </div>
            );
        };

        // --- OMR SHEET RENDERER (Used for preview, export, and scan mapping) ---
        const OMRSheet = ({ config, title, classNameName, hideAnswers = true, answerData = {} }) => {
            return (
                <div className="omr-template flex flex-col" id="omr-template-calibration">
                    {/* Header */}
                    <div className="flex justify-between items-start mb-4 border-b-2 border-black pb-2">
                        <div className="flex-1">
                            <h1 className="text-xl font-black uppercase leading-tight">{title || 'Exam Title'}</h1>
                            <p className="text-xs font-bold mt-1">Class: {classNameName || '____________________'}</p>
                            <div className="mt-3 space-y-2">
                                <p className="text-xs">Name: _________________________________________</p>
                                <p className="text-xs">Date: __________________ Score: _______________</p>
                            </div>
                        </div>
                        
                        {/* Vertical Roll Number Grid */}
                        <div className="ml-4 pl-4 border-l-2 border-black">
                            <p className="text-[10px] font-bold text-center mb-1">ROLL NO.</p>
                            <div className="flex gap-1 justify-center">
                                {Array.from({ length: config.rollDigits }).map((_, colIdx) => (
                                    <div key={`roll-col-${colIdx}`} className="flex flex-col items-center gap-[2px]">
                                        <div className="w-4 h-4 border border-black mb-1"></div> {/* Writable box */}
                                        {Array.from({ length: 10 }).map((_, num) => {
                                            const isFilled = answerData.roll && answerData.roll[colIdx] === num;
                                            return (
                                                <div key={`r-${colIdx}-${num}`} className={`omr-bubble ${isFilled ? 'filled' : ''}`} data-type="roll" data-col={colIdx} data-val={num}>
                                                    {num}
                                                </div>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Body - Questions */}
                    <div className="flex-1 flex flex-wrap gap-x-6 gap-y-4 content-start overflow-hidden">
                        {config.sections.map(sec => (
                            <div key={sec.id} className="min-w-[120px]">
                                <h4 className="text-[10px] font-bold border-b border-black mb-1 pb-[2px]">{sec.type}</h4>
                                <div className="space-y-[3px]">
                                    {Array.from({ length: sec.count }).map((_, qIdx) => {
                                        const qNum = sec.startNumber + qIdx;
                                        
                                        if (sec.type === 'Supply') {
                                            return (
                                                <div key={`q-${qNum}`} className="flex items-end gap-2 mb-2">
                                                    <span className="text-[10px] font-bold w-4 text-right">{qNum}.</span>
                                                    <div className="flex-1 border-b border-black h-4 min-w-[80px]"></div>
                                                </div>
                                            );
                                        }

                                        const labels = sec.type === 'MCQ' ? ['A', 'B', 'C', 'D', 'E'].slice(0, sec.options) : ['T', 'F'];
                                        
                                        return (
                                            <div key={`q-${qNum}`} className="flex items-center gap-1">
                                                <span className="text-[10px] font-bold w-4 text-right">{qNum}.</span>
                                                <div className="flex gap-1">
                                                    {labels.map((lbl, optIdx) => {
                                                        const isFilled = answerData.answers && answerData.answers[`q-${qNum}`] === lbl;
                                                        return (
                                                            <div key={`opt-${lbl}`} className={`omr-bubble ${isFilled ? 'filled' : ''}`} data-type="q" data-q={qNum} data-val={lbl}>
                                                                {lbl}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>
                    
                    {/* Footer instructions */}
                    <div className="mt-auto text-center border-t border-black pt-1">
                        <p className="text-[8px] font-bold">Please shade circles completely. Use black ink. Do not fold the paper.</p>
                    </div>
                </div>
            );
        };


        // --- SCANNER COMPONENT ---
        const Scanner = ({ db, setDb }) => {
            const [selectedExamId, setSelectedExamId] = useState('');
            const [imageSrc, setImageSrc] = useState(null);
            const [scanResult, setScanResult] = useState(null);
            const [isScanning, setIsScanning] = useState(false);
            
            // Reference to hidden template for coordinate mapping
            const hiddenTemplateRef = useRef(null);
            const canvasRef = useRef(null);

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setImageSrc(event.target.result);
                        setScanResult(null);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const processScan = () => {
                if (!imageSrc || !selectedExamId) return;
                setIsScanning(true);

                const exam = db.exams.find(e => e.id === selectedExamId);
                const templateConfig = exam.templateConfig;

                // 1. Get reference coordinates from our beautifully hidden template DOM
                const calibContainer = hiddenTemplateRef.current.querySelector('#omr-template-calibration');
                const calibRect = calibContainer.getBoundingClientRect();
                const bubbles = calibContainer.querySelectorAll('.omr-bubble');
                
                const expectedCoords = Array.from(bubbles).map(b => {
                    const br = b.getBoundingClientRect();
                    return {
                        type: b.dataset.type, // 'roll' or 'q'
                        col: b.dataset.col,
                        val: b.dataset.val,
                        q: b.dataset.q,
                        // Calculate relative percentage position (0.0 to 1.0) inside the 5x7 box
                        rx: (br.left - calibRect.left) / calibRect.width,
                        ry: (br.top - calibRect.top) / calibRect.height,
                        rw: br.width / calibRect.width,
                        rh: br.height / calibRect.height
                    };
                });

                // 2. Draw uploaded image to canvas
                const img = new Image();
                img.onload = () => {
                    const cvs = canvasRef.current;
                    const ctx = cvs.getContext('2d', { willReadFrequently: true });
                    cvs.width = img.width;
                    cvs.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    const imgData = ctx.getImageData(0, 0, cvs.width, cvs.height);
                    const pixels = imgData.data;

                    // Helper to get average darkness of a region
                    const getDarkness = (rx, ry, rw, rh) => {
                        const startX = Math.floor(rx * cvs.width);
                        const startY = Math.floor(ry * cvs.height);
                        const w = Math.floor(rw * cvs.width);
                        const h = Math.floor(rh * cvs.height);
                        
                        let totalDarkness = 0;
                        let count = 0;
                        for (let y = startY; y < startY + h; y++) {
                            for (let x = startX; x < startX + w; x++) {
                                const i = (y * cvs.width + x) * 4;
                                // Grayscale value (R+G+B)/3
                                const brightness = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
                                // Convert to darkness (0=white, 255=black)
                                totalDarkness += (255 - brightness);
                                count++;
                            }
                        }
                        return count > 0 ? totalDarkness / count : 0;
                    };

                    // 3. Analyze Bubbles
                    const rawResults = expectedCoords.map(c => ({
                        ...c,
                        darkness: getDarkness(c.rx, c.ry, c.rw, c.rh)
                    }));

                    // 4. Determine filled bubbles (relative maximum darkness per group)
                    const parsedRoll = {};
                    const parsedAnswers = {};

                    // Process Roll Number columns
                    for (let col = 0; col < templateConfig.rollDigits; col++) {
                        const colBubbles = rawResults.filter(r => r.type === 'roll' && parseInt(r.col) === col);
                        const darkest = colBubbles.reduce((prev, curr) => (curr.darkness > prev.darkness ? curr : prev), {darkness: 0});
                        if (darkest.darkness > 50) { // arbitrary threshold to avoid empty scans
                            parsedRoll[col] = parseInt(darkest.val);
                        }
                    }

                    // Process Questions
                    const allQNums = [...new Set(rawResults.filter(r => r.type === 'q').map(r => r.q))];
                    allQNums.forEach(qNum => {
                        const qBubbles = rawResults.filter(r => r.type === 'q' && r.q === qNum);
                        const darkest = qBubbles.reduce((prev, curr) => (curr.darkness > prev.darkness ? curr : prev), {darkness: 0});
                        if (darkest.darkness > 50) {
                            parsedAnswers[`q-${qNum}`] = darkest.val;
                        }
                    });

                    // Construct final Roll Number string
                    let finalRollStr = '';
                    for (let i = 0; i < templateConfig.rollDigits; i++) {
                        finalRollStr += (parsedRoll[i] !== undefined ? parsedRoll[i] : '?');
                    }

                    // Identify Student
                    const studentMatch = db.students.find(s => s.rollNumber === finalRollStr);

                    setScanResult({
                        roll: finalRollStr,
                        student: studentMatch,
                        answers: parsedAnswers
                    });

                    setIsScanning(false);
                };
                img.src = imageSrc;
            };

            const saveResult = () => {
                if (!scanResult || !selectedExamId) return;
                const newSub = {
                    id: generateId(),
                    examId: selectedExamId,
                    studentId: scanResult.student?.id || 'unknown',
                    rollScanned: scanResult.roll,
                    answers: scanResult.answers,
                    timestamp: new Date().toISOString()
                };
                setDb(prev => ({ ...prev, submissions: [...prev.submissions, newSub] }));
                setScanResult(null);
                setImageSrc(null);
                alert("Scan saved successfully!");
            };

            const activeExam = db.exams.find(e => e.id === selectedExamId);

            return (
                <div className="flex gap-8">
                    {/* Instructions & File Upload */}
                    <div className="w-80 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col h-fit">
                        <h2 className="text-xl font-bold mb-4">Scan & Grade</h2>
                        
                        <div className="space-y-4 mb-6">
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">Select Exam to Grade</label>
                                <select value={selectedExamId} onChange={e => setSelectedExamId(e.target.value)} className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                                    <option value="">-- Choose Exam --</option>
                                    {db.exams.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
                                </select>
                            </div>

                            {selectedExamId && (
                                <div className="p-4 bg-orange-50 border border-orange-200 rounded-lg text-sm text-orange-800">
                                    <strong>Important:</strong> Ensure the uploaded image is tightly cropped to the thick black borders of the printed OMR sheet for accurate reading.
                                </div>
                            )}

                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">Upload OMR Image</label>
                                <input type="file" accept="image/*" onChange={handleFileChange} disabled={!selectedExamId} className="w-full text-sm border p-2 rounded-lg file:mr-4 file:py-1 file:px-3 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" />
                            </div>

                            <button onClick={processScan} disabled={!imageSrc || isScanning} className="w-full bg-slate-900 text-white py-2 rounded-lg font-medium hover:bg-slate-800 disabled:opacity-50 flex justify-center items-center gap-2">
                                {isScanning ? 'Processing...' : <><Icon name="Scan" size={16}/> Process Scan</>}
                            </button>
                        </div>

                        {scanResult && (
                            <div className="border-t pt-4">
                                <h3 className="font-bold text-lg mb-2">Scan Results</h3>
                                <div className="space-y-2 text-sm mb-4">
                                    <div className="flex justify-between border-b pb-1">
                                        <span className="text-slate-500">Scanned Roll No:</span>
                                        <span className="font-mono font-bold">{scanResult.roll}</span>
                                    </div>
                                    <div className="flex justify-between border-b pb-1">
                                        <span className="text-slate-500">Student Match:</span>
                                        <span className={`font-bold ${scanResult.student ? 'text-green-600' : 'text-red-500'}`}>
                                            {scanResult.student ? scanResult.student.name : 'Unregistered Roll No'}
                                        </span>
                                    </div>
                                    <div className="flex justify-between border-b pb-1">
                                        <span className="text-slate-500">Bubbles Read:</span>
                                        <span className="font-bold">{Object.keys(scanResult.answers).length}</span>
                                    </div>
                                </div>
                                <button onClick={saveResult} className="w-full bg-green-600 text-white py-2 rounded-lg font-medium hover:bg-green-700">Save Record</button>
                            </div>
                        )}
                    </div>

                    {/* Image Preview & Hidden Calibration DOM */}
                    <div className="flex-1 bg-slate-200 rounded-2xl border border-slate-300 shadow-inner overflow-hidden flex flex-col items-center justify-center p-4 relative min-h-[500px]">
                        {imageSrc ? (
                            <div className="relative inline-block border-4 border-black shadow-xl" style={{ maxHeight: '100%', maxWidth: '100%' }}>
                                <img src={imageSrc} alt="Scanned OMR" className="max-w-full max-h-[80vh] object-contain block" />
                                <canvas ref={canvasRef} className="hidden"></canvas>
                            </div>
                        ) : (
                            <p className="text-slate-400 font-medium">Select an exam and upload an image to begin.</p>
                        )}
                        
                        {/* HIDDEN TEMPLATE FOR CALIBRATION 
                          We render the template perfectly off-screen to extract exact percentage coordinates
                          of where bubbles *should* be relative to the bounding box.
                        */}
                        {activeExam && (
                            <div style={{ position: 'absolute', opacity: 0, pointerEvents: 'none', top: '-10000px', left: '-10000px' }} ref={hiddenTemplateRef}>
                                <OMRSheet config={activeExam.templateConfig} title="CALIB" />
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
