<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Demo App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .loader { border: 3px solid #e0e7ff; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-blue-900 min-h-screen flex items-center justify-center p-4">

    <!-- Status Messages -->
    <div id="statusMessage" class="hidden absolute top-4 right-4 bg-white text-blue-800 border border-blue-200 px-4 py-2 rounded shadow-lg transition-opacity z-50"></div>

    <!-- Authentication Section -->
    <div id="authSection" class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <h1 class="text-2xl font-bold text-blue-950 mb-2 text-center">Welcome</h1>
        <p class="text-sm text-blue-600 mb-6 text-center">Sign in or create an account to save your files.</p>
        
        <div class="space-y-4">
            <div>
                <input type="text" id="usernameInput" placeholder="Username" 
                    class="w-full px-4 py-2 bg-white border border-blue-200 text-blue-950 placeholder-gray-400 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <input type="password" id="passwordInput" placeholder="Password" 
                    class="w-full px-4 py-2 bg-white border border-blue-200 text-blue-950 placeholder-gray-400 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div class="flex gap-2 pt-2">
                <button id="loginBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-medium transition-colors flex justify-center items-center h-10 shadow-md shadow-blue-600/30">
                    <span>Log In</span>
                </button>
                <button id="signupBtn" class="flex-1 bg-white hover:bg-blue-50 text-blue-600 border border-blue-200 py-2 rounded-lg font-medium transition-colors flex justify-center items-center h-10">
                    <span>Sign Up</span>
                </button>
            </div>
            
            <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-blue-100"></div>
                <span class="flex-shrink-0 mx-4 text-blue-400 text-sm">or</span>
                <div class="flex-grow border-t border-blue-100"></div>
            </div>

            <div class="text-center">
                <button id="guestBtn" class="text-sm text-blue-600 hover:text-blue-800 font-medium hover:underline h-8 flex justify-center items-center w-full">
                    <span>Continue as Guest</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Main App Section -->
    <div id="appSection" class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md hidden">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-2xl font-bold text-blue-950">My Tasks</h1>
            <button id="logoutBtn" class="text-sm text-red-500 hover:text-red-600 font-medium">Logout</button>
        </div>
        <p id="userEmailDisplay" class="text-xs text-blue-500 mb-6 border-b border-blue-100 pb-4"></p>
        
        <div class="flex gap-2 mb-6">
            <input type="text" id="taskInput" placeholder="What needs to be done?" 
                class="flex-1 px-4 py-2 bg-white border border-blue-200 text-blue-950 placeholder-gray-400 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button id="addTaskBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors flex items-center justify-center min-w-[4rem] shadow-md shadow-blue-600/30">
                <span>Add</span>
            </button>
        </div>

        <ul id="taskList" class="space-y-3">
            <!-- Tasks will be injected here via JavaScript -->
        </ul>
    </div>

    <script>
        // ==========================================
        // ⚠️ CRITICAL SETUP STEP:
        // Paste your Google Apps Script Web App URL below
        // ==========================================
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz9Y2vFk6MjoPSobkyn4WH50hethMnYA7dsmyUURmAY2apcspro4IpGOonQRyGiMvus/exec";

        // Current user state
        let currentUser = null;
        let currentTasks = [];

        // DOM Elements
        const authSection = document.getElementById('authSection');
        const appSection = document.getElementById('appSection');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const userEmailDisplay = document.getElementById('userEmailDisplay');
        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');

        // Helper: Show status messages
        const showStatus = (msg, isError = false) => {
            const el = document.getElementById('statusMessage');
            el.textContent = msg;
            el.className = `absolute top-4 right-4 px-4 py-2 rounded shadow-lg transition-opacity z-50 border ${isError ? 'bg-red-50 text-red-800 border-red-200' : 'bg-white text-blue-800 border-blue-200'}`;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 4000);
        };

        // Helper: Communicate with Google Apps Script Backend
        const callBackend = async (data, buttonId) => {
            if (GAS_WEB_APP_URL === "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") {
                alert("Setup Required: You must deploy the Google Apps Script and paste the URL into the index.html file.");
                throw new Error("Missing GAS URL");
            }

            let btn = null, originalHtml = '';
            if (buttonId) {
                btn = document.getElementById(buttonId);
                originalHtml = btn.innerHTML;
                btn.innerHTML = '<div class="loader"></div>';
                btn.disabled = true;
            }

            try {
                // Using text/plain avoids CORS preflight issues with Google Apps Script
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                if (!result.success) throw new Error(result.error);
                return result;
            } catch (error) {
                showStatus(error.message.replace('Error: ', ''), true);
                throw error;
            } finally {
                if (btn) {
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                }
            }
        };

        // --- View & Render Logic ---

        const renderTasks = () => {
            taskList.innerHTML = '';
            currentTasks.sort((a, b) => a.createdAt - b.createdAt).forEach((task) => {
                const li = document.createElement('li');
                li.className = 'flex items-center justify-between p-3 bg-blue-50 border border-blue-100 rounded-lg group shadow-sm';
                
                const span = document.createElement('span');
                span.className = 'text-blue-950 break-all';
                span.textContent = task.text;

                const delBtn = document.createElement('button');
                delBtn.className = 'text-red-400 opacity-0 group-hover:opacity-100 transition-opacity hover:text-red-600 ml-2 flex-shrink-0';
                delBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>';
                
                delBtn.onclick = async () => {
                    const originalContent = li.innerHTML;
                    li.innerHTML = '<div class="flex justify-center w-full"><div class="loader"></div></div>';
                    try {
                        await callBackend({ action: 'deleteTask', taskId: task.id });
                        currentTasks = currentTasks.filter(t => t.id !== task.id);
                        renderTasks();
                    } catch(e) {
                        li.innerHTML = originalContent; // Revert if failed
                    }
                };

                li.appendChild(span);
                li.appendChild(delBtn);
                taskList.appendChild(li);
            });
        };

        const loadTasks = async () => {
            taskList.innerHTML = '<div class="flex justify-center p-4"><div class="loader border-blue-600"></div></div>';
            try {
                const result = await callBackend({ action: 'getTasks', userId: currentUser.userId });
                currentTasks = result.tasks || [];
                renderTasks();
            } catch (e) {
                taskList.innerHTML = '<div class="text-red-500 text-center text-sm">Failed to load tasks.</div>';
            }
        };

        const showAppScreen = (user) => {
            currentUser = user;
            authSection.classList.add('hidden');
            appSection.classList.remove('hidden');
            userEmailDisplay.textContent = `Logged in as: ${user.username}`;
            loadTasks();
        };

        const logout = () => {
            currentUser = null;
            currentTasks = [];
            taskList.innerHTML = '';
            appSection.classList.add('hidden');
            authSection.classList.remove('hidden');
            usernameInput.value = '';
            passwordInput.value = '';
        };

        // --- Event Listeners ---

        document.getElementById('signupBtn').onclick = async () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            if(!username || !password) return showStatus("Please enter a username and password", true);
            
            try {
                const result = await callBackend({ action: 'signup', username, password }, 'signupBtn');
                showStatus("Account created successfully!");
                showAppScreen(result);
            } catch(e) {}
        };

        document.getElementById('loginBtn').onclick = async () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            if(!username || !password) return showStatus("Please enter a username and password", true);
            
            try {
                const result = await callBackend({ action: 'login', username, password }, 'loginBtn');
                showAppScreen(result);
            } catch(e) {}
        };

        document.getElementById('guestBtn').onclick = async () => {
            try {
                const result = await callBackend({ action: 'guest' }, 'guestBtn');
                showAppScreen(result);
            } catch(e) {}
        };

        document.getElementById('addTaskBtn').onclick = async () => {
            const text = taskInput.value.trim();
            if (!text) return;

            try {
                const result = await callBackend({ action: 'addTask', userId: currentUser.userId, text }, 'addTaskBtn');
                currentTasks.push(result.task);
                taskInput.value = '';
                renderTasks();
            } catch(e) {}
        };

        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('addTaskBtn').click();
        });

        document.getElementById('logoutBtn').onclick = logout;

    </script>

    <!-- Footnote -->
    <div class="fixed bottom-4 left-0 w-full text-center text-sm text-blue-200 pointer-events-none">
        Developed by PVNJ
    </div>
</body>

</html>
